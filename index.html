// ── TAB: 3D ISOMETRIC VIEW ──────────────────────────────────
// Same plant layout as the 2D plan, but projected to isometric so the user
// can actually "see" how the garden stacks vertically. Each plant becomes
// a trunk (cylinder) + crown (ellipse with highlight + ground shadow);
// painter's-algorithm depth sort handles overlap.
function render3D(layers, recs) {
  const realW = state.widthM || SPACE_DEFAULTS[state.space].w;
  const realD = state.depthM || SPACE_DEFAULTS[state.space].d;
  const area = (realW * realD).toFixed(1);

  // Reuse the same 2D layout the plan view uses for plant placement,
  // but feed it nominal pixel dims — we'll re-project to isometric next.
  const baseDims = { w: 600, h: 400 };
  const plantsForPlan = layers.filter(l => l.plant).map(l => l.plant);
  const placed = layoutPlan(plantsForPlan, baseDims, state.space);

  // Isometric projection: rotate the plane by 30°, foreshorten Y.
  // SVG y grows downward — so larger source-y → larger projected-y (further "into" the picture toward viewer).
  const cos30 = Math.cos(Math.PI / 6);
  const sin30 = Math.sin(Math.PI / 6);
  const planeW = baseDims.w, planeH = baseDims.h;

  // Choose SVG size that comfortably contains the diamond + tallest plant.
  const svgW = 720, svgH = 520;
  // Centre the iso plane horizontally; leave headroom on top for the tallest tree.
  const cx = svgW / 2;
  const cyBase = svgH - 80;

  function project(x, y, z = 0) {
    // Centre the plane on the origin first
    const px = x - planeW / 2;
    const py = y - planeH / 2;
    const ix = (px - py) * cos30 * 0.6;
    const iy = (px + py) * sin30 * 0.6;
    return { ix: cx + ix, iy: cyBase + iy - z };
  }

  // Corner projection for the ground quad
  const c0 = project(0, 0);
  const c1 = project(planeW, 0);
  const c2 = project(planeW, planeH);
  const c3 = project(0, planeH);
  const groundPoly = [c0, c1, c2, c3].map(p => `${p.ix.toFixed(1)},${p.iy.toFixed(1)}`).join(" ");

  // Subtle grid lines on the iso plane — 8 divisions
  const N = 8;
  let gridLines = "";
  for (let i = 1; i < N; i++) {
    const a = project((planeW / N) * i, 0);
    const b = project((planeW / N) * i, planeH);
    const c = project(0, (planeH / N) * i);
    const d = project(planeW, (planeH / N) * i);
    gridLines += `<line x1="${a.ix.toFixed(1)}" y1="${a.iy.toFixed(1)}" x2="${b.ix.toFixed(1)}" y2="${b.iy.toFixed(1)}" stroke="rgba(0,0,0,0.05)" stroke-width="1"/>`;
    gridLines += `<line x1="${c.ix.toFixed(1)}" y1="${c.iy.toFixed(1)}" x2="${d.ix.toFixed(1)}" y2="${d.iy.toFixed(1)}" stroke="rgba(0,0,0,0.05)" stroke-width="1"/>`;
  }

  // Heights & crown sizes per tier (in SVG units; not real metres)
  const TIER_3D = {
    T: { trunkH: 90,  crownR: 38, crownAspect: 0.9, trunkW: 8 },   // canopy
    S: { trunkH: 36,  crownR: 22, crownAspect: 0.9, trunkW: 5 },   // shrub
    G: { trunkH: 0,   crownR: 14, crownAspect: 0.5, trunkW: 0 },   // groundcover (flat blob)
    W: { trunkH: 0,   crownR: 18, crownAspect: 0.45, trunkW: 0 },  // water (flat blue oval)
    C: { trunkH: 60,  crownR: 14, crownAspect: 1.6, trunkW: 4 },   // climber (tall narrow)
  };

  // Painter's algorithm — sort by ground-projected iy ascending so back plants draw first
  const drawList = placed.map(p => {
    const ground = project(p.x, p.y, 0);
    return { p, ground, sortKey: ground.iy };
  }).sort((a, b) => a.sortKey - b.sortKey);

  const plantSvgs = drawList.map(({ p, ground }) => {
    const tier = TIER_3D[p.tier] || TIER_3D.G;
    // Size adjusted by plant spread (bigger spread → bigger crown)
    const spreadFactor = Math.max(0.7, Math.min(1.7, (p.spread?.[1] || 1) / 1.5));
    const crownR  = tier.crownR  * spreadFactor;
    const crownRy = crownR * tier.crownAspect;
    const trunkH  = tier.trunkH;
    const trunkW  = tier.trunkW;

    // Shadow ellipse at ground level — wider and faded
    const shadow = `<ellipse cx="${ground.ix.toFixed(1)}" cy="${(ground.iy + 3).toFixed(1)}" rx="${(crownR * 1.15).toFixed(1)}" ry="${(crownR * 0.32).toFixed(1)}" fill="rgba(44,53,38,0.22)"/>`;

    // Trunk — drawn as a small parallelogram for canopy/shrub/climber tiers
    let trunk = "";
    if (trunkH > 0 && trunkW > 0) {
      // Trunk top sits trunkH above the ground projection
      const tx = ground.ix;
      const tyBot = ground.iy;
      const tyTop = ground.iy - trunkH;
      trunk = `<rect x="${(tx - trunkW/2).toFixed(1)}" y="${tyTop.toFixed(1)}" width="${trunkW}" height="${trunkH}" fill="url(#trunkGrad)" rx="2"/>`;
    }

    // Crown — for canopy/shrub: ellipse at trunk top; for ground/water: flat ellipse at ground
    const cyCrown = ground.iy - trunkH - (trunkH > 0 ? crownRy * 0.4 : 0);
    let crown;
    if (p.tier === "W") {
      // Water plant — flat blue ripple instead of a crown
      crown = `
        <ellipse cx="${ground.ix.toFixed(1)}" cy="${ground.iy.toFixed(1)}" rx="${crownR.toFixed(1)}" ry="${crownRy.toFixed(1)}" fill="rgba(70,130,170,0.35)"/>
        <ellipse cx="${ground.ix.toFixed(1)}" cy="${ground.iy.toFixed(1)}" rx="${(crownR * 0.65).toFixed(1)}" ry="${(crownRy * 0.55).toFixed(1)}" fill="rgba(70,130,170,0.18)"/>
        <circle cx="${ground.ix.toFixed(1)}" cy="${(ground.iy - 3).toFixed(1)}" r="${(crownR * 0.4).toFixed(1)}" fill="${p.color}"/>`;
    } else {
      // Tree / shrub / ground / climber — coloured crown with darker base + lighter highlight
      crown = `
        <ellipse cx="${ground.ix.toFixed(1)}" cy="${cyCrown.toFixed(1)}" rx="${crownR.toFixed(1)}" ry="${crownRy.toFixed(1)}" fill="${p.color}"/>
        <ellipse cx="${(ground.ix - crownR * 0.25).toFixed(1)}" cy="${(cyCrown - crownRy * 0.3).toFixed(1)}" rx="${(crownR * 0.55).toFixed(1)}" ry="${(crownRy * 0.4).toFixed(1)}" fill="rgba(255,255,255,0.32)"/>
        <ellipse cx="${(ground.ix + crownR * 0.2).toFixed(1)}" cy="${(cyCrown + crownRy * 0.35).toFixed(1)}" rx="${(crownR * 0.5).toFixed(1)}" ry="${(crownRy * 0.35).toFixed(1)}" fill="rgba(0,0,0,0.16)"/>`;
    }

    // Label below the shadow
    const labelY = ground.iy + 18;
    const labelEn = p.en.length > 22 ? p.en.slice(0, 20) + "…" : p.en;
    const labelText = state.lang === "zh" ? p.zh : labelEn;
    const label = `<text x="${ground.ix.toFixed(1)}" y="${labelY.toFixed(1)}" text-anchor="middle" font-size="11" font-family="Noto Serif TC" fill="#3F4A37" font-weight="600">${labelText}</text>`;

    return `<g class="plan-plant" data-id="${p.id}" style="cursor:pointer;">${shadow}${trunk}${crown}${label}</g>`;
  }).join("");

  // Sun marker — bigger in 3D, placed by orientation
  const orient = state.orientation || "S";
  let sunX, sunY;
  switch (orient) {
    case "S": sunX = svgW - 70; sunY = 50; break;
    case "E": sunX = 50; sunY = svgH * 0.4; break;
    case "W": sunX = svgW - 50; sunY = svgH * 0.4; break;
    case "N": sunX = 70; sunY = svgH - 100; break;
  }
  const sun = `
    <g transform="translate(${sunX}, ${sunY})">
      <circle r="22" fill="#F4D67E" stroke="#C9A84C" stroke-width="1.8" opacity="0.95"/>
      <circle r="30" fill="none" stroke="#F4D67E" stroke-width="1" stroke-dasharray="2 4" opacity="0.6"/>
      <text x="0" y="6" text-anchor="middle" font-size="18">☀</text>
    </g>`;

  return `
    <h2 class="subtitle" data-zh="3D 視角 · Isometric View" data-en="3D Isometric View">3D 視角 · Isometric View</h2>
    <p class="lead-small"
       data-zh="從 30° 等角度俯視你的景觀，喬木立起、灌木中層、地被在地。圓圈尺寸對應冠幅，圓柱代表樹幹。點植物查看養護指南。"
       data-en="A 30° isometric view of your garden — canopy stands tall, shrubs in the middle, groundcover on the ground. Circle size = mature spread; columns = trunks. Tap a plant for the care guide.">
       從 30° 等角度俯視你的景觀，喬木立起、灌木中層、地被在地。圓圈尺寸對應冠幅，圓柱代表樹幹。點植物查看養護指南。</p>
    <div class="plan-frame">
      <svg viewBox="0 0 ${svgW} ${svgH}" class="plan-svg" preserveAspectRatio="xMidYMid meet">
        <defs>
          <linearGradient id="trunkGrad" x1="0" x2="1" y1="0" y2="0">
            <stop offset="0%"   stop-color="#3E2A1A"/>
            <stop offset="45%"  stop-color="#6B4D2E"/>
            <stop offset="100%" stop-color="#4A3320"/>
          </linearGradient>
          <radialGradient id="groundGrad" cx="50%" cy="50%" r="60%">
            <stop offset="0%"  stop-color="rgba(196,184,144,0.32)"/>
            <stop offset="100%" stop-color="rgba(196,184,144,0.05)"/>
          </radialGradient>
        </defs>
        <polygon points="${groundPoly}" fill="url(#groundGrad)" stroke="#C9C3B4" stroke-width="1.2"/>
        ${gridLines}

// ── ICS export — write the auto-generated care calendar to a downloadable
//    .ics file so users can import the 12 monthly task batches into Google /
//    Apple / Outlook with yearly recurrence. Once imported, the tasks live in
//    the user's phone calendar and survive the tab close.
window.exportCareICS = function () {
  const scored = scorePlants();
  const all = scored.filter(p => p.score >= 30);
  const recs = state.nativeOnly ? all.filter(p => p.native) : all;
  const top = recs.slice(0, 10);

  // Same seasonal warning table as renderCareCalendar so the .ics matches the UI
  const seasonalWarnings = {
    3:  { zh:"春季蚜蟲爆發期 — 檢查新芽是否捲縮、油亮", en:"Aphid season — check new shoots for curling or oily sheen" },
    4:  { zh:"梅雨將至 — 加強排水，避免根腐病",          en:"Plum-rain approaching — improve drainage to prevent root rot" },
    5:  { zh:"高濕高溫 — 觀察葉片白粉病徵兆",              en:"High humidity + heat — watch for powdery mildew" },
    6:  { zh:"颱風季開始 — 為大喬木檢查支撐與固定",        en:"Typhoon season begins — check staking on canopy trees" },
    7:  { zh:"盛夏 — 容器植物可能需要每日澆水",            en:"Peak summer — container plants may need daily watering" },
    8:  { zh:"高溫午後 — 葉片噴水降溫，但避免日照下噴",    en:"Hot afternoons — mist for cooling, but never under direct sun" },
    9:  { zh:"颱風尾季 — 修剪過長枝以減少風阻",            en:"Late typhoon — prune over-long branches to reduce wind load" },
    10: { zh:"秋涼 — 補施緩效肥支援冬前生長",              en:"Cool autumn — apply slow-release fertilizer for pre-winter growth" },
    11: { zh:"落葉樹開始休眠 — 計劃明春的修剪",            en:"Deciduous trees enter dormancy — plan next spring's pruning" },
    12: { zh:"冬季少水 — 多數植物減少澆水頻率 1/2",        en:"Winter cool — most plants need watering ~50% less" },
    1:  { zh:"深冬休眠 — 是大幅度修剪落葉樹的好時機",      en:"Deep winter — best time for hard-pruning deciduous trees" },
    2:  { zh:"早春前 — 大多數果樹與灌木此時修剪最理想",    en:"Pre-spring — ideal window to prune fruit & flowering shrubs" },
  };

  const pad2 = (n) => String(n).padStart(2, "0");
  const yyyy = new Date().getFullYear();
  const events = [];

  for (let m = 1; m <= 12; m++) {
    const bloom = top.filter(p => (p.bloom || []).includes(m));
    const fruit = top.filter(p => (p.fruit || []).includes(m));
    const prune = top.filter(p => (expert(p).prune_months    || []).includes(m));
    const fert  = top.filter(p => (expert(p).fertilize_months || []).includes(m));
    const warning = seasonalWarnings[m];

    const nameList = (arr) => arr.map(p => state.lang === "zh" ? p.zh : p.en).join(", ");
    const lines = [];
    if (bloom.length) lines.push(`🌸 ${state.lang === "zh" ? "花期" : "Bloom"}: ${nameList(bloom)}`);
    if (fruit.length) lines.push(`🍎 ${state.lang === "zh" ? "果期" : "Fruit"}: ${nameList(fruit)}`);
    if (prune.length) lines.push(`✂️ ${state.lang === "zh" ? "修剪" : "Prune"}: ${nameList(prune)}`);
    if (fert.length)  lines.push(`🌱 ${state.lang === "zh" ? "施肥" : "Fertilize"}: ${nameList(fert)}`);
    if (warning)      lines.push(`⚠ ${state.lang === "zh" ? "注意" : "Watch"}: ${state.lang === "zh" ? warning.zh : warning.en}`);
    if (!lines.length) continue;

    const monthNames = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
    const summary = state.lang === "zh" ? `🌿 ${m} 月 · 景觀養護` : `🌿 ${monthNames[m-1]} · Landscape care`;

    const startY = yyyy;
    const endY   = m === 12 ? yyyy + 1 : yyyy;
    const endM   = m === 12 ? 1 : m + 1;
    events.push([
      "BEGIN:VEVENT",
      `UID:landscape-copilot-${m}@anren1117-lang.github.io`,
      `DTSTAMP:${yyyy}${pad2(new Date().getMonth() + 1)}${pad2(new Date().getDate())}T000000Z`,
      `DTSTART;VALUE=DATE:${startY}${pad2(m)}01`,
      `DTEND;VALUE=DATE:${endY}${pad2(endM)}01`,
      `SUMMARY:${escapeICS(summary)}`,
      `DESCRIPTION:${escapeICS(lines.join("\\n"))}`,
      `RRULE:FREQ=YEARLY`,
      "TRANSP:TRANSPARENT",
      "END:VEVENT",
    ].join("\r\n"));
  }

  // RFC 5545 line endings (\r\n) matter for strict parsers.
  const ics = [
    "BEGIN:VCALENDAR",
    "VERSION:2.0",
    "PRODID:-//AI Landscape Copilot//Care Calendar//EN",
    "CALSCALE:GREGORIAN",
    `X-WR-CALNAME:${state.lang === "zh" ? "景觀養護月曆" : "Landscape Care Calendar"}`,
    "X-WR-TIMEZONE:Asia/Taipei",
    ...events,
    "END:VCALENDAR",
  ].join("\r\n");

  const blob = new Blob(["﻿" + ics], { type: "text/calendar;charset=utf-8;" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = `landscape-care-${state.space || "garden"}.ics`;
  a.click();
  URL.revokeObjectURL(url);
};

// RFC 5545 escaping for SUMMARY / DESCRIPTION fields.
function escapeICS(s) {
  return String(s ?? "")
    .replace(/\\/g, "\\\\")
    .replace(/;/g, "\\;")
    .replace(/,/g, "\\,")
    .replace(/\n/g, "\\n");
}

// ── TAB: BUILD PLAN (step-by-step installation guide) ───────
// Generates an installation sequence from the chosen plants: site prep, hardscape,
// canopy → shrubs → ground, mulch + initial care, first-3-months establishment.
function renderBuildPlan(layers, recs) {
  const top = recs.slice(0, 8);
  const canopy = top.filter(p => p.tier === "T");
  const shrubs = top.filter(p => p.tier === "S");
  const ground = top.filter(p => p.tier === "G");
  const water  = top.filter(p => p.tier === "W");
  const climb  = top.filter(p => p.tier === "C");
  const realW = state.widthM || SPACE_DEFAULTS[state.space].w;
  const realD = state.depthM || SPACE_DEFAULTS[state.space].d;
  const area  = (realW * realD).toFixed(1);

  // Total water sketch — rough total for first 3 months establishment
  const estWaterPerWeek = top.reduce((acc, p) => acc + (state.qty[p.id] || 1) * expert(p).water_l_wk, 0).toFixed(0);

  function plantChips(arr) {
    if (!arr.length) return "";
    return `<div class="phase-plants">${arr.map(p => `<button class="m-pill" data-id="${p.id}"><span data-zh="${p.zh}" data-en="${p.en}">${p.zh}</span></button>`).join("")}</div>`;
  }

  // Best planting window for Taiwan landscape work
  const bestWindow = t("3–5 月（春）或 10–11 月（秋）— 避開盛夏與颱風期",

          <li>${t("檢測排水：挖 30 cm 深小坑灌滿水，若 4 小時內排不掉，需加設排水層或抬高土床。", "Test drainage: dig a 30 cm test hole, fill with water — if it hasn't drained in 4 hours, add a drainage layer or raise the bed.")}</li>

      body: `

            ? t("陽台：確認地板承重（一般陽台 ≤ 200 kg/m²）。大型盆放角落，避免均布超重。", "Balcony: confirm load rating (typical ≤ 200 kg/m²). Put large containers in corners — distributed weight can exceed the rating.")
            : state.space === "rooftop"
            ? t("頂樓：必須裝防水層 + 排水板；種植土深度 ≥ 30 cm。建議找土水師傅或景觀公司處理。", "Rooftop: must have waterproofing + drainage board; planting soil depth ≥ 30 cm. Hire a contractor for the waterproofing layer.")
            : t("庭院：規劃步道、邊界石或木材圍欄。考慮自動灑水管線。", "Yard: lay out paths, edging (stone or timber). Consider an irrigation line for established planting.")}</li>
          ${water.length ? `<li>${t("水景：水池或水缽容量 ≥ 100 L，水深 30–60 cm。先放水後加植物。", "Water feature: pond or basin ≥ 100 L, depth 30–60 cm. Fill water first, then plant.")}</li>` : ""}

    canopy.length ? {

      time: t("時程：半天 — 最後再裝飾", "Timeline: half day — plant first, decorate last"),
      body: `
        <p style="margin-bottom: 10px;">${t("先種骨架。挖洞為土球 2 倍寬、1 倍深；土球面與地表齊平；填土時夯實。回填後立刻澆水至飽和。",
                                          "Start with the bones. Dig holes 2× rootball width × 1× depth; rootball top flush with grade; firm soil as you backfill. Saturate with water immediately.")}</p>

      body: `
        <p style="margin-bottom: 10px;">${t("覆蓋所有裸土；3–4 株 / m² 即可。是抑制雜草、保水、降溫的關鍵。",
                                          "Cover all bare soil; 3–4 plants per m² is enough. Critical for suppressing weeds, retaining moisture, and cooling the bed.")}</p>
        ${plantChips(ground)}`,
    } : null,
    water.length ? {
      title: t("06 · 水景植物", "06 · Water plants"),
      time: t("時程：1–2 小時", "Timeline: 1–2 hours"),
      body: `
        <p style="margin-bottom: 10px;">${t("放入種植籃 + 水生土 + 緩釋肥；沉入適合水深位置。靜待水體穩定 2 週後再放魚（若有）。",
                                          "Set into planting baskets with aquatic soil + slow-release fertilizer; submerge to the right depth. Wait 2 weeks for the water to balance before adding fish (if any).")}</p>
        ${plantChips(water)}`,
    } : null,
    {
      title: t("07 · 覆蓋層與初期照顧", "07 · Mulch + establishment care"),
      time: t("時程：當日完成 / 接下來 90 天觀察", "Timeline: same day + 90-day watch"),
      body: `

          <li>${t("第 12 個月：盤點哪些植物表現好 / 不好，是否需要調整配置。", "Month 12: review which plants thrived vs struggled — adjust the design if needed.")}</li>

    },
  ].filter(Boolean);

  return `

// ── Soil recipe calculator — turns the recommended plants + area into a
//    specific volume + cost estimate. Most beginners over- or under-amend;
//    this gives a starting point grounded in actual numbers.
function renderSoilRecipe(top, w, d) {
  const area = w * d;
  // Depth: containers shallower than yards
  const depthCm = (state.space === "balcony" || state.space === "indoor") ? 25 : 30;
  // Existing soil reused 20% in yards, 0% in containers/rooftop (start fresh)
  const reuseFraction = state.space === "yard" ? 0.2 : 0;
  const totalL = Math.round(area * depthCm * (1 - reuseFraction));

  // Dominant water tier across recs decides the mix
  const waterCounts = { low: 0, med: 0, high: 0 };
  top.forEach(p => { waterCounts[p.water] = (waterCounts[p.water] || 0) + (state.qty[p.id] || 1); });
  let dominantWater = "med";
  if (waterCounts.low > waterCounts.med && waterCounts.low > waterCounts.high) dominantWater = "low";
  else if (waterCounts.high > waterCounts.med) dominantWater = "high";

  // Mix recipes by dominant water
  const recipes = {
    low: {
      label_zh: "耐旱混合 · 排水優先", label_en: "Drought mix · drainage-first",
      parts: [
        { name_zh: "現地土壤 / 一般培養土", name_en: "Local soil / standard mix", pct: 50, rate: 5.5 },
        { name_zh: "有機堆肥", name_en: "Organic compost", pct: 25, rate: 8 },
        { name_zh: "珍珠岩或粗砂", name_en: "Perlite or coarse sand", pct: 25, rate: 12 },
      ],
      note_zh: "適合 海桐 / 馬鞍藤 / 草海桐 / 五節芒 / 馬齒莧 等耐旱植物為主的設計。",
      note_en: "Suits designs led by drought-tolerant species — 海桐, 馬鞍藤, 五節芒, etc.",
    },
    med: {
      label_zh: "通用培養土 · 平衡版", label_en: "Balanced mix · universal",
      parts: [
        { name_zh: "現地土壤 / 一般培養土", name_en: "Local soil / standard mix", pct: 50, rate: 5.5 },
        { name_zh: "有機堆肥", name_en: "Organic compost", pct: 30, rate: 8 },
        { name_zh: "珍珠岩 / 椰殼纖維", name_en: "Perlite / coir", pct: 20, rate: 10 },
      ],
      note_zh: "適合 野牡丹 / 山黃梔 / 月桃 / 鳳凰木 等多數庭院灌木與小樹。",
      note_en: "Suits most garden shrubs and small trees — 野牡丹, 山黃梔, 月桃, etc.",
    },
    high: {
      label_zh: "保水混合 · 濕地導向", label_en: "Moisture mix · wetland-leaning",
      parts: [
        { name_zh: "現地土壤 / 一般培養土", name_en: "Local soil / standard mix", pct: 40, rate: 5.5 },
        { name_zh: "有機堆肥（保水）", name_en: "Compost (water-holding)", pct: 40, rate: 8 },
        { name_zh: "椰殼纖維或樹皮屑", name_en: "Coir or fine bark", pct: 20, rate: 9 },
      ],
      note_zh: "適合 田蔥 / 風箱樹 / 月桃 等濕地或半水生植物的設計。",
      note_en: "Suits designs with wetland or semi-aquatic species — 田蔥, 風箱樹, 月桃.",
    },
  };
  const r = recipes[dominantWater];
  let totalCost = 0;
  const rows = r.parts.map(part => {
    const vol = Math.round(totalL * part.pct / 100);
    const bags = Math.max(1, Math.ceil(vol / 50));
    const cost = Math.round(vol * part.rate);
    totalCost += cost;
    return `
      <tr>
        <td><span data-zh="${part.name_zh}" data-en="${part.name_en}">${part.name_zh}</span></td>
        <td class="right">${part.pct}%</td>
        <td class="right">${vol} L</td>
        <td class="right" style="color:var(--ink-soft); font-size:12px;"><span data-zh="${bags} 包 (50 L)" data-en="${bags} bags (50 L)">${bags} 包 (50 L)</span></td>
        <td class="right">NT$ ${cost.toLocaleString()}</td>
      </tr>`;
  }).join("");

  return `
    <h2 class="subtitle" style="margin-top: 36px;"
        data-zh="🪴 土壤配方計算" data-en="🪴 Soil Recipe Calculator">🪴 土壤配方計算</h2>
    <p class="lead-small"
       data-zh="依你的空間尺寸與推薦植物的水分偏好（以「${dominantWater === "low" ? "低" : dominantWater === "high" ? "高" : "中"}」水量為主），自動計算改土配方與估算成本。"
       data-en='Auto-calculated soil mix and cost based on your area and the dominant water tier ("${dominantWater}") of your recommended plants.'>
       依你的空間尺寸與推薦植物的水分偏好，自動計算改土配方。</p>

    <div class="shop-frame">
      <div style="margin-bottom: 14px;">
        <div style="font-family: var(--serif); font-size: 18px; font-weight: 600; color: var(--forest);"
             data-zh="${r.label_zh}" data-en="${r.label_en}">${r.label_zh}</div>
        <div style="font-size: 13px; color: var(--ink-soft); margin-top: 4px;"
             data-zh="總體積 ${totalL} L = ${area.toFixed(1)} m² × ${depthCm} cm 深${reuseFraction ? " × " + Math.round((1 - reuseFraction) * 100) + "% (其餘可重複使用現地土)" : ""}"
             data-en="Total volume ${totalL} L = ${area.toFixed(1)} m² × ${depthCm} cm deep${reuseFraction ? " × " + Math.round((1 - reuseFraction) * 100) + "% (rest reuses existing soil)" : ""}">
             總體積 ${totalL} L</div>
      </div>
      <table class="shop-table">
        <thead>
          <tr>
            <th data-zh="成份" data-en="Component">成份</th>
            <th class="right" data-zh="比例" data-en="Ratio">比例</th>
            <th class="right" data-zh="體積" data-en="Volume">體積</th>
            <th class="right" data-zh="袋數估算" data-en="Bags est.">袋數估算</th>
            <th class="right" data-zh="估算 (NT$)" data-en="Est. cost">估算 (NT$)</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
      <div class="shop-total">
        <span class="label" data-zh="土壤估算總額" data-en="Soil total">土壤估算總額</span>
        <span class="amount">NT$ ${totalCost.toLocaleString()}</span>
      </div>
      <p class="shop-note" style="margin-top:14px;"
         data-zh="${r.note_zh} 一般花市或建材行可買到所有成份；建議現場混合後再回填。"
         data-en="${r.note_en} All materials available at flower markets or hardware stores; mix on-site before back-filling.">
         ${r.note_zh}
      </p>
    </div>`;
}

// ── Hazard preparedness — Taiwan-specific. Identifies which of the user's
//    plants are at risk for each common hazard and gives a concrete checklist.
function renderHazardChecklist(top) {
  // Typhoon-risk plants: canopy + large shrubs (height > 1.5m mature)
  const typhoonRisk = top.filter(p => p.tier === "T" || (p.height && p.height[1] >= 1.5));
  // Flood-risk plants: those that need low water (root rot)
  const floodRisk = top.filter(p => p.water === "low");
  // Drought-risk plants: those needing high water + thirsty containers
  const droughtRisk = top.filter(p => p.water === "high" || expert(p).water_l_wk >= 10);
  // Cold-snap risk: hardy_c >= 5 (anything that suffers below 5°C)
  const coldRisk = top.filter(p => (expert(p).hardy_c ?? 0) >= 5);

  const chips = (arr) => arr.length
    ? `<div class="phase-plants">${arr.map(p => `<button class="m-pill" data-id="${p.id}"><span data-zh="${p.zh}" data-en="${p.en}">${p.zh}</span></button>`).join("")}</div>`
    : `<span class="m-empty" data-zh="（你的設計中沒有此風險的植物）" data-en="(none of your plants are at risk)">（你的設計中沒有此風險的植物）</span>`;

  return `
    <h2 class="subtitle" style="margin-top: 36px;"
        data-zh="🌪 災害準備清單 · Hazard Prep" data-en="🌪 Hazard Preparedness">🌪 災害準備清單 · Hazard Prep</h2>
    <p class="lead-small"
       data-zh="台灣景觀必備：颱風、淹水、乾旱、寒流四大威脅的應對。每項列出你設計中需要額外照顧的植物。"
       data-en="Essential for Taiwan landscapes: response plans for the four big threats — typhoons, flooding, drought, cold snaps. Each section lists which of your plants need extra care.">
       台灣景觀必備：颱風、淹水、乾旱、寒流四大威脅的應對。</p>

    <div class="phase-list">
      <div class="phase">
        <div class="phase-num" style="background:#8C2A22;">🌪</div>
        <div class="phase-title" data-zh="颱風 · 平均 6 月–10 月" data-en="Typhoon · avg Jun–Oct">颱風 · 平均 6 月–10 月</div>
        <div class="phase-time" data-zh="預警 24-48 小時內完成" data-en="Complete within 24-48h of warning">預警 24-48 小時內完成</div>
        <div class="phase-text">
          <ul>
            <li data-zh="高度 ≥ 1.5 m 的植物：以三腳支撐固定（離主幹 30-50 cm 釘樁，鬆綁帶綁主幹）。"
                 data-en="Plants ≥ 1.5 m tall: stake with a 3-leg system (stakes 30-50 cm from trunk; loose tie to main stem).">
                 高度 ≥ 1.5 m 的植物：以三腳支撐固定（離主幹 30-50 cm 釘樁，鬆綁帶綁主幹）。</li>
            <li data-zh="盆器 < 30 kg：移入室內或集中靠牆。陽台盆器務必檢查護欄是否會被風吹倒。"
                 data-en="Containers < 30 kg: bring indoors or huddle against a wall. Balcony pots — check the railing won't blow over.">
                 盆器 < 30 kg：移入室內或集中靠牆。</li>
            <li data-zh="預先修剪：移除枯枝、過長嫩枝，減少風阻；颱風後 1 週內補救修剪。"
                 data-en="Pre-prune: remove dead/over-long shoots to reduce wind load; recovery prune within 1 week after the storm.">
                 預先修剪：移除枯枝、過長嫩枝。</li>
            <li data-zh="排水檢查：確認土面與排水孔暢通，避免根部浸泡 24h 以上。"
                 data-en="Drainage check: ensure soil surface and drains are clear — roots shouldn't sit in water > 24h.">
                 排水檢查。</li>
          </ul>
          <div style="margin-top:10px; font-size: 12.5px; color: var(--clay-deep); font-weight: 600;"
               data-zh="你設計中需要支撐的植物：" data-en="Plants in your design needing staking:">你設計中需要支撐的植物：</div>
          ${chips(typhoonRisk)}
        </div>
      </div>

      <div class="phase">
        <div class="phase-num" style="background:#3D6086;">💧</div>
        <div class="phase-title" data-zh="淹水 · 梅雨 (5-6 月) / 颱風後" data-en="Flooding · plum rains / post-typhoon">淹水 · 梅雨 / 颱風後</div>
        <div class="phase-time" data-zh="進場前 + 雨後 48h" data-en="Pre-install + within 48h of rain">進場前 + 雨後 48h</div>
        <div class="phase-text">
          <ul>
            <li data-zh="進場前必做：30 cm 深測試坑灌滿水 → 4 小時排不掉就要加排水層或抬高土床。"
                 data-en="Before planting: dig a 30 cm test hole, fill with water — if not drained in 4h, add a drainage layer or raise the bed.">
                 進場前必做：排水測試。</li>
            <li data-zh="盆器：盆底放 5 cm 陶粒或石礫；盆器務必有排水孔。"
                 data-en="Containers: 5 cm of expanded clay or gravel at the bottom; pots must have drainage holes.">
                 盆器：盆底放排水材。</li>
            <li data-zh="低水分植物淹水超過 48h 通常致命 — 雨後立即翻土通氣。"
                 data-en="Low-water plants under flooding > 48h are usually fatal — turn soil immediately after rain.">
                 低水分植物淹水超過 48h 通常致命。</li>
            <li data-zh="檢查是否有蚊蟲孳生水體 — 倒掉所有積水容器。"
                 data-en="Check for standing water → mosquito breeding — empty any container holding water.">
                 注意積水蚊蟲孳生。</li>
          </ul>
          <div style="margin-top:10px; font-size: 12.5px; color: var(--clay-deep); font-weight: 600;"
               data-zh="淹水時最先受害的植物（耐旱型，怕根腐）：" data-en="Plants most vulnerable to flooding (drought-loving, root-rot prone):">淹水時最先受害的植物（耐旱型，怕根腐）：</div>
          ${chips(floodRisk)}
        </div>
      </div>

function escapeAttr(s) {
  return String(s ?? "").replace(/&/g, "&amp;").replace(/"/g, "&quot;").replace(/'/g, "&#39;");
}

function wireTutorials() {
  document.querySelectorAll(".tut-card").forEach((card) => {
    card.addEventListener("click", (e) => {
      // Plant pill clicks open drawer — let them through
      if (e.target.closest(".m-pill")) return;
      const body = card.querySelector(".tut-body");
      const relevant = card.querySelector(".tut-relevant");
      const summary = card.querySelector(".tut-summary");
      const isOpen = card.classList.toggle("open");
      if (isOpen) {
        body.style.display = "block";
        body.innerHTML = body.getAttribute(`data-${state.lang}-html`);
        relevant.style.display = "block";
        summary.dataset.zh = "點此收起 ↑";
        summary.dataset.en = "Tap to collapse ↑";
      } else {
        body.style.display = "none";
        relevant.style.display = "none";
        summary.dataset.zh = "點開閱讀詳細步驟 →";
        summary.dataset.en = "Tap to read the full guide →";
      }
      summary.textContent = summary.dataset[state.lang];
    });
  });
  // Plant chips open drawer
  document.querySelectorAll(".tut-plants .m-pill[data-id]").forEach((el) =>
    el.addEventListener("click", (e) => { e.stopPropagation(); openDrawer(el.dataset.id); }));
}

// ── 5-year cost-of-ownership projection — exposes the true cost
//    beyond the nursery receipt. Most planting projects fail at year 2-3
//    because owners didn't budget for the recurring expenses.
function renderTCOTable(plantsTop, plantsSubtotal) {
  const realW = state.widthM || SPACE_DEFAULTS[state.space].w;
  const realD = state.depthM || SPACE_DEFAULTS[state.space].d;
  const area  = realW * realD;

  // One-time setup costs (rough Taiwan retail rates)
  //   container/edging: balcony/indoor needs pots; rooftop+yard mostly use ground
  //   soil & amendments: ~NT$ 50 per 10 L bag; we estimate 80% of bed volume = soil to bring in
  //   mulch: NT$ 80 per 50 L bag; cover area at 4 cm depth
  //   tools: trowel, gloves, watering can, light pruner — basic kit
  const containerCost = (state.space === "balcony" || state.space === "indoor")
    ? Math.max(2, Math.round(plantsTop.length * 0.8)) * 250    // ~NT$ 250 per pot
    : Math.round(area * 30);                                   // rougher edging cost for yards
  const soilVolL = Math.round(area * 30 * 0.8);                // 30 cm depth × 80% needs added
  const soilCost = Math.round(soilVolL * 5.5);                 // ~NT$ 55 / 10 L
  const mulchVolL = Math.round(area * 4);                      // 4 cm cover
  const mulchCost = Math.round(mulchVolL * 1.6);               // ~NT$ 80 / 50 L
  const toolsCost = 1200;                                      // basic kit

  // Annual recurring costs
  //   water: total L/week × 52 weeks × NT$ 0.012 / L (typical TPC residential)
  //   fertilizer: ~NT$ 600/yr per 5 m² (slow-release blend)
  //   replacement: 10% of plant subtotal per year as failure & growth replacement
  //   misc: pruning shears sharpening, replacement gloves, soil top-up — rough NT$ 800
  let weeklyWater = 0;
  plantsTop.forEach(p => {
    const qty = state.qty[p.id] ?? 1;
    weeklyWater += (expert(p).water_l_wk || 0) * qty;
  });
  const annualWaterCost = Math.round(weeklyWater * 52 * 0.012);
  const annualFertCost  = Math.round(Math.max(1, area / 5) * 600);
  const annualReplaceCost = Math.round(plantsSubtotal * 0.10);
  const annualMisc = 800;
  const annualTotal = annualWaterCost + annualFertCost + annualReplaceCost + annualMisc;

  const setupTotal = containerCost + soilCost + mulchCost + toolsCost;
  const fiveYearTotal = plantsSubtotal + setupTotal + annualTotal * 5;

  return `
    <h2 class="subtitle" style="margin-top: 36px;"

          </tr>
          <tr>

function wireShoppingControls() {
  document.querySelectorAll(".shop-qty-btn").forEach((btn) => {
    btn.addEventListener("click", () => {
      const id = btn.dataset.id;
      const act = btn.dataset.act;
      const cur = state.qty[id] ?? 1;
      if (act === "inc") state.qty[id] = cur + 1;
      else if (act === "dec" && cur > 0) state.qty[id] = cur - 1;
      const scored = scorePlants();
      const recs = scored.filter(p => p.score >= 30);
      document.getElementById("tabPanel").innerHTML = renderShopping(recs);
      wireShoppingControls();
      applyLanguage();
    });
  });
}

window.exportShoppingCSV = function() {
  const scored = scorePlants();
  const top = scored.filter(p => p.score >= 30).slice(0, 8);
  const header = ["Name (中文)", "Name (English)", "Latin", "Qty", "Unit (NTD)", "Subtotal (NTD)"];
  const rows = top.map(p => {
    const q = state.qty[p.id] ?? 1;
    return [p.zh, p.en, p.lt, q, p.cost, q * p.cost];
  });
  const csv = [header, ...rows].map(r => r.map(c => `"${c}"`).join(",")).join("\n");
  const blob = new Blob(["﻿" + csv], { type: "text/csv;charset=utf-8;" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = `landscape-plan-${state.space}.csv`; a.click();
  URL.revokeObjectURL(url);
};

// ── TAB: PLANT DICTIONARY (browse all) ──────────────────────
function renderDictionary() {
  const q = (state.dictQuery || "").trim().toLowerCase();
  const curMonth = new Date().getMonth() + 1;
  const filtered = PLANTS.filter(p => {
    if (state.dictTier !== "all" && p.tier !== state.dictTier) return false;
    if (state.dictNative === "native" && !p.native) return false;
    if (state.dictNative === "intro"  && p.native)  return false;
    if (state.dictFragOnly    && !(p.fragrance >= 2)) return false;
    if (state.dictPetSafeOnly && p.pet_safe !== true) return false;
    if (state.dictWater !== "all" && p.water !== state.dictWater) return false;
    if (state.dictSpace !== "all" && !(p.spaces || []).includes(state.dictSpace)) return false;
    if (state.dictCoastalOnly && !p.coastal_ok) return false;
    if (state.dictEdibleOnly) {
      const txt = [p.type_zh, p.type_en, p.role_zh, p.role_en, (p.supports_zh||[]).join(" "), (p.supports_en||[]).join(" ")].join(" ").toLowerCase();
      if (!/可食|edible/i.test(txt)) return false;
    }
    if (state.dictThisMonth) {
      const bloomNow = (p.bloom || []).includes(curMonth);
      const fruitNow = (p.fruit || []).includes(curMonth);
      // "Plant this month" interpretation: best planting windows in Taiwan are spring (3-5) and autumn (10-11);
      // for those months, show plants currently in bloom or fruit; otherwise show plants that bloom/fruit within ±2 months
      if (curMonth >= 3 && curMonth <= 5 || curMonth >= 10 && curMonth <= 11) {
        if (!bloomNow && !fruitNow) return false;
      } else {
        const nearby = (m) => Math.min((m - curMonth + 12) % 12, (curMonth - m + 12) % 12) <= 2;
        const anyNearby = (p.bloom || []).some(nearby) || (p.fruit || []).some(nearby);
        if (!anyNearby) return false;
      }
    }
    if (q) {
      const hay = [p.zh, p.en, p.lt, p.role_zh, p.role_en, p.origin_zh, p.origin_en, p.type_zh, p.type_en].join(" ").toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  });

  const tierKey = (k) => ({ all:t("全部","All"), T:t("喬木","Canopy"), S:t("灌木","Shrub"), G:t("地被","Ground"), W:t("水生","Water"), C:t("藤本","Climber") })[k];

       data-en="This dictionary covers the ${PLANTS.length}+ most commonly planted species in Taiwan (natives + cultivated). Looking for more obscure species? Try <a href='https://www.inaturalist.org/places/taiwan' target='_blank' rel='noopener' style='color:var(--sage-deep);font-weight:600;'>iNaturalist Taiwan</a> (citizen-science database, 10,000+ species) or the <a href='https://taiwannativeplants.com/' target='_blank' rel='noopener' style='color:var(--sage-deep);font-weight:600;'>Taiwan Native Plant Society</a>.">

            ${p.pet_safe === false ? `<span class="badge toxic">⚠</span>` : ""}
          </div>
          <div class="pref-row" onclick="event.stopPropagation()">
            <span class="pref-btn pin ${isPinned ? "on" : ""}" role="button" tabindex="0"
                  data-pref="pin" data-pid="${p.id}"
                  title="${t('釘選 · 保證納入你的設計（從植物百科直接加入）','Pin · guarantee this plant in your design (add directly from the dictionary)')}">
              📌 <span data-zh="${isPinned ? "已釘選" : "釘選"}" data-en="${isPinned ? "Pinned" : "Pin"}">${isPinned ? "已釘選" : "釘選"}</span>
            </span>
            <span class="pref-btn like ${liked ? "on" : ""}" role="button" tabindex="0"
                  data-pref="like" data-pid="${p.id}"
                  title="${t('標為喜歡 · 之後出現在你的設計推薦會被加分','Mark as liked · this plant ranks higher in your design recs')}">
              👍 <span data-zh="喜歡" data-en="Like">喜歡</span>
            </span>
            <span class="pref-btn dislike ${disliked ? "on" : ""}" role="button" tabindex="0"
                  data-pref="dislike" data-pid="${p.id}"
                  title="${t('標為不喜歡 · 之後出現在你的設計推薦會被扣分','Mark as disliked · this plant ranks lower in your design recs')}">
              👎 <span data-zh="不喜歡" data-en="Pass">不喜歡</span>
            </span>
          </div>
          <div class="rec-view" style="margin-top:auto; padding-top:14px;" data-zh="詳細 →" data-en="Details →">詳細 →</div>
        </button>`;}).join("")}
    </div>`;
}

function wireDictionary() {
  document.getElementById("dictSearch")?.addEventListener("input", (e) => {
    state.dictQuery = e.target.value;
    const host = document.getElementById("tabPanel");
    if (host) host.innerHTML = renderDictionary();
    wireDictionary();
    applyLanguage();
    // Keep focus on the input after re-render
    const s = document.getElementById("dictSearch");
    if (s) { s.focus(); s.setSelectionRange(s.value.length, s.value.length); }
  });
  document.querySelectorAll(".dict-chip[data-tier]").forEach(el => {
    el.addEventListener("click", () => { state.dictTier = el.dataset.tier; rerenderDict(); });
  });
  document.querySelectorAll(".dict-chip[data-native]").forEach(el => {
    el.addEventListener("click", () => { state.dictNative = el.dataset.native; rerenderDict(); });
  });
  document.querySelectorAll(".dict-chip[data-flag]").forEach(el => {
    el.addEventListener("click", () => {
      if (el.dataset.flag === "frag") state.dictFragOnly = !state.dictFragOnly;
      if (el.dataset.flag === "petsafe") state.dictPetSafeOnly = !state.dictPetSafeOnly;
      rerenderDict();
    });
  });
  document.querySelectorAll(".rec-card[data-id]").forEach(el => {
    el.addEventListener("click", (e) => {
      if (e.target.closest(".pref-btn") || e.target.closest(".pref-row")) return;
      openDrawer(el.dataset.id);
    });
  });
  document.querySelectorAll(".pref-btn[data-pref]").forEach(el => {
    const handler = (e) => {
      e.stopPropagation();
      e.preventDefault();
      setPref(el.dataset.pid, el.dataset.pref);
    };
    el.addEventListener("click", handler);
    el.addEventListener("keydown", (e) => {
      if (e.key === "Enter" || e.key === " ") handler(e);
    });
  });
}

function rerenderDict() {
  const host = document.getElementById("tabPanel");
  if (host) host.innerHTML = renderDictionary();
  wireDictionary();
  applyLanguage();
}

// ─────────────────────────────────────────────────────────────
// PLANT DRAWER
// ─────────────────────────────────────────────────────────────
function openDrawer(id) {
  const plant = PLANTS.find(p => p.id === id);
  if (!plant) return;
  state.selectedPlantId = id;
  drawerHost.innerHTML = `
    <div class="drawer-overlay" id="drawerOverlay">
      <div class="drawer slide-in" onclick="event.stopPropagation()">
        <button class="drawer-close" id="drawerClose">✕</button>
        <div class="drawer-swatch" style="background:${plant.color}"></div>
        <div class="drawer-type" data-zh="${plant.type_zh}" data-en="${plant.type_en}">${plant.type_zh}</div>
        <h2 class="drawer-name" data-zh="${plant.zh}" data-en="${plant.en}">${plant.zh}</h2>
        <div class="drawer-en" data-zh="${plant.en}" data-en="${plant.zh}">${plant.en}</div>
        <div class="drawer-latin">${plant.lt}</div>

        <div class="rec-badges" style="margin: 14px 0 4px;">
          ${plant.native
            ? `<span class="badge native">🌱 <span data-zh="原生" data-en="Native">原生</span></span>`
            : `<span class="badge intro">🌍 <span data-zh="外來常見" data-en="Introduced">外來常見</span></span>`}
          ${plant.fragrance >= 2 ? `<span class="badge frag">🌸 ${fragranceBar(plant.fragrance)}</span>` : ""}
          ${plant.pet_safe === true ? `<span class="badge pet">🐾 <span data-zh="寵物安全" data-en="Pet-safe">寵物安全</span></span>` : ""}
          ${plant.pet_safe === false ? `<span class="badge toxic">⚠ <span data-zh="寵物注意" data-en="Pet caution">寵物注意</span></span>` : ""}
        </div>

        ${(() => {
          // 📌 Drawer pin/like/dislike row — same toggles as the rec card so the
          // user can commit to a plant directly from the detail view. Using the
          // pref-btn classes keeps the visual language consistent.
          const isPinned   = !!(state.prefs && state.prefs.pinned   && state.prefs.pinned[plant.id]);
          const isLiked    = !!(state.prefs && state.prefs.liked    && state.prefs.liked[plant.id]);
          const isDisliked = !!(state.prefs && state.prefs.disliked && state.prefs.disliked[plant.id]);
          return `
          <div class="pref-row" style="margin: 10px 0 4px;">
            <span class="pref-btn pin ${isPinned ? "on" : ""}" role="button" tabindex="0"
                  data-pref="pin" data-pid="${plant.id}"
                  title="${t('釘選此植物 · 保證納入你的設計','Pin this plant · guarantee in your design')}">
              📌 <span data-zh="${isPinned ? "已釘選" : "釘選為必納入"}" data-en="${isPinned ? "Pinned" : "Pin to design"}">${isPinned ? "已釘選" : "釘選為必納入"}</span>
            </span>
            <span class="pref-btn like ${isLiked ? "on" : ""}" role="button" tabindex="0"
                  data-pref="like" data-pid="${plant.id}"
                  title="${t('標為喜歡','Mark as liked')}">
              👍 <span data-zh="喜歡" data-en="Like">喜歡</span>
            </span>
            <span class="pref-btn dislike ${isDisliked ? "on" : ""}" role="button" tabindex="0"
                  data-pref="dislike" data-pid="${plant.id}"
                  title="${t('標為不喜歡','Mark as disliked')}">
              👎 <span data-zh="不喜歡" data-en="Pass">不喜歡</span>
            </span>
          </div>`;
        })()}

        <div class="drawer-meta">
          <div class="meta-cell">
            <div class="meta-label" data-zh="角色" data-en="Role">角色</div>
            <div class="meta-val" data-zh="${plant.role_zh}" data-en="${plant.role_en}">${plant.role_zh}</div>
          </div>
          <div class="meta-cell">
            <div class="meta-label" data-zh="高度 × 冠幅" data-en="Height × Spread">高度 × 冠幅</div>
            <div class="meta-val">${plant.height[0]}–${plant.height[1]} × ${plant.spread[0]}–${plant.spread[1]} m</div>
          </div>
          <div class="meta-cell">
            <div class="meta-label" data-zh="成熟期" data-en="To mature">成熟期</div>
            <div class="meta-val" data-zh="約 ${plant.mature_yr ?? "—"} 年" data-en="~ ${plant.mature_yr ?? "—"} years">約 ${plant.mature_yr ?? "—"} 年</div>
          </div>
        </div>

        <div class="drawer-block">
          <div class="drawer-block-title" data-zh="關於這株植物" data-en="About this plant">關於這株植物</div>
          <p class="drawer-text" data-zh="${plant.note_zh}" data-en="${plant.note_en}">${plant.note_zh}</p>
        </div>

        <div class="drawer-block">
          <div class="drawer-block-title" data-zh="原產地 · ORIGIN" data-en="Origin">原產地 · ORIGIN</div>
          <p class="drawer-text" data-zh="${plant.origin_zh ?? "—"}" data-en="${plant.origin_en ?? "—"}">${plant.origin_zh ?? "—"}</p>
        </div>

        <div class="drawer-block">
          <div class="drawer-block-title" data-zh="養護指南" data-en="Care Guide">養護指南</div>
          <p class="drawer-text" data-zh="${plant.care_zh}" data-en="${plant.care_en}">${plant.care_zh}</p>
        </div>

        ${(() => {
          const e = expert(plant);
          const growLabel = { slow:t("慢","slow"), med:t("中","medium"), fast:t("快","fast") }[e.grow_rate] || "—";
          const lifespan = e.lifespan_yr ? `${e.lifespan_yr[0]}–${e.lifespan_yr[1]}` : "—";
          return `
            <div class="drawer-block">
              <div class="drawer-block-title" data-zh="深入資料 · DEEP PROFILE" data-en="Deep Profile">深入資料 · DEEP PROFILE</div>
              <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 14px 18px; margin-top: 10px;">
                <div>
                  <div style="font-size:11px; color:var(--ink-soft); letter-spacing:0.05em;" data-zh="土壤 pH" data-en="Soil pH">土壤 pH</div>
                  <div style="font-size:14px; font-weight:600; color:var(--forest); margin-top:3px; font-family:var(--serif);">${e.soil_ph[0]} – ${e.soil_ph[1]}</div>
                </div>
                <div>
                  <div style="font-size:11px; color:var(--ink-soft); letter-spacing:0.05em;" data-zh="耐寒下限" data-en="Cold tolerance">耐寒下限</div>
                  <div style="font-size:14px; font-weight:600; color:var(--forest); margin-top:3px; font-family:var(--serif);">${e.hardy_c}°C</div>
                </div>
                <div>
                  <div style="font-size:11px; color:var(--ink-soft); letter-spacing:0.05em;" data-zh="生長速度" data-en="Growth rate">生長速度</div>
                  <div style="font-size:14px; font-weight:600; color:var(--forest); margin-top:3px; font-family:var(--serif);" data-zh="${growLabel}" data-en="${growLabel}">${growLabel}</div>
                </div>
                <div>
                  <div style="font-size:11px; color:var(--ink-soft); letter-spacing:0.05em;" data-zh="壽命" data-en="Lifespan">壽命</div>
                  <div style="font-size:14px; font-weight:600; color:var(--forest); margin-top:3px; font-family:var(--serif);">${lifespan} <span style="font-size:11px;opacity:0.7;" data-zh="年" data-en="yr">年</span></div>
                </div>
                <div>
                  <div style="font-size:11px; color:var(--ink-soft); letter-spacing:0.05em;" data-zh="估算 CO₂" data-en="Est. CO₂">估算 CO₂</div>
                  <div style="font-size:14px; font-weight:600; color:var(--sage-deep); margin-top:3px; font-family:var(--serif);">${e.co2_kg_yr} <span style="font-size:11px;opacity:0.7;">kg/yr</span></div>
                </div>
                <div>
                  <div style="font-size:11px; color:var(--ink-soft); letter-spacing:0.05em;" data-zh="估算用水" data-en="Est. water">估算用水</div>
                  <div style="font-size:14px; font-weight:600; color:#3D6086; margin-top:3px; font-family:var(--serif);">${e.water_l_wk} <span style="font-size:11px;opacity:0.7;">L/週</span></div>
                </div>
              </div>
            </div>

            <div class="drawer-block">
              <div class="drawer-block-title" data-zh="繁殖方式 · PROPAGATION" data-en="Propagation">繁殖方式 · PROPAGATION</div>
              <p class="drawer-text" data-zh="${e.propagation_zh ?? "—"}" data-en="${e.propagation_en ?? "—"}">${e.propagation_zh ?? "—"}</p>
            </div>

            ${e.issues_zh && e.issues_zh.length ? `
              <div class="drawer-block">
                <div class="drawer-block-title" data-zh="常見病蟲害" data-en="Common pests / diseases">常見病蟲害</div>
                <div class="drawer-supports">
                  ${(state.lang === "zh" ? e.issues_zh : e.issues_en).map(s => `<span class="chip" style="background:rgba(178,58,48,0.10); color:#8C2A22; border-color:rgba(178,58,48,0.28);">${s}</span>`).join("")}
                </div>
              </div>` : ""}

            ${e.ethno_zh ? `
              <div class="drawer-block">
                <div class="drawer-block-title" data-zh="文化 / 民族植物學 · ETHNOBOTANY" data-en="Cultural / ethnobotanical">文化 / 民族植物學 · ETHNOBOTANY</div>
                <p class="drawer-text" data-zh="${e.ethno_zh}" data-en="${e.ethno_en}">${e.ethno_zh}</p>
              </div>` : ""}
          `;
        })()}

        <div class="drawer-block">
          <div class="drawer-block-title" data-zh="生態貢獻" data-en="Ecological role">生態貢獻</div>
          <div class="drawer-supports">
            ${(state.lang === "zh" ? plant.supports_zh : plant.supports_en).map(s => `<span class="chip">${s}</span>`).join("")}
          </div>
          ${wildlife(plant).length ? `
            <div style="font-size: 11.5px; letter-spacing: 0.08em; color: var(--clay-deep); font-weight: 600; margin-top: 14px; margin-bottom: 8px;"
                 data-zh="會吸引這些訪客 · WILDLIFE GUESTS" data-en="Wildlife visitors">會吸引這些訪客 · WILDLIFE GUESTS</div>
            <div class="drawer-supports">
              ${wildlife(plant).map(w => `<span class="chip" style="background: rgba(196,160,76,0.13); color: #8C6F1E; border-color: rgba(196,160,76,0.32);">${w.i} <span data-zh="${w.zh}" data-en="${w.en}">${w.zh}</span></span>`).join("")}
            </div>` : ""}
        </div>

        ${plant.companions && plant.companions.length ? `
          <div class="drawer-block">
            <div class="drawer-block-title" data-zh="搭配建議" data-en="Companion plants">搭配建議</div>
            <div class="drawer-companions">
              ${plant.companions.map(cid => {
                const c = PLANTS.find(x => x.id === cid);
                if (!c) return "";
                return `<button class="companion-pill" data-cid="${cid}"><span data-zh="${c.zh}" data-en="${c.en}">${c.zh}</span></button>`;
              }).join("")}
            </div>
          </div>` : ""}

        <div class="drawer-block">
          <div class="drawer-block-title" data-zh="哪裡可以買 · SOURCING" data-en="Where to find · SOURCING">哪裡可以買 · SOURCING</div>
          <p class="drawer-text" data-zh="${plant.sourcing_zh ?? "—"}" data-en="${plant.sourcing_en ?? "—"}">${plant.sourcing_zh ?? "—"}</p>
        </div>

        <div class="drawer-foot" data-zh="Biodiversity Living System · 植物資料庫" data-en="Biodiversity Living System · Plant Database">Biodiversity Living System · 植物資料庫</div>
      </div>
    </div>`;
  document.getElementById("drawerOverlay").addEventListener("click", closeDrawer);
  document.getElementById("drawerClose").addEventListener("click", (e) => { e.stopPropagation(); closeDrawer(); });
  // Companion pill clicks → switch the drawer to the companion plant
  document.querySelectorAll(".companion-pill").forEach((el) => {
    el.addEventListener("click", (e) => { e.stopPropagation(); openDrawer(el.dataset.cid); });
  });
  // 📌/👍/👎 inside the drawer — scoped to the drawer overlay so we don't
  // double-bind the rec-grid pref-btns underneath. setPref triggers a re-render
  // of the result page, so we re-open the drawer afterwards to refresh its state.
  document.querySelectorAll("#drawerOverlay .pref-btn[data-pref]").forEach(el => {
    const handler = (e) => {
      e.stopPropagation();
      e.preventDefault();
      const pid = el.dataset.pid;
      const kind = el.dataset.pref;
      setPref(pid, kind);
      // setPref re-renders the result page; re-open the drawer so the toggle
      // state visually updates without the user having to dismiss and re-tap.
      openDrawer(pid);
    };
    el.addEventListener("click", handler);
    el.addEventListener("keydown", (e) => {
      if (e.key === "Enter" || e.key === " ") handler(e);
    });
  });
  applyLanguage();
}

function closeDrawer() {
  state.selectedPlantId = null;
  drawerHost.innerHTML = "";
}

// ─────────────────────────────────────────────────────────────
// Language toggle (zh/en) — same data-zh/data-en pattern as farm-pitch.html
// ─────────────────────────────────────────────────────────────
function applyLanguage() {
  document.querySelectorAll("[data-zh][data-en]").forEach((el) => {
    el.innerHTML = el.dataset[state.lang];
  });
  document.documentElement.lang = state.lang === "zh" ? "zh-Hant" : "en";
  document.getElementById("langToggle").textContent = state.lang === "zh" ? "English" : "中文";
}

document.getElementById("langToggle").addEventListener("click", () => {
  state.lang = state.lang === "zh" ? "en" : "zh";
  render();
});

// ─────────────────────────────────────────────────────────────
// Share + LINE (matches farm-pitch.html pattern)
// ─────────────────────────────────────────────────────────────
function updateLineShare() {
  const text = state.lang === "zh"
    ? `我用 AI Landscape Copilot 規劃了一個原生植物景觀 — 來看看你的 → ${location.href}`
    : `I designed a native plant landscape with AI Landscape Copilot — try yours → ${location.href}`;
  document.getElementById("lineShareBtn").href = `https://line.me/R/share?text=${encodeURIComponent(text)}`;
}

window.copyShareLink = async function(btn) {
  try {
    await navigator.clipboard.writeText(location.href);
    const original = btn.innerHTML;
    btn.innerHTML = `✓ <span>${state.lang === "zh" ? "已複製" : "Copied"}</span>`;
    setTimeout(() => { btn.innerHTML = original; applyLanguage(); }, 1800);
  } catch (e) {
    prompt(state.lang === "zh" ? "請手動複製此連結：" : "Please copy this link:", location.href);
  }
};

// ─────────────────────────────────────────────────────────────
// Init
// ─────────────────────────────────────────────────────────────
// Try restoring from URL hash (shared / bookmarked) or localStorage before first render.
// If hash is present → go straight to the restored result page.
// If only localStorage → stay on home but show a "welcome back" banner offering to resume.
tryRestoreDashboard();
updateLineShare();
render();
</script>
</body>
</html>
