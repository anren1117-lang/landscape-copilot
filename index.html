function wireMyDesignsSection() {
  document.querySelectorAll(".my-design-card").forEach((card) => {
    card.addEventListener("click", (e) => {
      // Ignore clicks on the action buttons
      if (e.target.closest("button")) return;
      const id = card.dataset.designId;
      // In "select second design" mode, clicking a pickable card sets the
      // second id and triggers a re-render — which swaps the grid for the
      // compare panel via renderMyDesignsSection().
      if (card.classList.contains("compare-pickable")) {
        state.compareSecondId = id;
        renderHome();
        applyLanguage();
        return;
      }
      // If user clicks the first-picked card in select-second mode, treat
      // it as "cancel" — restore the normal grid without comparing.
      if (card.classList.contains("compare-first")) {
        state.compareFirstId = null;
        renderHome();
        applyLanguage();
        return;
      }
      resumeDesignById(id);
    });
  });
  // "↔ 比較" — arm the first id (or disarm if the same card is tapped again).
  document.querySelectorAll("[data-design-compare]").forEach((btn) => {
    btn.addEventListener("click", (e) => {
      e.stopPropagation();
      const id = btn.dataset.designCompare;
      if (state.compareFirstId === id) {
        state.compareFirstId = null;     // toggle off
      } else {
        state.compareFirstId = id;
        state.compareSecondId = null;    // entering select-second mode
      }
      renderHome();
      applyLanguage();
    });
  });
  // Exit compare → clear both ids and rebuild the grid.
  const exitBtn = document.getElementById("compareExitBtn");
  if (exitBtn) {
    exitBtn.addEventListener("click", () => {
      state.compareFirstId = null;
      state.compareSecondId = null;
      renderHome();
      applyLanguage();
    });
  }
  // "✓ 用這個設計繼續" → set active and jump to result page for the chosen side.
  document.querySelectorAll("[data-compare-continue]").forEach((btn) => {
    btn.addEventListener("click", (e) => {
      e.stopPropagation();
      const id = btn.dataset.compareContinue;
      state.compareFirstId = null;
      state.compareSecondId = null;
      resumeDesignById(id);
    });
  });
  document.querySelectorAll("[data-design-rename]").forEach((btn) => {
    btn.addEventListener("click", (e) => {
      e.stopPropagation();
      const id = btn.dataset.designRename;
      const entry = loadDesignById(id);
      if (!entry) return;
      const newName = prompt(t("重新命名這個設計：", "Rename this design:"), entry.name);
      if (newName !== null) {
        renameDesign(id, newName);
        renderHome();
        applyLanguage();
      }
    });
  });
  document.querySelectorAll("[data-design-delete]").forEach((btn) => {
    btn.addEventListener("click", (e) => {
      e.stopPropagation();
      const id = btn.dataset.designDelete;
      const entry = loadDesignById(id);
      if (!entry) return;
      if (confirm(t(`確定刪除「${entry.name}」？此操作無法復原。`, `Delete "${entry.name}"? This can't be undone.`))) {
        deleteDesignById(id);
        // Deleted card might have been part of an active compare — clear safely.
        if (state.compareFirstId === id) state.compareFirstId = null;
        if (state.compareSecondId === id) state.compareSecondId = null;
        renderHome();
        applyLanguage();
      }
    });
  });
}

// Resume a saved design — copy its snapshot into state and jump to the result page.
function resumeDesignById(id) {
  const entry = loadDesignById(id);
  if (!entry) return;
  applySnapshot(entry.snapshot);
  setActiveDesignId(id);
  state.pendingSnapshot = null;
  // Critic round-5 catch: don't let the previous design's photo + AI suggestions
  // leak into the resumed one (balcony photo following user into a yard design).
  state.wizardPhotoDataUrl = null;
  state.wizardPhotoSuggest = {};
  state.wizardPhotoSuggestActed = {};
  state.wizardPhotoOpen = {};
  state.wizardPhotoBusy = {};
  state.wizardPhotoError = {};
  state.viewingShared = false;
  state.view = "wizard";
  state.step = 5;
  state.resultTab = "preview";
  initShoppingQty();
  // Reapply any qty the snapshot saved
  if (entry.snapshot.qty && typeof entry.snapshot.qty === "object") {
    state.qty = { ...state.qty, ...entry.snapshot.qty };
  }
  render();
  window.scrollTo({ top: 0, behavior: "smooth" });
}

// Small ephemeral toast — used when the user saves a design.
function showSaveToast(msgZh, msgEn) {
  const el = document.createElement("div");
  el.className = "save-toast";
  el.dataset.zh = msgZh;
  el.dataset.en = msgEn;
  el.textContent = state.lang === "zh" ? msgZh : msgEn;
  document.body.appendChild(el);
  setTimeout(() => { el.style.transition = "opacity .4s"; el.style.opacity = "0"; }, 2400);
  setTimeout(() => { el.remove(); }, 2900);
}

const app = document.getElementById("app");
const progressWrap = document.getElementById("progressWrap");
const navFooter = document.getElementById("navFooter");
const drawerHost = document.getElementById("drawerHost");

function t(zh, en) { return state.lang === "zh" ? zh : en; }

function render() {
  // R31 — when we're about to leave the result page (anything other than
  // wizard step 5), detach the tab-bar fade-edge scroll listener so it
  // doesn't keep a dead DOM node referenced. renderResult() re-attaches it.
  const leavingResult = !(state.view === "wizard" && state.step === 5);
  if (leavingResult && window.__tabsFadeCleanup) {
    try { window.__tabsFadeCleanup(); } catch (e) { /* node already gone */ }
    window.__tabsFadeCleanup = null;
  }
  // Top-bar left content switches based on view: brand on home, "← back to home" link elsewhere.
  const tbLeft = document.getElementById("topBarLeft");
  if (state.view === "home") {
    tbLeft.innerHTML = `<span style="font-weight:600; color:var(--sage-deep); letter-spacing:0.02em;" data-zh="🌿 AI Landscape Copilot" data-en="🌿 AI Landscape Copilot">🌿 AI Landscape Copilot</span>`;
  } else {
    tbLeft.innerHTML = `<a href="#" id="backHomeLink" style="color: var(--sage-deep); text-decoration: none; font-weight: 600; font-size: 13px;" data-zh="← 回首頁" data-en="← Home">← 回首頁</a>`;
    document.getElementById("backHomeLink").addEventListener("click", (e) => {
      e.preventDefault();
      state.view = "home";
      render();
      window.scrollTo({ top: 0, behavior: "smooth" });
    });
  }

  // Photo view — its own dedicated flow before optionally jumping to results
  if (state.view === "photo") {
    progressWrap.innerHTML = "";
    document.querySelector("header.brand").style.display = "";
    renderPhotoFlow();
    navFooter.innerHTML = "";
    applyLanguage();
    return;
  }

  // Hide the progress dots and brand header on the homepage so the landing feels clean.
  if (state.view === "home") {
    progressWrap.innerHTML = "";
    document.querySelector("header.brand").style.display = "none";
    renderHome();
    navFooter.innerHTML = "";
    applyLanguage();
    return;
  }

  // Otherwise we're in the wizard / result flow — show progress + brand header again.
  document.querySelector("header.brand").style.display = "";
  progressWrap.innerHTML = state.step < 5 ? STEPS.slice(0,5).map((_, i) =>
    `<div class="progress-dot ${i <= state.step ? "on" : ""}"></div>`).join("") : "";

  switch (state.step) {
    case 0: renderSpace(); break;
    case 1: renderDetails(); break;
    case 2: renderSun(); break;
    case 3: renderWater(); break;
    case 4: renderGoals(); break;
    case 5: renderResult(); break;
  }

  renderNav();
  applyLanguage();
}

// ── MONTHLY SPOTLIGHT PLANT (本月主角植物) ──────────────────
// Surfaces ONE plant that's in bloom right now, native, and has a rich
// cultural note in EXPERT_META — a small daily-stable invitation card on
// the homepage. Falls through gracefully if nothing qualifies.
function pickSpotlightPlant() {
  const now = new Date();
  const curMonth = now.getMonth() + 1;
  // Primary pool: in bloom + native + has cultural_zh (rich content)
  const rich = PLANTS.filter(p =>
    Array.isArray(p.bloom) && p.bloom.includes(curMonth)
    && p.native
    && EXPERT_META[p.id] && EXPERT_META[p.id].cultural_zh
  );
  // Fallback pool: any plant in bloom this month
  const blooming = PLANTS.filter(p =>
    Array.isArray(p.bloom) && p.bloom.includes(curMonth)
  );
  const pool = rich.length > 0 ? rich : blooming;
  if (pool.length === 0) return null;
  // Pseudo-random pick seeded by YYYY-MM-DD so it's stable for the whole day.
  const seedStr = `${now.getFullYear()}-${curMonth}-${now.getDate()}`;
  let h = 0;
  for (let i = 0; i < seedStr.length; i++) h = (h * 31 + seedStr.charCodeAt(i)) | 0;
  const idx = Math.abs(h) % pool.length;
  return pool[idx];
}

function renderSpotlightPlantWidget() {
  const p = pickSpotlightPlant();
  if (!p) return "";
  const curMonth = new Date().getMonth() + 1;
  const meta = EXPERT_META[p.id] || {};
  const truncate = (s, n) => {
    if (!s) return "";
    return s.length > n ? s.slice(0, n) + "…" : s;
  };
  const noteZh = truncate(p.note_zh || "", 80);
  const noteEn = truncate(p.note_en || "", 120);
  const monthNamesEn = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  const monthLabelZh = `${curMonth} 月正盛開`;
  const monthLabelEn = `Blooming in ${monthNamesEn[curMonth - 1]}`;
  const culturalZh = meta.cultural_zh ? truncate(meta.cultural_zh, 90) : "";
  const culturalEn = meta.cultural_en ? truncate(meta.cultural_en, 130) : "";
  const swatch = p.color || "var(--sage)";
  return `
    <button type="button" class="spotlight-plant" id="spotlightPlantCard" data-pid="${escapeHtml(p.id)}"
            aria-label="${escapeHtml(t('查看本月主角植物：' + p.zh, 'View this month’s featured plant: ' + p.en))}">
      <span class="sp-swatch" style="background:${escapeHtml(swatch)}" aria-hidden="true"></span>

        <span class="sp-latin">${escapeHtml(p.lt || "")} · <span data-zh="${escapeHtml(monthLabelZh)}" data-en="${escapeHtml(monthLabelEn)}">${escapeHtml(monthLabelZh)}</span></span>
        ${noteZh ? `<span class="sp-note" data-zh="${escapeHtml(noteZh)}" data-en="${escapeHtml(noteEn || noteZh)}">${escapeHtml(noteZh)}</span>` : ""}
        ${culturalZh ? `<span class="sp-cultural" data-zh="✦ ${escapeHtml(culturalZh)}" data-en="✦ ${escapeHtml(culturalEn || culturalZh)}">✦ ${escapeHtml(culturalZh)}</span>` : ""}
      </span>
      <span class="sp-arrow" aria-hidden="true">→</span>
    </button>`;
}

      state.step = 5;
      state.resultTab = "preview";

      render();
      window.scrollTo({ top: 0, behavior: "smooth" });
    });

    discard.addEventListener("click", () => {
      clearLocal();
      state.pendingSnapshot = null;
      history.replaceState(null, "", location.pathname);
      render();
    });
  }

  // Shared-link conflict banner — 3 explicit choices, no silent clobber.
  const viewSharedBtn = document.getElementById("scViewSharedBtn");
  if (viewSharedBtn) {
    viewSharedBtn.addEventListener("click", () => {
      // View the shared design without touching localStorage.
      // Keeps the user's saved design safe — they can return to it later via "Resume" (we still have it).
      // To avoid the result page calling persistDashboard() and overwriting local with the shared one,
      // we leave state.shareConflict on; persistDashboard() honors it as a guard.
      const shared = state.pendingSharedSnapshot;
      applySnapshot(shared);
      // Important: don't clear pendingSnapshot; the user might still want to keep theirs after viewing.
      state.view = "wizard";
      state.step = 5;
      state.resultTab = "preview";
      state.viewingShared = true;            // Banner on result page will say "viewing shared, not saved".
      initShoppingQty();
      render();
      window.scrollTo({ top: 0, behavior: "smooth" });
    });
  }
  const keepMineBtn = document.getElementById("scKeepMineBtn");
  if (keepMineBtn) {
    keepMineBtn.addEventListener("click", () => {
      // Drop the shared link, restore the welcome-back banner offering to resume the local design.
      state.pendingSharedSnapshot = null;
      state.shareConflict = false;
      state.viewingShared = false;
      // Strip the #d= from the URL so a refresh won't re-trigger the conflict.
      history.replaceState(null, "", location.pathname);
      render();
    });
  }
  const saveCopyBtn = document.getElementById("scSaveCopyBtn");
  if (saveCopyBtn) {
    saveCopyBtn.addEventListener("click", () => {
      // Replace the local design with the shared one and open the result page.
      // This is a destructive choice — the user explicitly opted in.
      const shared = state.pendingSharedSnapshot;
      applySnapshot(shared);
      state.pendingSharedSnapshot = null;
      state.pendingSnapshot = null;
      state.shareConflict = false;
      state.viewingShared = false;
      saveToLocal();             // Persist now, before render() opens the result page.

      state.step = 5;
      state.resultTab = "preview";
      initShoppingQty();
      render();
      window.scrollTo({ top: 0, behavior: "smooth" });
    });
  }
}

  state.view = "photo";
  state.photoDataUrl = null;
  state.photoAnalysis = null;
  state.photoStatus = "";
  state.photoStatusKind = "";
  render();
  window.scrollTo({ top: 0, behavior: "smooth" });
}

// Label helpers for the analysis display
function spaceZh(k) { return ({ balcony:"陽台", rooftop:"頂樓", yard:"庭院 / 中庭", indoor:"室內窗邊" })[k] || "陽台"; }
function spaceEn(k) { return ({ balcony:"Balcony", rooftop:"Rooftop", yard:"Yard / Courtyard", indoor:"Indoor / Window" })[k] || "Balcony"; }
function sunZh(k)   { return ({ full:"全日照（6h+）", part:"半日照（3-5h）", shade:"遮陰（散射光）" })[k] || "半日照"; }
function sunEn(k)   { return ({ full:"Full sun (6h+)", part:"Part sun (3-5h)", shade:"Shade (diffuse)" })[k] || "Part sun"; }

function wirePhotoFlow() {
  // File picker
  const fileInput = document.getElementById("photoInput");
  if (fileInput) {
    fileInput.addEventListener("change", (e) => {
      const f = e.target.files[0];
      if (f) handlePhotoFile(f);
    });
  }
  // Drag-and-drop on the dropzone
  const dz = document.getElementById("dropzone");
  if (dz) {
    ["dragenter","dragover"].forEach(ev => dz.addEventListener(ev, (e) => { e.preventDefault(); dz.classList.add("drag"); }));
    ["dragleave","dragend","drop"].forEach(ev => dz.addEventListener(ev, (e) => { e.preventDefault(); dz.classList.remove("drag"); }));
    dz.addEventListener("drop", (e) => { e.preventDefault(); const f = e.dataTransfer.files[0]; if (f) handlePhotoFile(f); });
    // Keyboard activation — Enter/Space triggers the file picker
    dz.addEventListener("keydown", (e) => {
      if (e.key === "Enter" || e.key === " ") {
        e.preventDefault();
        fileInput?.click();
      }
    });
  }

  // Re-take — drops the current photo + any analysis and returns to upload state.
  // Available both BEFORE analysis (next to Analyze) and AFTER analysis (so the
  // user who doesn't love the AI result can shoot a clearer photo without
  // dragging through the dropzone again).
  const retake = document.getElementById("retakeBtn");
  if (retake) {
    retake.addEventListener("click", () => {
      // If an analysis is in flight, cancel it first so the success/failure
      // status doesn't fire on a stale, deleted photoDataUrl.
      if (state.photoBusy) { try { cancelVisionRequest(); } catch (_) {} }
      state.photoDataUrl = null;
      state.photoAnalysis = null;
      state.photoStatus = "";
      state.photoStatusKind = "";
      renderPhotoFlow();
      applyLanguage();
    });
  }

  // Analyze
  const analyze = document.getElementById("analyzeBtn");
  if (analyze) analyze.addEventListener("click", analyzePhoto);

  // Generate with analysis
  const gen = document.getElementById("photoGenerateBtn");
  if (gen) gen.addEventListener("click", () => applyPhotoAnalysisAndGenerate());

  // Tune details first — apply detected and jump to wizard step 1 (details)
  const tune = document.getElementById("photoTuneBtn");
  if (tune) tune.addEventListener("click", () => applyPhotoAnalysisAndTune());
}

// Read the file, downscale to max 1024px wide via canvas, store as data URL.
function handlePhotoFile(file) {
  if (!file.type.startsWith("image/")) {
    state.photoStatus = t("不支援的檔案格式 — 請選擇圖片", "Unsupported file — pick an image");
    state.photoStatusKind = "err";
    renderPhotoFlow(); applyLanguage();
    return;
  }
  const reader = new FileReader();
  reader.onload = (e) => {
    const img = new Image();
    img.onload = () => {
      const maxW = 1024;
      const scale = img.width > maxW ? maxW / img.width : 1;
      const w = Math.round(img.width * scale);
      const h = Math.round(img.height * scale);
      const canvas = document.createElement("canvas");
      canvas.width = w; canvas.height = h;
      const ctx = canvas.getContext("2d");
      ctx.drawImage(img, 0, 0, w, h);
      state.photoDataUrl = canvas.toDataURL("image/jpeg", 0.85);
      state.photoStatus = "";
      state.photoStatusKind = "";
      renderPhotoFlow();
      applyLanguage();
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

// Vision-call lifecycle helpers — single in-flight AbortController + 30s timeout
// so the wizard / photo flow can never get stuck on a slow or stalled
// Pollinations response. User-facing Cancel buttons call `cancelVisionRequest`.
const VISION_TIMEOUT_MS = 30_000;
let visionAbort = null;

// Rotating progress copy — keeps the spinner status feeling alive during the
// 15-30s vision call instead of a single static "Analyzing…" line. Cycles
// through a small bilingual script every ~4.5s. Used by both the dedicated
// photo flow (writes to state.photoStatus) and the wizard photo-assist
// (writes to state.wizardPhotoError on the active step). The interval is
// owned globally so cancelling/finishing a call can stop it cleanly.
const VISION_PROGRESS_STEPS = [
  { zh: "🔍 AI 正在看你的空間...",   en: "🔍 AI is examining your space..." },
  { zh: "📐 估算尺寸與朝向...",      en: "📐 Estimating dimensions and orientation..." },
  { zh: "🌿 媒合 184 種植物資料...", en: "🌿 Matching against 184 plant species..." },
];
let visionProgressTimer = null;
function startVisionProgressRotation(applyFn) {
  stopVisionProgressRotation();
  let i = 0;
  applyFn(VISION_PROGRESS_STEPS[i]);
  visionProgressTimer = setInterval(() => {
    i = (i + 1) % VISION_PROGRESS_STEPS.length;
    applyFn(VISION_PROGRESS_STEPS[i]);
  }, 4500);
}
function stopVisionProgressRotation() {
  if (visionProgressTimer) { clearInterval(visionProgressTimer); visionProgressTimer = null; }
}
function startVisionRequest() {
  // If something is already running (shouldn't be, but defensively), abort it.
  if (visionAbort) { try { visionAbort.abort("superseded"); } catch (_) {} }
  const controller = new AbortController();
  const timer = setTimeout(() => { try { controller.abort("timeout"); } catch (_) {} }, VISION_TIMEOUT_MS);
  visionAbort = controller;
  visionAbort._timer = timer;
  return controller;
}
function endVisionRequest(controller) {
  if (controller && controller._timer) clearTimeout(controller._timer);
  if (visionAbort === controller) visionAbort = null;
}
window.cancelVisionRequest = function () {
  if (visionAbort) { try { visionAbort.abort("user_cancel"); } catch (_) {} }
};

// Call Pollinations.ai vision endpoint to analyze the photo and return JSON.
async function analyzePhoto() {
  const btn = document.getElementById("analyzeBtn");
  if (btn) btn.disabled = true;
  state.photoStatus = t("分析中… 約 15-30 秒", "Analyzing… 15-30s");
  state.photoStatusKind = "";
  state.photoBusy = true;
  renderPhotoFlow();
  applyLanguage();
  // Cycle through specific progress copy ("looking at space", "estimating
  // size", "matching plants") so the long wait feels like real work happening
  // rather than a generic spinner. The interval writes directly to the
  // already-rendered #photoStatus node so we don't trigger a full re-render
  // every 4.5s (which would tear down event handlers).
  startVisionProgressRotation((step) => {
    state.photoStatus = t(step.zh, step.en);
    const node = document.getElementById("photoStatus");
    if (node) {
      node.innerHTML = `<span class="photo-spinner"></span>${state.photoStatus}`;
      node.setAttribute("data-zh", `<span class="photo-spinner"></span>${step.zh}`);
      node.setAttribute("data-en", `<span class="photo-spinner"></span>${step.en}`);
    }
  });

  const systemPrompt = `You are a landscape design assistant in Taiwan analyzing a photo of someone's planting space. Output ONLY valid JSON, no markdown, no commentary. Use this exact schema:
{
  "space": "balcony" | "rooftop" | "yard" | "indoor",
  "sun": "full" | "part" | "shade",
  "estimated_width_m": number,
  "estimated_depth_m": number,
  "orientation_guess": "N" | "E" | "S" | "W" | "unknown",
  "coastal": true | false,
  "observations": "1-2 short sentences in Traditional Chinese describing what you see — current condition, existing plants if any, any concerns."
}`;
  const userPrompt = `Analyze this photo of a planting space in Taiwan and respond with ONLY the JSON object.`;

  const controller = startVisionRequest();
  try {
    const resp = await fetch("https://text.pollinations.ai/openai", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      signal: controller.signal,
      body: JSON.stringify({
        model: "openai",
        messages: [
          { role: "system", content: systemPrompt },
          { role: "user", content: [
            { type: "text", text: userPrompt },
            { type: "image_url", image_url: { url: state.photoDataUrl } },
          ]},
        ],
        response_format: { type: "json_object" },
      }),
    });
    if (!resp.ok) throw new Error("API " + resp.status);
    const data = await resp.json();
    const text = data?.choices?.[0]?.message?.content || "";
    // Try to extract JSON even if wrapped in code fences
    const jsonText = (text.match(/\{[\s\S]*\}/) || [text])[0];
    const parsed = JSON.parse(jsonText);
    stopVisionProgressRotation();
    state.photoAnalysis = parsed;
    state.photoStatus = t("✓ 分析完成", "✓ Analysis complete");
    state.photoStatusKind = "ok";
    state.photoBusy = false;
    renderPhotoFlow();
    applyLanguage();
  } catch (err) {
    const reason = controller.signal.reason;
    // Superseded by a newer call — silently return so the in-flight call's UI
    // (busy spinner / its own status) isn't clobbered by this stale catch.
    if (reason === "superseded") {
      endVisionRequest(controller);
      return;
    }
    stopVisionProgressRotation();
    state.photoBusy = false;
    if (reason === "user_cancel") {
      state.photoStatus = t("已取消分析", "Analysis cancelled");
      state.photoStatusKind = "err";
    } else if (reason === "timeout") {
      state.photoStatus = t("AI 回應太久 — 可重試或改用「回答問題」流程", "AI took too long — retry or use the questions wizard");
      state.photoStatusKind = "err";
    } else {
      state.photoStatus = t("分析失敗 — 可改用「回答問題」流程", "Analysis failed — try the questions wizard");
      state.photoStatusKind = "err";
    }
    renderPhotoFlow();
    applyLanguage();
  } finally {
    stopVisionProgressRotation();
    endVisionRequest(controller);
  }
}

// Apply detected values to state and generate the result page directly.
function applyPhotoAnalysisAndGenerate() {
  const a = state.photoAnalysis;
  if (!a) return;
  state.space = a.space || "balcony";
  state.sun = a.sun || "part";
  state.water = "med";       // safe default — user can change in wizard later
  state.widthM = a.estimated_width_m || SPACE_DEFAULTS[state.space].w;
  state.depthM = a.estimated_depth_m || SPACE_DEFAULTS[state.space].d;
  state.orientation = (a.orientation_guess && a.orientation_guess !== "unknown") ? a.orientation_guess : "S";
  state.detected = a.coastal ? { county: null, zone: "C", coastal: true } : state.detected;
  state.goals = ["pollinator","easy"];  // sensible default goals
  state.view = "wizard";
  state.step = 5;
  state.resultTab = "preview";
  initShoppingQty();
  render();
  window.scrollTo({ top: 0, behavior: "smooth" });
}

// Apply detected, then jump to wizard step 1 (details) so user can fine-tune.
function applyPhotoAnalysisAndTune() {
  const a = state.photoAnalysis;
  if (!a) return;
  state.space = a.space || "balcony";
  state.sun = a.sun || "part";
  state.widthM = a.estimated_width_m || SPACE_DEFAULTS[state.space].w;
  state.depthM = a.estimated_depth_m || SPACE_DEFAULTS[state.space].d;
  state.orientation = (a.orientation_guess && a.orientation_guess !== "unknown") ? a.orientation_guess : "S";
  if (a.coastal) state.detected = { county: null, zone: "C", coastal: true };
  state.view = "wizard";
  state.step = 1;            // Land on Details step so user can tweak
  render();
  window.scrollTo({ top: 0, behavior: "smooth" });
}

// Bring the user from home into the wizard, freshly initialized.
function startWizard() {
  state.view = "wizard";
  state.step = 0;
  render();
  window.scrollTo({ top: 0, behavior: "smooth" });
}

// Jump straight to the dictionary tab, skipping the wizard entirely.
// Pre-fills sensible defaults so the result-page rendering doesn't crash.
function jumpToDictionary() {
  state.view = "wizard";
  if (!state.space) state.space = "balcony";
  if (state.widthM == null) state.widthM = SPACE_DEFAULTS[state.space].w;
  if (state.depthM == null) state.depthM = SPACE_DEFAULTS[state.space].d;
  if (!state.sun) state.sun = "part";
  if (!state.water) state.water = "med";
  state.resultTab = "dict";
  state.step = 5;
  initShoppingQty();
  render();
  window.scrollTo({ top: 0, behavior: "smooth" });
}

// Pre-fill state from a preset and jump straight to the result page.
// Mirrors applyQuickFilter's "no-questions" pattern but lands on the plan view.
function applyDesignPreset(presetId) {
  const preset = DESIGN_PRESETS.find(p => p.id === presetId);
  if (!preset) return;

  // Clear any half-answered wizard state so the preset is the source of truth.
  state.space = preset.space;
  state.sun = preset.sun;
  state.water = preset.water;
  state.goals = Array.isArray(preset.goals) ? [...preset.goals] : [];
  state.widthM = SPACE_DEFAULTS[preset.space].w;
  state.depthM = SPACE_DEFAULTS[preset.space].d;
  state.orientation = "S";
  state.nativeOnly = !!preset.nativeOnly;
  state.address = "";
  state.detected = preset.detected ? { ...preset.detected } : null;
  state.qty = {};
  state.prefs = { liked: {}, disliked: {}, pinned: {} };
  state.designPresetId = preset.id;

  // Optional: auto-pin plants matching the preset's filter (e.g. fragrance >= 2).
  if (typeof preset.pinFilter === "function") {
    for (const p of PLANTS) {
      try {
        if (preset.pinFilter(p, expert(p))) state.prefs.pinned[p.id] = true;
      } catch (_) { /* skip plants the filter can't evaluate */ }
    }
  }

  // Optional: auto-pin explicit plant IDs (e.g. butterfly host plants by name).
  // Silently skips IDs not present in PLANTS so the preset stays robust if a
  // plant gets renamed/removed. The pin gets a +50 score boost in scorePlants
  // so these become the design's centerpieces.
  if (Array.isArray(preset.pinList)) {
    const known = new Set(PLANTS.map(p => p.id));
    for (const id of preset.pinList) {
      if (known.has(id)) state.prefs.pinned[id] = true;
    }
  }

  // Optional: auto-dislike plants matching a filter (e.g. pet_safe=false for
  // the kid-safe preset). Dislikes are auditable — they show up in the
  // preferences UI and can be cleared with "清除偏好". −15 each so they
  // generally fall out of the top recommendations.
  if (typeof preset.dislikeFilter === "function") {
    for (const p of PLANTS) {
      try {
        if (preset.dislikeFilter(p, expert(p))) state.prefs.disliked[p.id] = true;
      } catch (_) { /* skip plants the filter can't evaluate */ }
    }
  }

  state.view = "wizard";
  state.step = 5;
  state.resultTab = "preview";
  initShoppingQty();
  render();
  window.scrollTo({ top: 0, behavior: "smooth" });
}

// Apply a pre-set filter on the dictionary view and jump there.
function applyQuickFilter(kind) {
  // Reset baseline so multiple clicks don't compound filters unexpectedly
  state.dictQuery = "";
  state.dictTier = "all";
  state.dictNative = "all";
  state.dictFragOnly = false;
  state.dictPetSafeOnly = false;
  state.dictWater = "all";
  state.dictSpace = "all";
  state.dictEdibleOnly = false;
  state.dictCoastalOnly = false;
  state.dictThisMonth = false;

  switch (kind) {
    case "thisMonth": state.dictThisMonth = true; break;
    case "petSafe":   state.dictPetSafeOnly = true; break;
    case "drought":   state.dictWater = "low"; break;
    case "indoor":    state.dictSpace = "indoor"; break;
    case "fragrant":  state.dictFragOnly = true; break;
    case "edible":    state.dictEdibleOnly = true; break;
    case "native":    state.dictNative = "native"; break;
    case "coastal":   state.dictCoastalOnly = true; break;
  }
  jumpToDictionary();
}

// R34 — small horizontal strip under the kicker showing all 5 wizard steps.
// Current step highlighted (sage background, white text), past steps marked
// with a check, future steps muted. Labels collapse to icon-only on mobile.
const WIZARD_STEP_DEFS = [
  { idx: 0, icon: "📍", zh: "空間", en: "Space" },
  { idx: 1, icon: "📐", zh: "細節", en: "Details" },
  { idx: 2, icon: "☀",  zh: "日照", en: "Sun" },
  { idx: 3, icon: "💧", zh: "水分", en: "Water" },
  { idx: 4, icon: "🎯", zh: "願景", en: "Goals" },
];
function wizardStepsHTML(currentIdx) {
  const parts = WIZARD_STEP_DEFS.map((s, i) => {
    let cls = "wiz-step ";
    let icon = s.icon;
    if (i < currentIdx) { cls += "done"; icon = "✓"; }
    else if (i === currentIdx) cls += "current";
    else cls += "future";
    const ariaCurrent = i === currentIdx ? ' aria-current="step"' : "";
    return `<span class="${cls}"${ariaCurrent}>` +
      `<span class="wiz-step-ico" aria-hidden="true">${icon}</span>` +
      `<span class="wiz-step-label-zh" data-zh="${escapeHtml(s.zh)}" data-en="${escapeHtml(s.en)}">${escapeHtml(s.zh)}</span>` +
      `</span>`;
  });
  return `<nav class="wiz-steps" aria-label="${state.lang === "en" ? "Wizard progress" : "問卷進度"}">${parts.join('<span class="wiz-step-sep" aria-hidden="true">→</span>')}</nav>`;
}

function wireWizardTip(stepKey) {
  const btn = document.querySelector(`[data-wiz-tip="${stepKey}"]`);
  if (!btn) return;
  btn.addEventListener("click", () => {
    if (!state.wizardTip) state.wizardTip = {};
    state.wizardTip[stepKey] = !state.wizardTip[stepKey];
    // Re-render the current step in place. Each wizard renderer is idempotent
    // and re-runs its own wire-up, so just dispatch via render().
    render();
  });
}

function renderDetectedChips(det) {
  if (!det) return `<span class="detected-chip muted">${t("未指定區域 → 將使用 中部 · 溫和 預設","No region → defaults to Central · moderate")}</span>`;
  const zoneLabel = state.lang === "zh" ? ZONE_LABEL[det.zone].zh : ZONE_LABEL[det.zone].en;
  const pieces = [];
  if (det.display) {
    pieces.push(`<span class="detected-chip">📍 ${escapeHtml(det.display)}</span>`);
  } else if (det.county) {
    // XSS: det.county may originate from a `#d=` snapshot (attacker-controlled).
    pieces.push(`<span class="detected-chip">📍 ${escapeHtml(det.county)}（${zoneLabel}）</span>`);
  } else {
    pieces.push(`<span class="detected-chip">🌏 ${zoneLabel}</span>`);
  }
  if (det.lat != null && det.lng != null) {
    pieces.push(`<span class="detected-chip muted">${det.lat.toFixed(3)}, ${det.lng.toFixed(3)}</span>`);
  }
  if (det.coastal) {

  }
  return pieces.join("");
}

// Pull a usable Taiwan county name from Nominatim address details.
// Nominatim sometimes returns city / county / state — try each.
function pickCountyFromAddress(addr) {
  if (!addr) return null;
  // Try common Nominatim address fields, in order of specificity for Taiwan ROC areas.
  const candidates = [addr.county, addr.city, addr.state, addr.region, addr.province];
  for (const c of candidates) {
    if (!c) continue;
    for (const key of Object.keys(COUNTY_ZONES)) {
      if (c.includes(key)) return { county: key, zone: COUNTY_ZONES[key] };
    }
  }
  return null;
}

async function geocodeAddress(query) {
  const url = `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(query)}&countrycodes=tw&format=jsonv2&addressdetails=1&limit=1&accept-language=zh-TW,en`;
  const resp = await fetch(url, { headers: { "Accept": "application/json" } });
  if (!resp.ok) throw new Error("Nominatim " + resp.status);
  const arr = await resp.json();
  if (!arr.length) return null;
  return arr[0];
}

async function reverseGeocode(lat, lng) {
  const url = `https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=jsonv2&addressdetails=1&accept-language=zh-TW,en`;
  const resp = await fetch(url, { headers: { "Accept": "application/json" } });
  if (!resp.ok) throw new Error("Nominatim " + resp.status);
  return await resp.json();
}

function buildDetectedFromNominatim(result) {
  if (!result) return null;
  const lat = parseFloat(result.lat);
  const lng = parseFloat(result.lon);
  const cz = pickCountyFromAddress(result.address) || { county: null, zone: "C" };
  // Coastal heuristic: any coastal keyword in display_name or in any address part
  const allText = (result.display_name || "") + " " +
                  Object.values(result.address || {}).join(" ");
  const coastal = COASTAL_KEYWORDS.some(k => allText.includes(k));
  const display = (result.address?.suburb || result.address?.town || result.address?.village || result.address?.city_district || "") +
                  (cz.county ? (result.address?.suburb || result.address?.town ? "·" : "") + cz.county : "");
  return {
    county: cz.county,
    zone: cz.zone,
    coastal,
    lat: isFinite(lat) ? lat : null,
    lng: isFinite(lng) ? lng : null,
    display: display.trim() || result.display_name?.split(",").slice(0, 2).join(",").trim() || null,
  };
}

// ── COMPASS — live orientation detection via DeviceOrientation API ──
// Lets the user point their phone at their garden and read off the
// cardinal direction directly, instead of guessing N/E/S/W.
function compassCardinalFromHeading(h) {
  if (h == null) return { dir: "?", zh: "—", en: "—" };
  // 8-way snapping for display, 4-way snapping for state.orientation
  if (h < 22.5 || h >= 337.5) return { dir: "N", zh: "正北", en: "North" };
  if (h < 67.5)  return { dir: "N", zh: "東北", en: "Northeast" };
  if (h < 112.5) return { dir: "E", zh: "正東", en: "East" };
  if (h < 157.5) return { dir: "E", zh: "東南", en: "Southeast" };
  if (h < 202.5) return { dir: "S", zh: "正南", en: "South" };
  if (h < 247.5) return { dir: "S", zh: "西南", en: "Southwest" };
  if (h < 292.5) return { dir: "W", zh: "正西", en: "West" };
  return { dir: "W", zh: "西北", en: "Northwest" };
}

// 4-way cardinal for the orientation buttons (we only have N/E/S/W slots).
function compassFourWay(h) {
  if (h == null) return "S";
  if (h < 45 || h >= 315) return "N";
  if (h < 135) return "E";
  if (h < 225) return "S";
  return "W";
}

function wireCompass() {
  // Apply button — snap to N/E/S/W and write to state.orientation
  document.getElementById("compassApplyBtn")?.addEventListener("click", () => {

// Permission flow (iOS 13+ requires explicit request)
async function openCompass() {
  state.compassOpen = true;
  state.compassError = null;
  state.compassHeading = null;
  renderDetails(); wireDetails(); applyLanguage();

  if (typeof DeviceOrientationEvent === "undefined") {
    state.compassError = "not_supported";
    renderDetails(); wireDetails(); applyLanguage();
    return;
  }
  // iOS Safari permission gate
  if (typeof DeviceOrientationEvent.requestPermission === "function") {
    try {
      const permission = await DeviceOrientationEvent.requestPermission();
      if (permission !== "granted") {
        state.compassError = "permission_denied";
        renderDetails(); wireDetails(); applyLanguage();
        return;
      }
    } catch (e) {
      state.compassError = "permission_denied";
      renderDetails(); wireDetails(); applyLanguage();
      return;
    }
  }
  startCompassListener();
}

function startCompassListener() {
  if (state.compassListening) return;
  state.compassListening = true;
  // Prefer the absolute (true compass) event when available, fall back to relative
  window.addEventListener("deviceorientationabsolute", handleOrientation, true);
  window.addEventListener("deviceorientation", handleOrientation, true);
  // Watchdog: if no data after 2.5s, surface a sensor warning. Track the id
  // so handleOrientation can cancel it on first successful reading — otherwise
  // a phantom timeout fires after the user closed and reopened the compass,
  // or after a slow first reading lands at 2.4s and the watchdog fires at 2.5s.
  if (state.compassWatchdog) { clearTimeout(state.compassWatchdog); }
  state.compassWatchdog = setTimeout(() => {
    state.compassWatchdog = null;
    if (state.compassOpen && state.compassHeading == null && !state.compassError) {
      state.compassError = "no_data";
      renderDetails(); wireDetails(); applyLanguage();
    }
  }, 2500);
}

function stopCompass() {
  window.removeEventListener("deviceorientationabsolute", handleOrientation, true);
  window.removeEventListener("deviceorientation", handleOrientation, true);
  state.compassListening = false;
  if (state.compassWatchdog) { clearTimeout(state.compassWatchdog); state.compassWatchdog = null; }
}

function handleOrientation(event) {
  // iOS Safari uses webkitCompassHeading (0=N, clockwise)
  // Android uses event.alpha (0=device's top points to magnetic N, but increases counter-clockwise on most devices)
  let heading = null;
  if (event.webkitCompassHeading != null) {
    heading = event.webkitCompassHeading;
  } else if (event.alpha != null) {
    // For deviceorientationabsolute, alpha is clockwise from north (Chrome convention)
    // For deviceorientation, it varies — but most devices use the same convention as absolute
    heading = (360 - event.alpha) % 360;
  }
  if (heading == null) return;

  // Smooth via a tiny rolling average to reduce jitter
  const prev = state.compassHeading;
  if (prev != null) {
    // Handle 359 → 1 wraparound
    let delta = heading - prev;
    if (delta > 180) delta -= 360;
    if (delta < -180) delta += 360;
    heading = (prev + delta * 0.3 + 360) % 360;
  }
  state.compassHeading = heading;
  state.compassError = null;
  // First good reading arrived — cancel the no-data watchdog so it can't
  // overwrite a valid heading with a phantom "sensor unavailable" error.
  if (state.compassWatchdog) { clearTimeout(state.compassWatchdog); state.compassWatchdog = null; }

  // Live-update the rose rotation + readout without a full re-render
  const rose = document.getElementById("compassRose");
  if (rose) rose.style.transform = `rotate(${-heading}deg)`;
  const readout = document.getElementById("compassReadout");
  if (readout) {
    const card = compassCardinalFromHeading(heading);
    readout.innerHTML = `<span data-zh="${card.zh}" data-en="${card.en}">${state.lang === "zh" ? card.zh : card.en}</span><span class="deg">${Math.round(heading)}°</span>`;
  }
  // If we hadn't yet shown the apply button, re-render to add it
  if (!document.getElementById("compassApplyBtn")) {
    renderDetails(); wireDetails(); applyLanguage();
  }
}

function wireEstimator() {
  // Tab switches
  document.querySelectorAll(".est-tab").forEach((el) => {
    el.addEventListener("click", () => {
      state.estimatorTab = el.dataset.estTab;
      const host = document.querySelector(".est-box");
      if (host) host.outerHTML = renderEstimator();
      wireEstimator();
      applyLanguage();
    });

  // References list (refs mode)
  document.querySelectorAll(".est-ref").forEach((el) => {
    el.addEventListener("click", () => {
      state.estRefId = el.dataset.ref;
      document.querySelectorAll(".est-ref").forEach(r => r.classList.toggle("on", r.dataset.ref === state.estRefId));
      refreshEstResult();
    });
  });

  // Input listeners — re-compute the displayed estimate live without re-rendering everything
  const fieldMap = {
    estRefCountW: "estRefCountW", estRefCountD: "estRefCountD",
    estPaceLen: "estPaceLen", estPacesW: "estPacesW", estPacesD: "estPacesD",
    estTileSize: "estTileSize", estTilesW: "estTilesW", estTilesD: "estTilesD",
  };
  for (const [id, key] of Object.entries(fieldMap)) {
    const el = document.getElementById(id);
    if (!el) continue;
    el.addEventListener("input", () => {
      const v = parseFloat(el.value);
      if (!isNaN(v)) state[key] = v;
      refreshEstResult();
    });
  }

  // Apply button — push into widthM/depthM and update the dimension inputs
  document.getElementById("estApplyBtn")?.addEventListener("click", () => {
    const { w, d } = computeEstimate();
    state.widthM = w;
    state.depthM = d;
    const wEl = document.getElementById("widthInput");
    const dEl = document.getElementById("depthInput");
    const aEl = document.getElementById("areaDisplay");
    if (wEl) wEl.value = w;
    if (dEl) dEl.value = d;
    const a = (w * d).toFixed(1);
    if (aEl) { aEl.dataset.zh = `≈ ${a} m² 可用面積`; aEl.dataset.en = `≈ ${a} m² usable area`; aEl.textContent = aEl.dataset[state.lang]; }
    // Close after applying
    state.estimatorOpen = false;
    renderDetails(); wireDetails(); applyLanguage();
  });
}

function computeEstimate() {
  let w = 0, d = 0;
  if (state.estimatorTab === "refs") {
    const r = AREA_REFS.find(x => x.id === state.estRefId) || AREA_REFS[0];
    w = +(r.w * state.estRefCountW).toFixed(2);
    d = +(r.d * state.estRefCountD).toFixed(2);
  } else if (state.estimatorTab === "paces") {
    w = +(state.estPaceLen * state.estPacesW).toFixed(2);
    d = +(state.estPaceLen * state.estPacesD).toFixed(2);
  } else if (state.estimatorTab === "tiles") {
    w = +(state.estTileSize * state.estTilesW).toFixed(2);
    d = +(state.estTileSize * state.estTilesD).toFixed(2);
  }
  return { w, d };
}

function refreshEstResult() {
  const { w, d } = computeEstimate();
  const a = (w * d).toFixed(1);
  const v = document.querySelector(".est-result .val");
  if (v) v.innerHTML = `${w} × ${d} m  <span style="font-weight:400;font-size:13px;opacity:0.7;">· ${a} m²</span>`;
}

function wireDetails() {
  const addrEl = document.getElementById("addressInput");
  const wEl = document.getElementById("widthInput");
  const dEl = document.getElementById("depthInput");
  const areaEl = document.getElementById("areaDisplay");
  const geocodeBtn = document.getElementById("geocodeBtn");
  const geolocateBtn = document.getElementById("geolocateBtn");

  // Address: still do cheap keyword detection on input as the user types — covers offline use.
  let to;
  addrEl.addEventListener("input", (e) => {
    state.address = e.target.value;
    clearTimeout(to);
    to = setTimeout(() => {
      // Only update if we don't already have a real geocoded result (don't overwrite real coordinates with keyword guess)
      if (!state.detected || !state.detected.lat) {
        state.detected = detectLocation(state.address);
        refreshDetectedChips();
      }
    }, 250);
  });

  // 🔍 Look up — forward geocode via Nominatim
  geocodeBtn?.addEventListener("click", async () => {
    const q = (state.address || "").trim();
    if (!q) { setAddrStatus(t("先輸入地址再查詢","Type an address first"), "err"); return; }
    geocodeBtn.disabled = true;
    setAddrStatus(t("查詢中…","Searching…"));
    try {
      const r = await geocodeAddress(q);
      if (!r) {
        state.detected = detectLocation(q);  // fallback to keyword
        refreshDetectedChips();
        setAddrStatus(t("找不到地址 · 已用關鍵字推測","Not found · using keyword guess"), "err");
      } else {
        state.detected = buildDetectedFromNominatim(r);
        refreshDetectedChips();
        setAddrStatus(t("✓ 已定位","✓ Located"), "ok");
      }
    } catch (err) {
      state.detected = detectLocation(q);
      refreshDetectedChips();
      setAddrStatus(t("網路問題 · 已用關鍵字推測","Network issue · using keyword guess"), "err");
    } finally {
      geocodeBtn.disabled = false;
    }
  });

  // 📍 Use my location — browser geolocation + reverse geocode
  geolocateBtn?.addEventListener("click", () => {
    if (!navigator.geolocation) {
      setAddrStatus(t("瀏覽器不支援定位","Browser doesn't support geolocation"), "err");
      return;
    }
    geolocateBtn.disabled = true;
    setAddrStatus(t("取得位置中… 請允許瀏覽器存取","Getting location… please allow access"));
    navigator.geolocation.getCurrentPosition(async (pos) => {
      try {
        const { latitude, longitude } = pos.coords;
        const r = await reverseGeocode(latitude, longitude);
        // reverseGeocode result has the same shape; lat/lon are top-level strings
        r.lat = latitude; r.lon = longitude;
        state.detected = buildDetectedFromNominatim(r);
        state.address = state.detected.display || state.address;
        document.getElementById("addressInput").value = state.address;
        refreshDetectedChips();
        setAddrStatus(t("✓ 已定位","✓ Located"), "ok");
      } catch (err) {
        setAddrStatus(t("反查失敗，請改用「查詢地址」","Reverse-geocode failed — try 'Look up address'"), "err");
      } finally {
        geolocateBtn.disabled = false;
      }
    }, (err) => {
      geolocateBtn.disabled = false;
      const msg = err.code === 1
        ? t("已拒絕定位權限","Location permission denied")
        : t("無法取得位置","Couldn't get location");
      setAddrStatus(msg, "err");
    }, { timeout: 12000, maximumAge: 60_000 });
  });

  // Dimensions: live area update
  function updateArea() {
    const w = parseFloat(wEl.value) || 0;
    const d = parseFloat(dEl.value) || 0;
    state.widthM = w;
    state.depthM = d;
    const a = (w * d).toFixed(1);
    areaEl.dataset.zh = `≈ ${a} m² 可用面積`;
    areaEl.dataset.en = `≈ ${a} m² usable area`;
    areaEl.textContent = areaEl.dataset[state.lang];
  }
  wEl.addEventListener("input", updateArea);
  dEl.addEventListener("input", updateArea);

  // Orientation: 4 buttons
  document.querySelectorAll(".orient-btn").forEach((el) => {
    el.addEventListener("click", () => {
      state.orientation = el.dataset.orient;
      document.querySelectorAll(".orient-btn").forEach((b) => b.classList.toggle("active", b.dataset.orient === state.orientation));
    });
  });

  // Estimator toggle — re-render this step to show/hide the inline tool
  document.getElementById("estToggleBtn")?.addEventListener("click", () => {
    state.estimatorOpen = !state.estimatorOpen;
    renderDetails(); wireDetails(); applyLanguage();
  });

  // If the estimator is currently open, wire its inner controls now
  if (state.estimatorOpen) wireEstimator();

  // Compass toggle — opens the live DeviceOrientation compass UI
  document.getElementById("openCompassBtn")?.addEventListener("click", () => {
    if (state.compassOpen) {
      stopCompass();
      state.compassOpen = false;
      renderDetails(); wireDetails(); applyLanguage();
    } else {
      openCompass();
    }
  });

  // If the compass is currently open, wire its inner controls now
  if (state.compassOpen) wireCompass();

  // Wire the inline photo helper (same one used on Space + Sun)
  wireQPhoto("details");

  // AI photo-suggestion: Apply pushes the AI's estimated width/depth/orientation/coastal
  // into the live form state, then re-renders this step so the inputs visibly update.
  document.getElementById("applyDetailsSuggestBtn")?.addEventListener("click", () => {
    const s = state.wizardPhotoSuggest?.details;
    if (!s) return;
    if (typeof s.widthM === "number" && isFinite(s.widthM) && s.widthM > 0) {
      state.widthM = Math.round(s.widthM * 10) / 10;
    }
    if (typeof s.depthM === "number" && isFinite(s.depthM) && s.depthM > 0) {
      state.depthM = Math.round(s.depthM * 10) / 10;
    }
    if (s.orientation && ["N","E","S","W"].includes(s.orientation)) {
      state.orientation = s.orientation;
    }
    if (s.coastal) {
      // Merge coastal into state.detected without nuking an existing geocoded location.
      state.detected = state.detected
        ? { ...state.detected, coastal: true }
        : { county: null, zone: "C", coastal: true };
    }
    state.wizardPhotoSuggestActed = { ...(state.wizardPhotoSuggestActed || {}), details: "applied" };
    renderDetails(); applyLanguage();
  });

  document.getElementById("dismissDetailsSuggestBtn")?.addEventListener("click", () => {
    state.wizardPhotoSuggestActed = { ...(state.wizardPhotoSuggestActed || {}), details: "dismissed" };
    renderDetails(); applyLanguage();
  });
}

}

// ── Wizard photo-assist ─────────────────────────────────────
// A small, focused photo upload inline on each wizard step. ONE photo is
// reused across all steps (state.wizardPhotoDataUrl). A single Pollinations
// call returns a JSON with everything (space / sun / dimensions / orientation
// / coastal) and each step shows only its relevant field as a suggestion.
//
// Why ONE call instead of one per step: the defender agent flagged 4 sequential
// 15-30s API calls = 2 minutes of spinners. We pay the API cost once.

// Human-friendly cardinal label for the AI suggestion banner.
function aiSuggestLabel(stepKey, val) {
  if (val == null) return "";
  if (stepKey === "space") return spaceZh(val);
  if (stepKey === "sun")   return ({ full:"全日照", part:"半日照", shade:"遮陰" })[val] || val;
  return String(val);
}
function aiSuggestLabelEn(stepKey, val) {
  if (val == null) return "";
  if (stepKey === "space") return spaceEn(val);
  if (stepKey === "sun")   return ({ full:"Full sun", part:"Part sun", shade:"Shade" })[val] || val;
  return String(val);
}

// Inline AI suggestion banner above option cards.
function suggestBanner(stepKey, suggested) {
  if (!suggested) return "";
  const zh = aiSuggestLabel(stepKey, suggested);
  const en = aiSuggestLabelEn(stepKey, suggested);
  return `
    <div class="ai-suggest-row">
      <div class="ai-suggest-banner">
        <span class="dot"></span>
        <span data-zh="AI 看照片建議：${zh}" data-en="AI suggests from your photo: ${en}">AI 看照片建議：${zh}</span>
      </div>
    </div>`;
}

// Details step has a structured suggestion (width/depth/orientation/coastal)
// rather than a single key, so it gets its own card with a single Apply button.
// We render this above the form fields so the AI's work from the Space step
// finally surfaces somewhere the user can see and use.
function detailsSuggestBanner() {
  const s = state.wizardPhotoSuggest?.details;
  if (!s) return "";
  const acted = state.wizardPhotoSuggestActed?.details;
  if (acted === "dismissed") return "";

  const ORIENT_ZH = { N:"北 · 日照最少", E:"東 · 晨光柔和", S:"南 · 日照最好", W:"西 · 午後強光" };
  const ORIENT_EN = { N:"N · least sun",  E:"E · soft morning", S:"S · best sun", W:"W · hot afternoon" };

  const w = (typeof s.widthM === "number" && isFinite(s.widthM) && s.widthM > 0) ? s.widthM.toFixed(1) : null;
  const d = (typeof s.depthM === "number" && isFinite(s.depthM) && s.depthM > 0) ? s.depthM.toFixed(1) : null;
  const orient = (s.orientation && ORIENT_ZH[s.orientation]) ? s.orientation : null;
  const coastal = !!s.coastal;

  if (!w && !d && !orient && !coastal) return "";

  if (acted === "applied") {
    return `
      <div class="ai-details-suggest" data-details-suggest>
        <div class="hd"><span class="dot"></span>
          <span data-zh="已套用 AI 照片建議" data-en="AI photo suggestion applied">已套用 AI 照片建議</span>
        </div>
        <div class="applied-msg"
             data-zh="若要修改任何欄位，直接編輯即可。"
             data-en="Edit any field below to override.">
             若要修改任何欄位，直接編輯即可。
        </div>
      </div>`;
  }

  const items = [];
  if (w && d) {
    items.push(`<span class="item"><span class="k" data-zh="尺寸" data-en="Size">尺寸</span><span class="v">${w} × ${d} m</span></span>`);
  } else if (w) {
    items.push(`<span class="item"><span class="k" data-zh="寬" data-en="Width">寬</span><span class="v">${w} m</span></span>`);
  } else if (d) {
    items.push(`<span class="item"><span class="k" data-zh="深" data-en="Depth">深</span><span class="v">${d} m</span></span>`);
  }
  if (orient) {
    items.push(`<span class="item"><span class="k" data-zh="朝向" data-en="Faces">朝向</span><span class="v" data-zh="${ORIENT_ZH[orient]}" data-en="${ORIENT_EN[orient]}">${ORIENT_ZH[orient]}</span></span>`);
  }
  if (coastal) {
    items.push(`<span class="item"><span class="v" data-zh="🌊 近海岸（偏好耐鹽植物）" data-en="🌊 Coastal (prefer salt-tolerant)">🌊 近海岸（偏好耐鹽植物）</span></span>`);
  }

  return `
    <div class="ai-details-suggest" data-details-suggest>
      <div class="hd"><span class="dot"></span>
        <span data-zh="AI 從你的照片估算" data-en="AI estimated from your photo">AI 從你的照片估算</span>
      </div>
      <div class="items">${items.join("")}</div>
      <div class="acts">
        <button type="button" class="apply-btn" id="applyDetailsSuggestBtn">
          <span data-zh="✓ 套用這些建議" data-en="✓ Apply these">✓ 套用這些建議</span>
        </button>
        <button type="button" class="dismiss-btn" id="dismissDetailsSuggestBtn">
          <span data-zh="略過" data-en="Skip">略過</span>
        </button>
      </div>
    </div>`;
}

function wireQPhoto(stepKey) {

  document.querySelectorAll(`[data-qphoto-toggle="${stepKey}"]`).forEach(el => {
    el.addEventListener("click", () => {
      state.wizardPhotoOpen[stepKey] = !state.wizardPhotoOpen[stepKey];
      rerenderCurrentStep();
    });
  });
  // File input
  const fi = document.querySelector(`[data-qphoto-input="${stepKey}"]`);
  if (fi) fi.addEventListener("change", (e) => {
    const f = e.target.files[0];
    if (f) handleWizardPhotoFile(f, stepKey);
  });
  // Swap → clear existing photo, re-open upload
  // Selectors are scoped to the current stepKey so when wizard steps re-render
  // and both the previous step's stale DOM nodes and the current step's nodes
  // briefly coexist, we only wire the current step's buttons.
  document.querySelectorAll(`[data-qphoto-swap="${stepKey}"]`).forEach(el => {
    el.addEventListener("click", () => {
      state.wizardPhotoDataUrl = null;
      state.wizardPhotoSuggest = {};
      state.wizardPhotoSuggestActed = {};  // a new photo deserves a fresh banner
      rerenderCurrentStep();
    });
  });
  // Close panel
  document.querySelectorAll(`[data-qphoto-close="${stepKey}"]`).forEach(el => {
    el.addEventListener("click", () => {
      state.wizardPhotoOpen[stepKey] = false;
      rerenderCurrentStep();
    });
  });
  // Analyze
  document.querySelectorAll(`[data-qphoto-analyze="${stepKey}"]`).forEach(el => {
    el.addEventListener("click", () => analyzeWizardPhoto(stepKey));
  });
  // Cancel in-flight analysis
  document.querySelectorAll(`[data-qphoto-cancel="${stepKey}"]`).forEach(el => {
    el.addEventListener("click", () => { if (typeof cancelVisionRequest === "function") cancelVisionRequest(); });
  });
}

function rerenderCurrentStep() {
  if (state.step === 0) renderSpace();
  else if (state.step === 1) renderDetails();
  else if (state.step === 2) renderSun();
  applyLanguage();
}

function handleWizardPhotoFile(file, stepKey) {
  if (!file.type.startsWith("image/")) {
    state.wizardPhotoError[stepKey] = t("不支援的檔案格式 — 請選擇圖片", "Unsupported file — pick an image");
    rerenderCurrentStep();
    return;
  }
  const reader = new FileReader();
  reader.onload = (e) => {
    const img = new Image();
    img.onload = () => {
      const maxW = 1024;
      const scale = img.width > maxW ? maxW / img.width : 1;
      const w = Math.round(img.width * scale);
      const h = Math.round(img.height * scale);
      const canvas = document.createElement("canvas");
      canvas.width = w; canvas.height = h;
      canvas.getContext("2d").drawImage(img, 0, 0, w, h);
      state.wizardPhotoDataUrl = canvas.toDataURL("image/jpeg", 0.85);
      state.wizardPhotoError[stepKey] = "";
      rerenderCurrentStep();
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

// One Pollinations call → JSON with every field every wizard step might want.
// Step-specific consumers read just their field from state.wizardPhotoSuggest.
async function analyzeWizardPhoto(stepKey) {
  if (!state.wizardPhotoDataUrl) return;
  state.wizardPhotoBusy[stepKey] = true;
  state.wizardPhotoError[stepKey] = "";
  rerenderCurrentStep();
  // Mirror the dedicated photo-flow rotation so the wizard helper shows the
  // same "looking → measuring → matching plants" beat. The rotator writes
  // directly to the in-DOM <span data-qphoto-progress> node and keeps its
  // data-zh / data-en attributes in sync so applyLanguage() doesn't clobber
  // the latest beat when the user toggles the language pill.
  startVisionProgressRotation((step) => {
    const node = document.querySelector(`[data-qphoto-progress="${stepKey}"]`);
    if (node) {
      node.setAttribute("data-zh", step.zh);
      node.setAttribute("data-en", step.en);
      node.textContent = t(step.zh, step.en);
    }
  });

  const systemPrompt = `You are a landscape design assistant analyzing a photo of a planting space in Taiwan. Output ONLY valid JSON, no markdown:
{
  "space": "balcony" | "rooftop" | "yard" | "indoor",
  "sun": "full" | "part" | "shade",
  "estimated_width_m": number,
  "estimated_depth_m": number,
  "orientation_guess": "N" | "E" | "S" | "W" | "unknown",
  "coastal": true | false
}`;

  const controller = startVisionRequest();
  try {
    const resp = await fetch("https://text.pollinations.ai/openai", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      signal: controller.signal,
      body: JSON.stringify({
        model: "openai",
        messages: [
          { role: "system", content: systemPrompt },
          { role: "user", content: [
            { type: "text", text: "Analyze this photo and respond with ONLY the JSON object." },
            { type: "image_url", image_url: { url: state.wizardPhotoDataUrl } },
          ]},
        ],
        response_format: { type: "json_object" },
      }),
    });
    if (!resp.ok) throw new Error("API " + resp.status);
    const data = await resp.json();
    const text = data?.choices?.[0]?.message?.content || "";
    const jsonText = (text.match(/\{[\s\S]*\}/) || [text])[0];
    const parsed = JSON.parse(jsonText);
    state.wizardPhotoSuggest = {
      space: parsed.space,
      sun: parsed.sun,
      details: {
        widthM: parsed.estimated_width_m,
        depthM: parsed.estimated_depth_m,
        orientation: parsed.orientation_guess !== "unknown" ? parsed.orientation_guess : null,
        coastal: !!parsed.coastal,
      },
    };
    // Fresh analysis → re-show the Details Apply banner even if the user dismissed last time.
    state.wizardPhotoSuggestActed = {};
    state.wizardPhotoBusy[stepKey] = false;
    state.wizardPhotoOpen[stepKey] = false;   // collapse the panel — suggestion is now visible above the cards
    stopVisionProgressRotation();
    rerenderCurrentStep();
  } catch (err) {
    const reason = controller.signal.reason;
    // Superseded by a newer call — silently return so the new call paints its own status.
    if (reason === "superseded") {
      endVisionRequest(controller);
      return;
    }
    stopVisionProgressRotation();
    state.wizardPhotoBusy[stepKey] = false;
    if (reason === "user_cancel") {
      state.wizardPhotoError[stepKey] = t("已取消，可手動選擇", "Cancelled — pick manually");
    } else if (reason === "timeout") {
      state.wizardPhotoError[stepKey] = t("AI 回應太久，可重試或手動選擇", "AI took too long — retry or pick manually");
    } else {
      state.wizardPhotoError[stepKey] = t("AI 暫時無法判斷，請手動選擇", "AI couldn't analyze — pick manually");
    }
    rerenderCurrentStep();
  } finally {
    stopVisionProgressRotation();
    endVisionRequest(controller);
  }
}

function sunIcon(key, active) {
  const c = active ? "#EDEAE0" : "#2C3526";
  const s = `stroke="${c}" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" fill="none"`;
  switch (key) {
    case "full":  return `<svg width="30" height="30" viewBox="0 0 24 24" ${s}><circle cx="12" cy="12" r="4.5"/><path d="M12 2v2M12 20v2M2 12h2M20 12h2M5 5l1.5 1.5M17.5 17.5L19 19M19 5l-1.5 1.5M6.5 17.5L5 19"/></svg>`;
    case "part":  return `<svg width="30" height="30" viewBox="0 0 24 24" ${s}><path d="M12 3a6 6 0 000 12"/><circle cx="12" cy="9" r="3"/><path d="M3 18h18M12 15v3"/></svg>`;
    case "shade": return `<svg width="30" height="30" viewBox="0 0 24 24" ${s}><path d="M17 8a5 5 0 10-9 3 4 4 0 00.5 8H17a4 4 0 000-8z"/></svg>`;
  }
  return "";
}

function wireOptCards(field, multi) {
  app.querySelectorAll(".card-opt").forEach((el) => {
    el.addEventListener("click", () => {
      const key = el.dataset.key;
      if (multi) {
        if (state.goals.includes(key)) state.goals = state.goals.filter(g => g !== key);
        else state.goals = [...state.goals, key];
      } else {
        state[field] = key;
      }
      render();
    });
  });
}

function renderNav() {
  if (state.step < 5) {
    const canNext = (state.step === 0 && state.space) ||
                    (state.step === 1) ||                // details — everything is optional
                    (state.step === 2 && state.sun) ||
                    (state.step === 3 && state.water) ||
                    (state.step === 4);
    const isLast = state.step === 4;
    // Details step (step 1) — offer a "Skip" ghost button. Everything on this step is optional,
    // and first-timers hesitate when faced with three fields. The skip jumps straight to Sun
    // without touching any details fields (defaults apply automatically via renderDetails).
    const showSkip = state.step === 1;
    navFooter.innerHTML = `
      <button class="nav-btn ${state.step === 0 ? "hidden" : ""}" id="navBack">← <span data-zh="上一步" data-en="Back">上一步</span></button>
      ${showSkip ? `<button class="nav-btn" id="navSkip"><span data-zh="跳過（用預設值）" data-en="Skip (use defaults)">跳過（用預設值）</span></button>` : ""}
      <button class="cta" id="navNext" ${canNext ? "" : "disabled"}>
        <span data-zh="${isLast ? "生成我的景觀配置" : "繼續"}" data-en="${isLast ? "Generate my plan" : "Continue"}">${isLast ? "生成我的景觀配置" : "繼續"}</span> →
      </button>`;
    document.getElementById("navBack")?.addEventListener("click", () => { state.step = Math.max(0, state.step - 1); render(); });
    document.getElementById("navSkip")?.addEventListener("click", () => {
      // Skip = advance to step 2 (Sun) without modifying any details fields.
      // renderDetails already applied size defaults on entry; orientation/address stay null.
      state.step = 2;
      autoApplySpaceDefaults();
      render();
      window.scrollTo({ top: 0, behavior: "smooth" });
      updateLineShare();
    });
    document.getElementById("navNext")?.addEventListener("click", () => {
      if (!canNext) return;
      state.step++;
      autoApplySpaceDefaults();
      if (state.step === 5) initShoppingQty();
      render();
      window.scrollTo({ top: 0, behavior: "smooth" });
      updateLineShare();
    });
  } else {
    const recsCount = scorePlants().filter(p => p.score >= 30).length;
    navFooter.innerHTML = `
      <button class="nav-btn" id="navReset">↺ <span data-zh="重新開始" data-en="Start over">重新開始</span></button>
      <button class="save-design-btn" id="navSaveDesign">💾 <span data-zh="另存為新設計" data-en="Save as new design">另存為新設計</span></button>
      <span class="foot-note" data-zh="共 ${recsCount} 種候選 · AI 依你的微氣候生成" data-en="${recsCount} candidates · generated from your microclimate">共 ${recsCount} 種候選 · AI 依你的微氣候生成</span>`;
    document.getElementById("navSaveDesign")?.addEventListener("click", () => {
      const defaultName = defaultDesignName(snapshotState());
      const name = prompt(t("為這個設計命名：", "Name this design:"), defaultName);
      if (name === null) return;
      saveCurrentAsNewDesign(name);
      showSaveToast(t("✓ 已儲存到「我的設計」", "✓ Saved to My Designs"), t("✓ Saved to My Designs", "✓ Saved to My Designs"));
    });
    document.getElementById("navReset")?.addEventListener("click", () => {
      Object.assign(state, {
        step:0, space:null,
        address:"", detected:null, widthM:null, depthM:null, orientation:"S",
        sun:null, water:null, goals:[],
        resultTab:"plan", selectedPlantId:null, qty:{},
        wizardPhotoSuggest:{}, wizardPhotoSuggestActed:{},
      });
      render();
      window.scrollTo({ top: 0, behavior: "smooth" });
    });
  }
}

// Single source of truth for the result-page tab list. Used by:
//   • renderResult — to build the tabs UI + KNOWN_TABS validation
//   • renderHome   — to derive the "N 種視角 / N views" hero stat

  { k:"plan",      zh:"俯瞰平面圖",   en:"Garden plan" },
  { k:"iso3d",     zh:"3D 視角",      en:"3D view" },
