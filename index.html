          <div class="phase-text">${p.body}</div>
        </div>`).join("")}
    </div>

    ${renderSoilRecipe(top, realW, realD)}

    ${renderHazardChecklist(top)}
    `;
}

// ── Soil recipe calculator — turns the recommended plants + area into a
//    specific volume + cost estimate. Most beginners over- or under-amend;
//    this gives a starting point grounded in actual numbers.
function renderSoilRecipe(top, w, d) {
  const area = w * d;
  // Depth: containers shallower than yards
  const depthCm = (state.space === "balcony" || state.space === "indoor") ? 25 : 30;
  // Existing soil reused 20% in yards, 0% in containers/rooftop (start fresh)
  const reuseFraction = state.space === "yard" ? 0.2 : 0;
  const totalL = Math.round(area * depthCm * (1 - reuseFraction));

  // Dominant water tier across recs decides the mix
  const waterCounts = { low: 0, med: 0, high: 0 };
  top.forEach(p => { waterCounts[p.water] = (waterCounts[p.water] || 0) + (state.qty[p.id] || 1); });
  let dominantWater = "med";
  if (waterCounts.low > waterCounts.med && waterCounts.low > waterCounts.high) dominantWater = "low";
  else if (waterCounts.high > waterCounts.med) dominantWater = "high";

  // Mix recipes by dominant water
  const recipes = {
    low: {
      label_zh: "耐旱混合 · 排水優先", label_en: "Drought mix · drainage-first",
      parts: [
        { name_zh: "現地土壤 / 一般培養土", name_en: "Local soil / standard mix", pct: 50, rate: 5.5 },
        { name_zh: "有機堆肥", name_en: "Organic compost", pct: 25, rate: 8 },
        { name_zh: "珍珠岩或粗砂", name_en: "Perlite or coarse sand", pct: 25, rate: 12 },
      ],
      note_zh: "適合 海桐 / 馬鞍藤 / 草海桐 / 五節芒 / 馬齒莧 等耐旱植物為主的設計。",
      note_en: "Suits designs led by drought-tolerant species — 海桐, 馬鞍藤, 五節芒, etc.",
    },
    med: {
      label_zh: "通用培養土 · 平衡版", label_en: "Balanced mix · universal",
      parts: [
        { name_zh: "現地土壤 / 一般培養土", name_en: "Local soil / standard mix", pct: 50, rate: 5.5 },
        { name_zh: "有機堆肥", name_en: "Organic compost", pct: 30, rate: 8 },
        { name_zh: "珍珠岩 / 椰殼纖維", name_en: "Perlite / coir", pct: 20, rate: 10 },
      ],
      note_zh: "適合 野牡丹 / 山黃梔 / 月桃 / 鳳凰木 等多數庭院灌木與小樹。",
      note_en: "Suits most garden shrubs and small trees — 野牡丹, 山黃梔, 月桃, etc.",
    },
    high: {
      label_zh: "保水混合 · 濕地導向", label_en: "Moisture mix · wetland-leaning",
      parts: [
        { name_zh: "現地土壤 / 一般培養土", name_en: "Local soil / standard mix", pct: 40, rate: 5.5 },
        { name_zh: "有機堆肥（保水）", name_en: "Compost (water-holding)", pct: 40, rate: 8 },
        { name_zh: "椰殼纖維或樹皮屑", name_en: "Coir or fine bark", pct: 20, rate: 9 },
      ],
      note_zh: "適合 田蔥 / 風箱樹 / 月桃 等濕地或半水生植物的設計。",
      note_en: "Suits designs with wetland or semi-aquatic species — 田蔥, 風箱樹, 月桃.",
    },
  };
  const r = recipes[dominantWater];
  let totalCost = 0;
  const rows = r.parts.map(part => {
    const vol = Math.round(totalL * part.pct / 100);
    const bags = Math.max(1, Math.ceil(vol / 50));
    const cost = Math.round(vol * part.rate);
    totalCost += cost;
    return `
      <tr>
        <td><span data-zh="${part.name_zh}" data-en="${part.name_en}">${part.name_zh}</span></td>
        <td class="right">${part.pct}%</td>
        <td class="right">${vol} L</td>
        <td class="right" style="color:var(--ink-soft); font-size:12px;"><span data-zh="${bags} 包 (50 L)" data-en="${bags} bags (50 L)">${bags} 包 (50 L)</span></td>
        <td class="right">NT$ ${cost.toLocaleString()}</td>
      </tr>`;
  }).join("");

  return `
    <h2 class="subtitle" style="margin-top: 36px;"
        data-zh="🪴 土壤配方計算" data-en="🪴 Soil Recipe Calculator">🪴 土壤配方計算</h2>
    <p class="lead-small"
       data-zh="依你的空間尺寸與推薦植物的水分偏好（以「${dominantWater === "low" ? "低" : dominantWater === "high" ? "高" : "中"}」水量為主），自動計算改土配方與估算成本。"
       data-en='Auto-calculated soil mix and cost based on your area and the dominant water tier ("${dominantWater}") of your recommended plants.'>
       依你的空間尺寸與推薦植物的水分偏好，自動計算改土配方。</p>

    <div class="shop-frame">
      <div style="margin-bottom: 14px;">
        <div style="font-family: var(--serif); font-size: 18px; font-weight: 600; color: var(--forest);"
             data-zh="${r.label_zh}" data-en="${r.label_en}">${r.label_zh}</div>
        <div style="font-size: 13px; color: var(--ink-soft); margin-top: 4px;"
             data-zh="總體積 ${totalL} L = ${area.toFixed(1)} m² × ${depthCm} cm 深${reuseFraction ? " × " + Math.round((1 - reuseFraction) * 100) + "% (其餘可重複使用現地土)" : ""}"
             data-en="Total volume ${totalL} L = ${area.toFixed(1)} m² × ${depthCm} cm deep${reuseFraction ? " × " + Math.round((1 - reuseFraction) * 100) + "% (rest reuses existing soil)" : ""}">
             總體積 ${totalL} L</div>
      </div>
      <table class="shop-table">
        <thead>
          <tr>
            <th data-zh="成份" data-en="Component">成份</th>
            <th class="right" data-zh="比例" data-en="Ratio">比例</th>
            <th class="right" data-zh="體積" data-en="Volume">體積</th>
            <th class="right" data-zh="袋數估算" data-en="Bags est.">袋數估算</th>
            <th class="right" data-zh="估算 (NT$)" data-en="Est. cost">估算 (NT$)</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
      <div class="shop-total">
        <span class="label" data-zh="土壤估算總額" data-en="Soil total">土壤估算總額</span>
        <span class="amount">NT$ ${totalCost.toLocaleString()}</span>
      </div>
      <p class="shop-note" style="margin-top:14px;"
         data-zh="${r.note_zh} 一般花市或建材行可買到所有成份；建議現場混合後再回填。"
         data-en="${r.note_en} All materials available at flower markets or hardware stores; mix on-site before back-filling.">
         ${r.note_zh}
      </p>
    </div>`;
}

// ── Hazard preparedness — Taiwan-specific. Identifies which of the user's
//    plants are at risk for each common hazard and gives a concrete checklist.
function renderHazardChecklist(top) {
  // Typhoon-risk plants: canopy + large shrubs (height > 1.5m mature)
  const typhoonRisk = top.filter(p => p.tier === "T" || (p.height && p.height[1] >= 1.5));
  // Flood-risk plants: those that need low water (root rot)
  const floodRisk = top.filter(p => p.water === "low");
  // Drought-risk plants: those needing high water + thirsty containers
  const droughtRisk = top.filter(p => p.water === "high" || expert(p).water_l_wk >= 10);
  // Cold-snap risk: hardy_c >= 5 (anything that suffers below 5°C)
  const coldRisk = top.filter(p => (expert(p).hardy_c ?? 0) >= 5);

  const chips = (arr) => arr.length
    ? `<div class="phase-plants">${arr.map(p => `<button class="m-pill" data-id="${p.id}"><span data-zh="${p.zh}" data-en="${p.en}">${p.zh}</span></button>`).join("")}</div>`
    : `<span class="m-empty" data-zh="（你的設計中沒有此風險的植物）" data-en="(none of your plants are at risk)">（你的設計中沒有此風險的植物）</span>`;

  return `

        <div class="phase-title" data-zh="颱風 · 平均 6 月–10 月" data-en="Typhoon · avg Jun–Oct">颱風 · 平均 6 月–10 月</div>
        <div class="phase-time" data-zh="預警 24-48 小時內完成" data-en="Complete within 24-48h of warning">預警 24-48 小時內完成</div>
        <div class="phase-text">
          <ul>
            <li data-zh="高度 ≥ 1.5 m 的植物：以三腳支撐固定（離主幹 30-50 cm 釘樁，鬆綁帶綁主幹）。"
                 data-en="Plants ≥ 1.5 m tall: stake with a 3-leg system (stakes 30-50 cm from trunk; loose tie to main stem).">

            <li data-zh="盆器 < 30 kg：移入室內或集中靠牆。陽台盆器務必檢查護欄是否會被風吹倒。"

        <h4>The big three: NPK</h4>

        <h4>When to repot</h4>
        <ul>
          <li>Roots emerging from drainage holes — pot-bound.</li>

          <li>Growth has clearly slowed — soil nutrients exhausted.</li>
          <li>Yellowing leaves with brown edges — salt buildup or root crowding.</li>
          <li>Rule of thumb: every 1-2 years.</li>

        <ol>
          <li>New pot diameter 2-5 cm larger than the old. Add 3-5 cm of expanded clay or broken shards at the bottom for drainage.</li>
          <li>Fill new pot 1/3 with fresh soil mix.</li>
          <li>Squeeze the old pot sides, invert to release the plant. Stuck? Run a knife around the edge.</li>
          <li>Inspect roots: loosen circling roots with fingers; trim black rotten or extra-thin hair roots.</li>
          <li>Center the plant in the new pot; the root crown should sit 2 cm below the rim.</li>
          <li>Fill in soil around it, tamping gently.</li>
          <li>Water thoroughly; place in shade for 7-10 days to settle.</li>
        </ol>
        <div class="tip">💡 <strong>Pot choice:</strong> terracotta breathes but loses water fast; plastic retains water but risks waterlogging; glazed ceramic strikes a balance. Drainage holes are non-negotiable — drill them if absent.</div>

function escapeAttr(s) {
  return String(s ?? "").replace(/&/g, "&amp;").replace(/"/g, "&quot;").replace(/'/g, "&#39;");
}

function wireTutorials() {
  document.querySelectorAll(".tut-card").forEach((card) => {
    card.addEventListener("click", (e) => {
      // Plant pill clicks open drawer — let them through
      if (e.target.closest(".m-pill")) return;
      const body = card.querySelector(".tut-body");
      const relevant = card.querySelector(".tut-relevant");
      const summary = card.querySelector(".tut-summary");
      const isOpen = card.classList.toggle("open");
      if (isOpen) {
        body.style.display = "block";
        body.innerHTML = body.getAttribute(`data-${state.lang}-html`);
        relevant.style.display = "block";
        summary.dataset.zh = "點此收起 ↑";
        summary.dataset.en = "Tap to collapse ↑";
      } else {
        body.style.display = "none";
        relevant.style.display = "none";
        summary.dataset.zh = "點開閱讀詳細步驟 →";
        summary.dataset.en = "Tap to read the full guide →";
      }
      summary.textContent = summary.dataset[state.lang];
    });
  });
  // Plant chips open drawer
  document.querySelectorAll(".tut-plants .m-pill[data-id]").forEach((el) =>
    el.addEventListener("click", (e) => { e.stopPropagation(); openDrawer(el.dataset.id); }));
}

// ── 5-year cost-of-ownership projection — exposes the true cost
//    beyond the nursery receipt. Most planting projects fail at year 2-3
//    because owners didn't budget for the recurring expenses.
function renderTCOTable(plantsTop, plantsSubtotal) {
  const realW = state.widthM || SPACE_DEFAULTS[state.space].w;
  const realD = state.depthM || SPACE_DEFAULTS[state.space].d;
  const area  = realW * realD;

  // One-time setup costs (rough Taiwan retail rates)
  //   container/edging: balcony/indoor needs pots; rooftop+yard mostly use ground
  //   soil & amendments: ~NT$ 50 per 10 L bag; we estimate 80% of bed volume = soil to bring in
  //   mulch: NT$ 80 per 50 L bag; cover area at 4 cm depth
  //   tools: trowel, gloves, watering can, light pruner — basic kit
  const containerCost = (state.space === "balcony" || state.space === "indoor")
    ? Math.max(2, Math.round(plantsTop.length * 0.8)) * 250    // ~NT$ 250 per pot
    : Math.round(area * 30);                                   // rougher edging cost for yards
  const soilVolL = Math.round(area * 30 * 0.8);                // 30 cm depth × 80% needs added
  const soilCost = Math.round(soilVolL * 5.5);                 // ~NT$ 55 / 10 L
  const mulchVolL = Math.round(area * 4);                      // 4 cm cover
  const mulchCost = Math.round(mulchVolL * 1.6);               // ~NT$ 80 / 50 L
  const toolsCost = 1200;                                      // basic kit

  // Annual recurring costs
  //   water: total L/week × 52 weeks × NT$ 0.012 / L (typical TPC residential)
  //   fertilizer: ~NT$ 600/yr per 5 m² (slow-release blend)
  //   replacement: 10% of plant subtotal per year as failure & growth replacement
  //   misc: pruning shears sharpening, replacement gloves, soil top-up — rough NT$ 800
  let weeklyWater = 0;
  plantsTop.forEach(p => {
    const qty = state.qty[p.id] ?? 1;
    weeklyWater += (expert(p).water_l_wk || 0) * qty;
  });
  const annualWaterCost = Math.round(weeklyWater * 52 * 0.012);
  const annualFertCost  = Math.round(Math.max(1, area / 5) * 600);
  const annualReplaceCost = Math.round(plantsSubtotal * 0.10);
  const annualMisc = 800;
  const annualTotal = annualWaterCost + annualFertCost + annualReplaceCost + annualMisc;

  const setupTotal = containerCost + soilCost + mulchCost + toolsCost;
  const fiveYearTotal = plantsSubtotal + setupTotal + annualTotal * 5;

  return `
    <h2 class="subtitle" style="margin-top: 36px;"
        data-zh="5 年總持有成本 · TCO Projection"
        data-en="5-year Total Cost of Ownership">5 年總持有成本 · TCO Projection</h2>
    <p class="lead-small"
       data-zh="多數景觀工程在第 2-3 年失敗，是因為主人沒有預算到「持續開銷」。這份估算讓你看清楚真實成本。"
       data-en="Most landscape projects fail in year 2-3 because owners didn't budget recurring costs. This breakdown shows the real picture.">
       多數景觀工程在第 2-3 年失敗，是因為主人沒有預算到「持續開銷」。這份估算讓你看清楚真實成本。</p>

            <th class="right" data-zh="說明" data-en="Notes">說明</th>
            <th class="right" data-zh="估算 (NT$)" data-en="Estimate (NT$)">估算 (NT$)</th>
          </tr>
        </thead>

          <tr style="background: rgba(110,126,96,0.08);">
            <td colspan="3" style="font-family:var(--serif); font-weight:600; color:var(--forest); font-size:13.5px; letter-spacing:0.05em;"
                data-zh="一次性開支 · ONE-TIME" data-en="One-time setup">一次性開支 · ONE-TIME</td>
          </tr>
          <tr>
            <td data-zh="植物採購" data-en="Plants">植物採購</td>
            <td class="right" style="color:var(--ink-soft);font-size:12px;"
                data-zh="${plantsTop.length} 種推薦植物 · 上方清單合計"
                data-en="${plantsTop.length} species · per shopping list above">${plantsTop.length} 種推薦植物 · 上方清單合計</td>
            <td class="right">NT$ ${plantsSubtotal.toLocaleString()}</td>
          </tr>
          <tr>
            <td data-zh="盆器 / 邊界" data-en="Containers / edging">盆器 / 邊界</td>
            <td class="right" style="color:var(--ink-soft);font-size:12px;"
                data-zh="${state.space === "balcony" || state.space === "indoor" ? "陶盆或塑膠盆 × " + Math.max(2, Math.round(plantsTop.length * 0.8)) : "庭院邊界石材或木材"}"
                data-en="${state.space === "balcony" || state.space === "indoor" ? "Pots × " + Math.max(2, Math.round(plantsTop.length * 0.8)) : "Yard edging stone or timber"}">
                ${state.space === "balcony" || state.space === "indoor" ? "陶盆或塑膠盆 × " + Math.max(2, Math.round(plantsTop.length * 0.8)) : "庭院邊界石材或木材"}</td>
            <td class="right">NT$ ${containerCost.toLocaleString()}</td>

            <td class="right" style="color:var(--ink-soft);font-size:12px;"

                data-en="≈ ${soilVolL} L (30 cm depth × 80% top-up)">約 ${soilVolL} L (覆蓋面積 30 cm 深 × 80%)</td>
            <td class="right">NT$ ${soilCost.toLocaleString()}</td>

          <tr>

            <td class="right" style="color:var(--ink-soft);font-size:12px;"

          <tr>
            <td data-zh="基本工具組" data-en="Basic tool kit">基本工具組</td>
            <td class="right" style="color:var(--ink-soft);font-size:12px;"
                data-zh="鏟子 + 手套 + 灑水壺 + 修枝剪"
                data-en="Trowel, gloves, watering can, hand pruner">鏟子 + 手套 + 灑水壺 + 修枝剪</td>
            <td class="right">NT$ ${toolsCost.toLocaleString()}</td>
          </tr>
          <tr style="background: rgba(168,138,106,0.10);">

            <td class="right"></td>
            <td class="right" style="font-weight:700; color: var(--forest);">NT$ ${(plantsSubtotal + setupTotal).toLocaleString()}</td>

function wireShoppingControls() {
  document.querySelectorAll(".shop-qty-btn").forEach((btn) => {

      const cur = state.qty[id] ?? 1;
      if (act === "inc") state.qty[id] = cur + 1;
      else if (act === "dec" && cur > 0) state.qty[id] = cur - 1;
      const scored = scorePlants();
      const recs = scored.filter(p => p.score >= 30);
      document.getElementById("tabPanel").innerHTML = renderShopping(recs);
      wireShoppingControls();
      applyLanguage();

window.exportShoppingCSV = function() {
  const scored = scorePlants();
  const top = scored.filter(p => p.score >= 30).slice(0, 8);
  const header = ["Name (中文)", "Name (English)", "Latin", "Qty", "Unit (NTD)", "Subtotal (NTD)"];
  const rows = top.map(p => {
    const q = state.qty[p.id] ?? 1;
    return [p.zh, p.en, p.lt, q, p.cost, q * p.cost];
  });
  // RFC 4180: any " inside a quoted field must be doubled to "". Without this,
  // a plant whose name contains a quote (or future free-text columns) breaks
  // Excel / Numbers parsing for every row that follows.
  const csvEsc = (c) => `"${String(c ?? "").replace(/"/g, '""')}"`;
  const csv = [header, ...rows].map(r => r.map(csvEsc).join(",")).join("\n");
  const blob = new Blob(["﻿" + csv], { type: "text/csv;charset=utf-8;" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = `landscape-plan-${state.space}.csv`; a.click();
  URL.revokeObjectURL(url);
};

function renderDictionary() {
  const q = (state.dictQuery || "").trim().toLowerCase();
  const curMonth = new Date().getMonth() + 1;
  const filtered = PLANTS.filter(p => {
    if (state.dictTier !== "all" && p.tier !== state.dictTier) return false;
    if (state.dictNative === "native" && !p.native) return false;
    if (state.dictNative === "intro"  && p.native)  return false;
    if (state.dictFragOnly    && !(p.fragrance >= 2)) return false;
    if (state.dictPetSafeOnly && p.pet_safe !== true) return false;
    if (state.dictWater !== "all" && p.water !== state.dictWater) return false;
    if (state.dictSpace !== "all" && !(p.spaces || []).includes(state.dictSpace)) return false;
    if (state.dictCoastalOnly && !p.coastal_ok) return false;
    if (state.dictEdibleOnly) {
      const txt = [p.type_zh, p.type_en, p.role_zh, p.role_en, (p.supports_zh||[]).join(" "), (p.supports_en||[]).join(" ")].join(" ").toLowerCase();
      if (!/可食|edible/i.test(txt)) return false;
    }
    if (state.dictThisMonth) {
      const bloomNow = (p.bloom || []).includes(curMonth);
      const fruitNow = (p.fruit || []).includes(curMonth);
      // "Plant this month" interpretation: best planting windows in Taiwan are spring (3-5) and autumn (10-11);
      // for those months, show plants currently in bloom or fruit; otherwise show plants that bloom/fruit within ±2 months
      if (curMonth >= 3 && curMonth <= 5 || curMonth >= 10 && curMonth <= 11) {
        if (!bloomNow && !fruitNow) return false;
      } else {
        const nearby = (m) => Math.min((m - curMonth + 12) % 12, (curMonth - m + 12) % 12) <= 2;
        const anyNearby = (p.bloom || []).some(nearby) || (p.fruit || []).some(nearby);
        if (!anyNearby) return false;
      }
    }
    if (q) {
      const hay = [p.zh, p.en, p.lt, p.role_zh, p.role_en, p.origin_zh, p.origin_en, p.type_zh, p.type_en].join(" ").toLowerCase();
      if (!hay.includes(q)) return false;

    return true;

function wireDictionary() {
  document.getElementById("dictSearch")?.addEventListener("input", (e) => {
    state.dictQuery = e.target.value;
    const host = document.getElementById("tabPanel");
    if (host) host.innerHTML = renderDictionary();
    wireDictionary();
    applyLanguage();
    // Keep focus on the input after re-render
    const s = document.getElementById("dictSearch");
    if (s) { s.focus(); s.setSelectionRange(s.value.length, s.value.length); }
  });
  document.querySelectorAll(".dict-chip[data-tier]").forEach(el => {
    el.addEventListener("click", () => { state.dictTier = el.dataset.tier; rerenderDict(); });
  });
  document.querySelectorAll(".dict-chip[data-native]").forEach(el => {
    el.addEventListener("click", () => { state.dictNative = el.dataset.native; rerenderDict(); });
  });
  document.querySelectorAll(".dict-chip[data-flag]").forEach(el => {
    el.addEventListener("click", () => {
      if (el.dataset.flag === "frag") state.dictFragOnly = !state.dictFragOnly;
      if (el.dataset.flag === "petsafe") state.dictPetSafeOnly = !state.dictPetSafeOnly;
      rerenderDict();
    });
  });
  document.querySelectorAll(".rec-card[data-id]").forEach(el => {
    el.addEventListener("click", (e) => {
      if (e.target.closest(".pref-btn") || e.target.closest(".pref-row")) return;
      openDrawer(el.dataset.id);
    });
  });
  document.querySelectorAll(".pref-btn[data-pref]").forEach(el => {
    const handler = (e) => {
      e.stopPropagation();
      e.preventDefault();
      setPref(el.dataset.pid, el.dataset.pref);
    };
    el.addEventListener("click", handler);
    el.addEventListener("keydown", (e) => {
      if (e.key === "Enter" || e.key === " ") handler(e);
    });
  });
  // Plant-compare pick mode — wires overlay clicks on every dict rec-card.
  wirePlantComparePicking();

  // Empty-state "Clear all filters" CTA — resets every dictionary filter
  // (query, tier, native, fragrance, pet-safe, water, space, edible, coastal,
  // this-month) so the user can start fresh without manually un-toggling each chip.
  document.getElementById("dictClearAllBtn")?.addEventListener("click", () => {
    state.dictQuery = "";
    state.dictTier = "all";
    state.dictNative = "all";
    state.dictFragOnly = false;
    state.dictPetSafeOnly = false;
    state.dictWater = "all";
    state.dictSpace = "all";
    state.dictEdibleOnly = false;
    state.dictCoastalOnly = false;
    state.dictThisMonth = false;
    rerenderDict();
  });
}

function rerenderDict() {
  const host = document.getElementById("tabPanel");
  if (host) host.innerHTML = renderDictionary();
  wireDictionary();
  applyLanguage();
}

        <div class="drawer-block">
          <div class="drawer-block-title" data-zh="哪裡可以買 · SOURCING" data-en="Where to find · SOURCING">哪裡可以買 · SOURCING</div>
          <p class="drawer-text" data-zh="${plant.sourcing_zh ?? "—"}" data-en="${plant.sourcing_en ?? "—"}">${plant.sourcing_zh ?? "—"}</p>
        </div>

        ${(() => {
          // R22 — "Similar plants" strip. Find plants sharing tier + native
          // status (or relax to same tier only if too few), prefer
          // non-overlapping bloom months so users can build a sequence of
          // colour. Top 3-4 small clickable cards open their own drawer.
          const bloomSet = new Set(plant.bloom || []);
          const all = PLANTS.filter(p => p.id !== plant.id && p.tier === plant.tier);
          let pool = all.filter(p => p.native === plant.native);
          if (pool.length < 3) pool = all;
          const scored = pool.map(p => {
            const pb = new Set(p.bloom || []);
            let overlap = 0;
            pb.forEach(m => { if (bloomSet.has(m)) overlap += 1; });
            return { p, overlap };
          });
          // Sort: low overlap first (complementary bloom), then alphabetical zh
          scored.sort((a, b) => {
            if (a.overlap !== b.overlap) return a.overlap - b.overlap;
            return a.p.zh.localeCompare(b.p.zh, "zh-Hant");
          });
          const picks = scored.slice(0, 4).map(s => s.p);
          if (picks.length < 1) return "";
          return `
            <div class="drawer-block">

                    <div class="similar-name" data-zh="${sp.zh}" data-en="${sp.en}">${sp.zh}</div>
                    <div class="similar-role" data-zh="${sp.role_zh}" data-en="${sp.role_en}">${sp.role_zh}</div>

        })()}

        <div class="drawer-foot" data-zh="Biodiversity Living System · 植物資料庫" data-en="Biodiversity Living System · Plant Database">Biodiversity Living System · 植物資料庫</div>

  document.getElementById("drawerOverlay").addEventListener("click", closeDrawer);
  document.getElementById("drawerClose").addEventListener("click", (e) => { e.stopPropagation(); closeDrawer(); });
  // ↔ "Compare plant" button — captures this plant as #1 and closes drawer
  // so the user can navigate to the dictionary / result page to pick #2.
  const dcBtn = document.getElementById("drawerCompareBtn");
  if (dcBtn) {
    dcBtn.addEventListener("click", (e) => {
      e.stopPropagation();
      startPlantCompare(plant.id);
    });
  }
  // ESC closes the drawer (parity with the QR + Tips modals). Listener is
  // attached document-wide and removed in closeDrawer() to avoid leaking
  // handlers when the user reopens drawers many times in a session.
  document.addEventListener("keydown", drawerEscHandler);
  // Companion pill clicks → switch the drawer to the companion plant
  document.querySelectorAll(".companion-pill").forEach((el) => {
    el.addEventListener("click", (e) => { e.stopPropagation(); openDrawer(el.dataset.cid); });
  });
  // R22 — Similar plants card clicks → swap drawer to the chosen plant.
  document.querySelectorAll("#drawerOverlay .similar-card[data-sid]").forEach((el) => {
    el.addEventListener("click", (e) => { e.stopPropagation(); openDrawer(el.dataset.sid); });
  });
  // 📌/👍/👎 inside the drawer — scoped to the drawer overlay so we don't
  // double-bind the rec-grid pref-btns underneath. setPref triggers a re-render
  // of the result page, so we re-open the drawer afterwards to refresh its state.
  document.querySelectorAll("#drawerOverlay .pref-btn[data-pref]").forEach(el => {
    const handler = (e) => {
      e.stopPropagation();
      e.preventDefault();
      const pid = el.dataset.pid;
      const kind = el.dataset.pref;
      setPref(pid, kind);
      // setPref re-renders the result page; re-open the drawer so the toggle
      // state visually updates without the user having to dismiss and re-tap.
      openDrawer(pid);
    };
    el.addEventListener("click", handler);
    el.addEventListener("keydown", (e) => {
      if (e.key === "Enter" || e.key === " ") handler(e);
    });
  });
  applyLanguage();
}

function closeDrawer() {
  state.selectedPlantId = null;
  drawerHost.innerHTML = "";
  document.body.classList.remove("drawer-open");
  document.removeEventListener("keydown", drawerEscHandler);
}

function drawerEscHandler(e) { if (e.key === "Escape") closeDrawer(); }

// ─────────────────────────────────────────────────────────────
// PLANT COMPARE (R28) — side-by-side comparison of two plants.
// Separate from the saved-design compare (compareFirstId/SecondId).
// Flow:
//   1. User clicks "↔ 比較植物" inside an open plant drawer → startPlantCompare()
//      stashes that plant's id as #1, closes the drawer, shows top-bar
//      pick banner. State is transient — never persisted.
//   2. User navigates to the dictionary or any rec-grid. Re-renders include
//      a "選為第二個" overlay on every rec-card when pick mode is active.
//   3. User clicks an overlay → pickPlantCompareSecond() opens the modal.
//   4. Modal close / ESC / click-outside → closePlantCompareModal() also
//      clears the pick state so the banner disappears.
// ─────────────────────────────────────────────────────────────
function startPlantCompare(plantId) {
  state.plantCompareFirstId = plantId;
  state.plantCompareSecondId = null;
  closeDrawer();
  updatePlantPickBar();
  // Re-render whatever view is currently visible so rec-cards pick up
  // the .plant-compare-pickable overlay class. Cheapest: just re-call
  // render() which fan-outs to the active tab/step.
  render();
  // Smooth scroll so the user sees the new pick-mode banner.
  window.scrollTo({ top: 0, behavior: "smooth" });
}

function exitPlantCompare() {
  state.plantCompareFirstId = null;
  state.plantCompareSecondId = null;
  updatePlantPickBar();
  closePlantCompareModal();
  render();
}

function pickPlantCompareSecond(plantId) {
  // Don't let users pick the same plant twice.
  if (!state.plantCompareFirstId || plantId === state.plantCompareFirstId) return;
  state.plantCompareSecondId = plantId;
  updatePlantPickBar();
  openPlantCompareModal();
}

// Renders / removes the sticky top-bar pick banner depending on state.
// Banner is appended to <body> as a sibling of .screen-bar so it sits
// above the brand header but below modals (z-index 26 < qr 25... let's
// double-check: qr-overlay z-index is 25, drawer-overlay also high.
// We keep this above the brand bar but BELOW modals — and the banner
// gets hidden once second is picked since the modal goes on top anyway.
function updatePlantPickBar() {
  const existing = document.getElementById("plantPickBar");
  const active = state.plantCompareFirstId && !state.plantCompareSecondId;
  if (!active) {
    if (existing) existing.remove();
    return;
  }
  const plant = PLANT_BY_ID[state.plantCompareFirstId];
  if (!plant) return;
  const zhMsg = `📌 已選擇 <strong>${escapeHtml(plant.zh)}</strong> · 從植物字典或結果頁選擇第二個植物`;
  const enMsg = `📌 <strong>${escapeHtml(plant.en)}</strong> selected · Pick a second plant from the dictionary or result page`;
  const exitZh = "✕ 取消比較";
  const exitEn = "✕ Cancel compare";
  if (existing) {
    existing.querySelector(".pp-msg").innerHTML = state.lang === "zh" ? zhMsg : enMsg;
    existing.querySelector(".pp-msg").setAttribute("data-zh", zhMsg);
    existing.querySelector(".pp-msg").setAttribute("data-en", enMsg);
    return;
  }
  const bar = document.createElement("div");
  bar.className = "plant-pick-bar";
  bar.id = "plantPickBar";
  bar.innerHTML = `
    <div class="pp-msg" data-zh="${zhMsg}" data-en="${enMsg}">${state.lang === "zh" ? zhMsg : enMsg}</div>
    <button class="pp-exit" id="plantPickExit" data-zh="${exitZh}" data-en="${exitEn}">${state.lang === "zh" ? exitZh : exitEn}</button>`;
  // Insert right after .screen-bar so it sits at the top of the document flow.
  const screenBar = document.querySelector(".screen-bar");
  if (screenBar && screenBar.parentNode) {
    screenBar.parentNode.insertBefore(bar, screenBar.nextSibling);
  } else {
    document.body.appendChild(bar);
  }
  document.getElementById("plantPickExit").addEventListener("click", exitPlantCompare);
}

// Returns the HTML for the "Pick this as #2" overlay shown on rec-cards
// when pick mode is active. Empty string when inactive.
function plantPickOverlayHTML() {
  if (!state.plantCompareFirstId || state.plantCompareSecondId) return "";
  return `<span class="plant-pick-overlay">
    <span class="pp-big">↔</span>
    <span class="pp-label" data-zh="選為第二個" data-en="Pick this">選為第二個</span>
  </span>`;
}

// Wires every visible rec-card[data-id] for plant-pick mode. Called after
// each render that has rec-cards (dictionary + result page + spotlight).
function wirePlantComparePicking() {
  if (!state.plantCompareFirstId || state.plantCompareSecondId) return;
  document.querySelectorAll(".rec-card[data-id]").forEach(el => {
    const pid = el.dataset.id;
    if (pid === state.plantCompareFirstId) {
      el.classList.add("plant-compare-first");
      return;
    }
    el.classList.add("plant-compare-pickable");
    // Find the overlay we injected and bind. Use capture-phase listener so
    // we intercept the click BEFORE the rec-card's own openDrawer handler.
    const ov = el.querySelector(".plant-pick-overlay");
    if (ov && !ov.dataset.bound) {
      ov.dataset.bound = "1";
      ov.addEventListener("click", (e) => {
        e.stopPropagation();
        e.preventDefault();
        pickPlantCompareSecond(pid);
      });
    }
  });
}

// Render the 2-column modal comparing first vs second plant.
function openPlantCompareModal() {
  const a = PLANT_BY_ID[state.plantCompareFirstId];
  const b = PLANT_BY_ID[state.plantCompareSecondId];
  if (!a || !b) return;
  closePlantCompareModal(); // ensure single instance
  // Also clear the pick banner — modal supersedes it.
  const bar = document.getElementById("plantPickBar");
  if (bar) bar.remove();

  const ea = expert(a), eb = expert(b);
  const sunZh = (s) => ({full:"全日照", part:"半日照", shade:"耐陰"})[s] || s;
  const sunEn = (s) => ({full:"Full sun", part:"Part sun", shade:"Shade"})[s] || s;
  const waterZh = { low:"低", med:"中", high:"高" };
  const waterEn = { low:"Low", med:"Medium", high:"High" };
  const growZh = { slow:"慢", med:"中", fast:"快" };
  const growEn = { slow:"Slow", med:"Medium", fast:"Fast" };

  // Maintenance score = mature_yr * grow_rate weight (lower = easier).
  // Slow growers planted as small plants take longer to fill in but need
  // less pruning; fast growers fill fast but need frequent trimming.
  // Combine into a single 0-10ish heuristic, lower = lower-maintenance.
  const growWt = { slow: 0.8, med: 1.0, fast: 1.6 };
  const maint = (p, e) => {
    const yr = p.mature_yr || 5;
    const g = growWt[e.grow_rate] || 1.0;
    return Math.round(yr * g * 10) / 10;
  };
  const maintLabelZh = (m) => m < 4 ? "低" : m < 8 ? "中" : "高";
  const maintLabelEn = (m) => m < 4 ? "Low" : m < 8 ? "Medium" : "High";
  const ma = maint(a, ea), mb = maint(b, eb);

  // Bloom strip (12 month cells) — bloom pink, fruit gold, both = both.
  const bloomStrip = (p) => {
    const bs = new Set(p.bloom || []);
    const fs = new Set(p.fruit || []);
    const cells = [];
    for (let m = 1; m <= 12; m++) {
      const isB = bs.has(m), isF = fs.has(m);
      const cls = isB && isF ? "both" : isB ? "bloom" : isF ? "fruit" : "";
      cells.push(`<span class="pcm-bfcell ${cls}"></span>`);
    }
    return `<span class="pcm-bloomfruit">${cells.join("")}</span>`;
  };

  // Badge row — native / fragrance / pet-safe.
  const badges = (p) => {
    const out = [];
    if (p.native) out.push(`<span class="pcm-badge">🌱 <span data-zh="原生" data-en="Native">原生</span></span>`);
    else out.push(`<span class="pcm-badge">🌍 <span data-zh="外來" data-en="Intro">外來</span></span>`);
    if (p.fragrance >= 2) out.push(`<span class="pcm-badge">🌸 <span data-zh="芳香" data-en="Fragrant">芳香</span></span>`);
    if (p.pet_safe === true) out.push(`<span class="pcm-badge">🐾 <span data-zh="寵物安全" data-en="Pet-safe">寵物安全</span></span>`);
    if (p.pet_safe === false) out.push(`<span class="pcm-badge">⚠ <span data-zh="寵物注意" data-en="Pet caution">寵物注意</span></span>`);
    return out.join("");
  };

  // Determine "winners" per axis. ✓ goes to the side that's better on that
  // axis (lower water = better, higher CO2 absorbed = better, lower
  // maintenance = better). Other axes (sun, bloom, size) are descriptive
  // only — no winner.
  const winWater = (() => {
    const aw = ea.water_l_wk, bw = eb.water_l_wk;
    if (aw === bw) return null;
    return aw < bw ? "a" : "b";
  })();
  const winCO2 = (() => {
    if (ea.co2_kg_yr === eb.co2_kg_yr) return null;
    return ea.co2_kg_yr > eb.co2_kg_yr ? "a" : "b";
  })();
  const winMaint = (() => {
    if (ma === mb) return null;
    return ma < mb ? "a" : "b";
  })();

  // Compose one column. `side` is "a" or "b".
  const col = (p, e, m, side) => {
    const tickWater = winWater === side ? `<span class="pcm-win">✓</span>` : "";
    const tickCO2   = winCO2   === side ? `<span class="pcm-win">✓</span>` : "";
    const tickMaint = winMaint === side ? `<span class="pcm-win">✓</span>` : "";
    const waterCls = winWater && winWater !== side ? "pcm-row" : (winWater === side ? "pcm-row win" : "pcm-row");
    const co2Cls   = winCO2   && winCO2   !== side ? "pcm-row" : (winCO2   === side ? "pcm-row win" : "pcm-row");
    const maintCls = winMaint && winMaint !== side ? "pcm-row" : (winMaint === side ? "pcm-row win" : "pcm-row");
    return `
      <div class="pcm-col">
        <div class="pcm-head">
          <div class="pcm-swatch" style="background:${p.color}"></div>
          <div>
            <div class="pcm-name" data-zh="${escapeHtml(p.zh)}" data-en="${escapeHtml(p.en)}">${escapeHtml(p.zh)}</div>
            <div class="pcm-latin">${escapeHtml(p.lt || "")}</div>
          </div>
        </div>
        <div class="pcm-badges">${badges(p)}</div>
        <div class="pcm-row">
          <span class="pcm-k" data-zh="高度 × 冠幅" data-en="Height × Spread">高度 × 冠幅</span>
          <span class="pcm-v">${p.height[0]}–${p.height[1]} × ${p.spread[0]}–${p.spread[1]} m</span>
        </div>
        <div class="pcm-row">
          <span class="pcm-k" data-zh="光照需求" data-en="Sun">光照需求</span>
          <span class="pcm-v" data-zh="${(p.sun || []).map(sunZh).join(" / ")}" data-en="${(p.sun || []).map(sunEn).join(" / ")}">${(p.sun || []).map(sunZh).join(" / ")}</span>
        </div>
        <div class="${waterCls}">
          <span class="pcm-k" data-zh="水分需求" data-en="Water">水分需求</span>
          <span class="pcm-v" data-zh="${tickWater}${waterZh[p.water] || p.water || "—"} · ${e.water_l_wk} L/週"
                                data-en="${tickWater}${waterEn[p.water] || p.water || "—"} · ${e.water_l_wk} L/wk">${tickWater}${waterZh[p.water] || p.water || "—"} · ${e.water_l_wk} L/週</span>
        </div>
        <div class="pcm-row">
          <span class="pcm-k" data-zh="花期 / 結果" data-en="Bloom / fruit">花期 / 結果</span>
          ${bloomStrip(p)}
        </div>
        <div class="${maintCls}">
          <span class="pcm-k" data-zh="維護難度" data-en="Maintenance">維護難度</span>
          <span class="pcm-v" data-zh="${tickMaint}${maintLabelZh(m)} (${m})" data-en="${tickMaint}${maintLabelEn(m)} (${m})">${tickMaint}${maintLabelZh(m)} (${m})</span>
        </div>
        <div class="${co2Cls}">
          <span class="pcm-k" data-zh="CO₂/年" data-en="CO₂/yr">CO₂/年</span>
          <span class="pcm-v">${tickCO2}${e.co2_kg_yr} kg</span>
        </div>
        <div class="pcm-row">
          <span class="pcm-k" data-zh="水/週" data-en="Water/wk">水/週</span>
          <span class="pcm-v">${e.water_l_wk} L</span>
        </div>
      </div>`;
  };

  const overlay = document.createElement("div");
  overlay.className = "qr-overlay";
  overlay.id = "plantCompareOverlay";
  // R31 — full dialog ARIA. aria-labelledby points to the bilingual title
  // header so screen readers announce "↔ Compare plants" / "↔ 植物比較"
  // (instead of the generic aria-label that doesn't toggle with language).
  overlay.setAttribute("role", "dialog");
  overlay.setAttribute("aria-modal", "true");
  overlay.setAttribute("aria-labelledby", "pcmTitle");
  overlay.innerHTML = `
    <div class="plant-compare-modal" id="plantCompareModal">
      <button class="pcm-close" id="plantCompareClose" aria-label="${t('關閉','Close')}">✕</button>
      <h3 class="pcm-title" id="pcmTitle" data-zh="↔ 植物比較：${escapeHtml(a.zh)} vs ${escapeHtml(b.zh)}" data-en="↔ Compare: ${escapeHtml(a.en)} vs ${escapeHtml(b.en)}">↔ 植物比較：${escapeHtml(a.zh)} vs ${escapeHtml(b.zh)}</h3>
      <div class="pcm-grid">
        ${col(a, ea, ma, "a")}
        ${col(b, eb, mb, "b")}
      </div>
      <div class="pcm-foot" data-zh="✓ = 該欄位較佳（水量少 / CO₂ 高 / 維護低）"
                          data-en="✓ = better on this axis (less water / more CO₂ / lower maintenance)">
        ✓ = 該欄位較佳（水量少 / CO₂ 高 / 維護低）
      </div>
    </div>`;
  // Click-outside (overlay backdrop) closes.
  overlay.addEventListener("click", (e) => { if (e.target === overlay) closePlantCompareModal(); });
  document.body.appendChild(overlay);
  const closeBtn = document.getElementById("plantCompareClose");
  closeBtn.addEventListener("click", closePlantCompareModal);
  document.addEventListener("keydown", plantCompareEscHandler);
  // R31 — basic focus management. Move focus into the modal so keyboard
  // and screen-reader users land inside the dialog; trap Tab so focus
  // can't escape back into the (inert) result page behind the overlay.
  closeBtn.focus();
  overlay.addEventListener("keydown", plantCompareTrapTab);
  applyLanguage();
}

// R31 — naive but effective focus trap for the compare modal. The modal
// only has a handful of focusable elements (close button + any badges
// nothing focusable inside the columns), so we just cycle between the
// first and last focusable nodes inside #plantCompareOverlay.
function plantCompareTrapTab(e) {
  if (e.key !== "Tab") return;
  const overlay = document.getElementById("plantCompareOverlay");
  if (!overlay) return;
  const focusables = overlay.querySelectorAll(
    'button, [href], input, select, textarea, [tabindex]:not([tabindex="-1"])'
  );
  if (!focusables.length) return;
  const first = focusables[0];
  const last = focusables[focusables.length - 1];
  if (e.shiftKey && document.activeElement === first) {
    e.preventDefault();
    last.focus();
  } else if (!e.shiftKey && document.activeElement === last) {
    e.preventDefault();
    first.focus();
  }
}

function closePlantCompareModal() {
  const o = document.getElementById("plantCompareOverlay");
  if (o) {
    o.removeEventListener("keydown", plantCompareTrapTab);
    o.remove();
  }
  document.removeEventListener("keydown", plantCompareEscHandler);
  // Closing the modal also exits compare mode entirely — clear the picks
  // so the pickable overlays and banner go away.
  if (state.plantCompareFirstId || state.plantCompareSecondId) {
    state.plantCompareFirstId = null;
    state.plantCompareSecondId = null;
    updatePlantPickBar();
    // Strip overlay classes from rec-cards without a full re-render.
    document.querySelectorAll(".rec-card.plant-compare-pickable, .rec-card.plant-compare-first").forEach(el => {
      el.classList.remove("plant-compare-pickable", "plant-compare-first");
      const ov = el.querySelector(".plant-pick-overlay");
      if (ov) ov.remove();
    });
  }
}

function plantCompareEscHandler(e) { if (e.key === "Escape") closePlantCompareModal(); }

// ─────────────────────────────────────────────────────────────
// Language toggle (zh/en) — same data-zh/data-en pattern as farm-pitch.html
// ─────────────────────────────────────────────────────────────
function applyLanguage() {
  // Perf: only walk the regions that actually carry bilingual strings instead
  // of the entire <body>. The result page in particular has thousands of
  // [data-zh][data-en] nodes — scoping cuts language-toggle / re-render cost
  // by tens of ms on a warm result page. Roots: #app (main content),
  // #topBarLeft + .screen-bar (top bar), #navFooter (bottom nav), #drawerHost
  // (open plant drawer), #progressWrap (wizard progress).
  const roots = [
    document.getElementById("app"),
    document.querySelector(".screen-bar"),
    document.getElementById("navFooter"),
    document.getElementById("drawerHost"),
    document.getElementById("progressWrap"),
    // R28 — plant-compare pick banner + modal are appended directly to <body>
    // (mirroring the QR modal pattern), so they aren't inside #app and need
    // their own root for the language walk.
    document.getElementById("plantPickBar"),
    document.getElementById("plantCompareOverlay"),
  ].filter(Boolean);
  for (const root of roots) {
    root.querySelectorAll("[data-zh][data-en]").forEach((el) => {
      el.innerHTML = el.dataset[state.lang];
    });
    // Sync `placeholder` for inputs/textareas that opt-in via data-zh-placeholder/data-en-placeholder.
    root.querySelectorAll("[data-zh-placeholder][data-en-placeholder]").forEach((el) => {
      const v = state.lang === "zh" ? el.dataset.zhPlaceholder : el.dataset.enPlaceholder;
      if (v != null) el.setAttribute("placeholder", v);
    });
    // Sync `aria-label` for elements that opt-in via data-zh-aria/data-en-aria.
    root.querySelectorAll("[data-zh-aria][data-en-aria]").forEach((el) => {
      const v = state.lang === "zh" ? el.dataset.zhAria : el.dataset.enAria;
      if (v != null) el.setAttribute("aria-label", v);
    });
  }
  document.documentElement.lang = state.lang === "zh" ? "zh-Hant" : "en";
  document.getElementById("langToggle").textContent = state.lang === "zh" ? "English" : "中文";
}

document.getElementById("langToggle").addEventListener("click", () => {
  state.lang = state.lang === "zh" ? "en" : "zh";
  render();
});

  overlay.setAttribute("aria-modal", "true");
  overlay.setAttribute("aria-label", titleText);
  overlay.innerHTML = `
    <div class="tips-modal" id="aboutModal">
      <button class="tips-close" id="aboutCloseBtn" aria-label="${closeText}">✕</button>
      <h3 class="tips-title">${titleText}</h3>
      <ul>${items}</ul>
    </div>`;
  overlay.addEventListener("click", (e) => { if (e.target === overlay) closeAboutModal(); });
  document.body.appendChild(overlay);
  document.getElementById("aboutCloseBtn").addEventListener("click", closeAboutModal);
  document.addEventListener("keydown", aboutEscHandler);
};
function aboutEscHandler(e) { if (e.key === "Escape") closeAboutModal(); }
window.closeAboutModal = function () {
  const o = document.getElementById("aboutOverlay");
  if (o) o.remove();
  document.removeEventListener("keydown", aboutEscHandler);
};

// ─────────────────────────────────────────────────────────────
// Print result bundle (A2): when on the results page, instead of printing only
// the visible tab, mount a hidden "print bundle" containing the most useful
// subset (top rec cards + 3D view + care calendar). Print the bundle, then
// remove it. Outside the results page we fall back to plain window.print().
// ─────────────────────────────────────────────────────────────
window.printResultBundle = function () {
  // Only build the bundle when we're actually on the result tabs view —
  // elsewhere (home / wizard / photo / pitch print) keep native behavior.
  const onResult = state.view === "wizard" && state.step === 5;
  if (!onResult) { window.print(); return; }

  let bundle = null;
  let cleanup = () => {};
  try {
    const scored = scorePlants();
    const all = scored.filter(p => p.score >= 30);
    const recs = state.nativeOnly ? all.filter(p => p.native) : all;
    const layers = buildLayers(state.nativeOnly ? scored.filter(p => p.native) : scored);

    // Build the three sections. render3D / renderCareCalendar return HTML strings.
    // Top 8 rec cards (concise summary — full rec-grid is in the live view too).
    const topRecs = recs.slice(0, 8);
    const sectionTitle = (zh, en) => `<h2 class="pb-h2">${state.lang === "zh" ? zh : en}</h2>`;

    const recCardsHTML = `
      <section class="pb-section">
        ${sectionTitle("推薦植物 · Top " + topRecs.length, "Recommended plants · Top " + topRecs.length)}
        <div class="rec-grid">
          ${topRecs.map(p => {
            const name = state.lang === "zh" ? p.zh : p.en;
            const latin = p.latin || "";
            const matchLabel = state.lang === "zh" ? "適配" : "Match";
            const nativeLabel = p.native ? (state.lang === "zh" ? "🌱 原生" : "🌱 Native") : (state.lang === "zh" ? "🌍 外來" : "🌍 Intro");
            return `
              <div class="rec-card" style="padding:14px 16px;">
                <div style="font-family:var(--serif);font-size:17px;font-weight:600;color:var(--forest);">${escapeHtml(name)}</div>
                <div style="font-size:12px;color:var(--ink-soft);font-style:italic;">${escapeHtml(latin)}</div>
                <div style="font-size:11.5px;color:var(--ink-soft);margin-top:6px;">${nativeLabel} · ${matchLabel} ${p.score}</div>
              </div>`;
          }).join("")}
        </div>
      </section>`;

    const threeDHTML = `
      <section class="pb-section">
        ${sectionTitle("3D 視角", "3D view")}
        ${render3D(layers, recs, recs)}
      </section>`;

    const careHTML = `
      <section class="pb-section">
        ${sectionTitle("養護月曆", "Care calendar")}
        ${renderCareCalendar(recs)}
      </section>`;

    bundle = document.createElement("div");
    bundle.className = "print-bundle";
    bundle.id = "printBundle";
    bundle.innerHTML = recCardsHTML + threeDHTML + careHTML;
    document.body.appendChild(bundle);
    document.body.classList.add("printing-bundle");
    // Apply current language to the freshly inserted nodes.
    try { applyLanguage(); } catch (e) {}

    cleanup = () => {
      document.body.classList.remove("printing-bundle");
      if (bundle && bundle.parentNode) bundle.parentNode.removeChild(bundle);
    };

    // afterprint fires after the print dialog closes (Chrome/Safari/FF).
    const onAfter = () => { window.removeEventListener("afterprint", onAfter); cleanup(); };
    window.addEventListener("afterprint", onAfter);
    // Belt-and-suspenders: also schedule a delayed cleanup in case afterprint
    // never fires (some browsers under print-to-PDF).
    setTimeout(() => { try { onAfter(); } catch (e) {} }, 15000);

    window.print();
  } catch (e) {
    try { cleanup(); } catch (err) {}
    // Last-resort fallback so the user still gets *some* PDF.
    window.print();
  }
};

// ─────────────────────────────────────────────────────────────
// Init
// ─────────────────────────────────────────────────────────────
// Try restoring from URL hash (shared / bookmarked) or localStorage before first render.
// If hash is present → go straight to the restored result page.
// If only localStorage → stay on home but show a "welcome back" banner offering to resume.
tryRestoreDashboard();
updateLineShare();
render();
</script>
</body>
