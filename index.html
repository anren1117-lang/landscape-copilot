  { k:"dict",      zh:"植物字典",     en:"Plant dictionary" },
];

function initShoppingQty() {
  const scored = scorePlants();
  let compatible = scored.filter(p => p.score >= 30);
  if (state.nativeOnly) compatible = compatible.filter(p => p.native);
  compatible = compatible.slice(0, 8);
  state.qty = {};

  // Scale default quantities to the actual area when known. Rough nursery-density rules:
  //   canopy ~1 per 8 m², shrub ~1 per 2 m², ground ~2 per m², water ~2, climber ~1.
  const area = (state.widthM || SPACE_DEFAULTS[state.space].w) *
               (state.depthM || SPACE_DEFAULTS[state.space].d);
  const tierQty = (tier) => {
    switch (tier) {
      case "T": return Math.max(1, Math.round(area / 8));
      case "S": return Math.max(1, Math.round(area / 2));
      case "G": return Math.max(2, Math.round(area * 2));
      case "W": return 2;
      case "C": return Math.max(1, Math.round(area / 6));
      default:  return 1;
    }
  };
  compatible.forEach((p) => { state.qty[p.id] = tierQty(p.tier); });
}

function renderResult() {
  // Anytime we render the result page, this counts as a saved dashboard —
  // persist to localStorage + update URL hash so a bookmark / shared link
  // becomes the user's personal "dashboard".
  persistDashboard();

  const scored = scorePlants();
  // Apply native-only filter at the result level (scoring stays the same so the
  // filter can be toggled live without recomputing scores).
  const all = scored.filter(p => p.score >= 30);
  const recs = state.nativeOnly ? all.filter(p => p.native) : all;
  const nativeCount = all.filter(p => p.native).length;
  const introCount = all.length - nativeCount;
  const layers = buildLayers(state.nativeOnly ? scored.filter(p => p.native) : scored);

  const sunLabel = SUN_OPTIONS.find(o => o.key === state.sun);
  const waterLabel = WATER_OPTIONS.find(o => o.key === state.water);
  const spaceLabel = SPACE_OPTIONS.find(o => o.key === state.space);
  const w = state.widthM || SPACE_DEFAULTS[state.space].w;
  const d = state.depthM || SPACE_DEFAULTS[state.space].d;
  const area = (w * d).toFixed(1);
  const det = state.detected;
  // XSS: det.county originates either from OSM Nominatim or from a `#d=` snapshot
  // (attacker-controlled). Sanitize before interpolating into HTML attributes/text.
  const detCountySafe = det?.county ? escapeHtml(det.county) : "";
  const locText_zh = detCountySafe ? `${detCountySafe}的` : "";
  const locText_en = detCountySafe ? `${detCountySafe}'s ` : "";

  // Shared-design viewing bar — only when user clicked "View shared" in the conflict banner.
  // It reminds them their own design is safe and offers two recoveries: commit shared or back to mine.
  const viewingSharedBar = state.viewingShared ? `
      <div class="viewing-shared-bar" role="status">
        <span class="vs-text">
          <strong data-zh="正在預覽分享的設計" data-en="Previewing a shared design">正在預覽分享的設計</strong>
          <span data-zh=" · 你的設計仍安全保存，沒有被覆蓋。"
                data-en=" · Your own design is still safe, not overwritten.">
                · 你的設計仍安全保存，沒有被覆蓋。
          </span>
        </span>
        <span class="vs-actions">
          <button class="primary" id="vsSaveBtn"><span data-zh="存成我的新設計" data-en="Save as my new design">存成我的新設計</span></button>
          <button id="vsBackBtn"><span data-zh="回到我的設計" data-en="Back to mine">回到我的設計</span></button>
        </span>
      </div>` : "";

  app.innerHTML = `
    <div class="fade-up">
      ${viewingSharedBar}
      <div class="kicker" data-zh="你的專屬配置 · GENERATED" data-en="Your custom plan · GENERATED">你的專屬配置 · GENERATED</div>
      <h1 class="title"
         data-zh="${locText_zh}${area} m² 的<br/>原生植物復層景觀"
         data-en="A native-plant layered landscape for<br/>${locText_en}${area} m² ${spaceLabel.en.toLowerCase()}">
         ${locText_zh}${area} m² 的<br/>原生植物復層景觀
      </h1>
      <div class="chip-row">
        <span class="chip">📐 <span data-zh="${spaceLabel.zh} · ${area} m²" data-en="${spaceLabel.en} · ${area} m²">${spaceLabel.zh} · ${area} m²</span></span>
        ${det?.zone ? `<button type="button" class="chip zone-chip" id="zoneChip"
              data-zone="${det.zone}"
              role="button"
              aria-haspopup="dialog"
              aria-expanded="false"
              aria-controls="zoneClimatePop"
              tabindex="0"
              aria-label="${t('查看氣候區資訊', 'View climate-zone info')}"
              title="${t('點擊查看本區氣候摘要', 'Tap for climate summary')}">📍 <span data-zh="${ZONE_LABEL[det.zone].zh}" data-en="${ZONE_LABEL[det.zone].en}">${ZONE_LABEL[det.zone].zh}</span><span class="zone-chip-hint" aria-hidden="true">ⓘ</span></button>` : ""}
        ${det?.county ? `<span class="chip">🗺 ${detCountySafe}</span>` : ""}
        ${det?.coastal ? `<span class="chip">🌊 <span data-zh="近海岸 · 耐鹽" data-en="Coastal · salt-tolerant">近海岸 · 耐鹽</span></span>` : ""}
        <span class="chip">🧭 <span data-zh="朝${state.orientation === "N" ? "北" : state.orientation === "E" ? "東" : state.orientation === "S" ? "南" : "西"}" data-en="Facing ${state.orientation}">朝${state.orientation === "N" ? "北" : state.orientation === "E" ? "東" : state.orientation === "S" ? "南" : "西"}</span></span>
        <span class="chip">☀ <span data-zh="${sunLabel.zh}" data-en="${sunLabel.en}">${sunLabel.zh}</span></span>
        <span class="chip">💧 <span data-zh="${waterLabel.zh}水" data-en="${waterLabel.en} water">${waterLabel.zh}水</span></span>
        ${state.goals.map(g => {
          const go = GOAL_OPTIONS.find(o => o.key === g);
          return `<span class="chip"><span data-zh="${go.zh}" data-en="${go.en}">${go.zh}</span></span>`;
        }).join("")}
      </div>

      <div class="filter-row">
        <button class="filter-toggle ${state.nativeOnly ? "on" : ""}" id="nativeFilterBtn">
          🌱 <span data-zh="${state.nativeOnly ? "只看原生" : "包含外來"}" data-en="${state.nativeOnly ? "Native only" : "Include non-native"}">${state.nativeOnly ? "只看原生" : "包含外來"}</span>
          <span class="count">· ${state.nativeOnly ? nativeCount : `${nativeCount}+${introCount}`}</span>
        </button>
      </div>

      ${renderSustainChips(recs)}

      <div class="tabs-wrap at-start" id="tabsWrap">
        <div class="tabs" role="tablist" aria-label="${t('結果頁籤', 'Result tabs')}">
          ${RESULT_TABS.map(tab => {
            const selected = state.resultTab === tab.k;
            return `
            <button class="tab ${selected ? "active" : ""}"
                    role="tab"
                    data-tab="${tab.k}"
                    id="tab-${tab.k}"
                    aria-selected="${selected ? "true" : "false"}"
                    aria-controls="tabPanel"
                    tabindex="${selected ? "0" : "-1"}">
              <span data-zh="${tab.zh}" data-en="${tab.en}">${tab.zh}</span>
            </button>`;
          }).join("")}
        </div>
      </div>

      <div class="tab-panel" id="tabPanel" role="tabpanel" tabindex="0"></div>
    </div>`;

  const tabEls = Array.from(app.querySelectorAll('.tab[role="tab"]'));
  const syncTabAttrs = () => {
    tabEls.forEach((el) => {
      const sel = el.dataset.tab === state.resultTab;
      el.setAttribute("aria-selected", sel ? "true" : "false");
      el.setAttribute("tabindex", sel ? "0" : "-1");
      el.classList.toggle("active", sel);
    });
  };
  tabEls.forEach((tt) => {
    tt.addEventListener("click", () => {
      state.resultTab = tt.dataset.tab;
      syncTabAttrs();
      renderTabPanel(recs, layers);
      applyLanguage();
    });
    tt.addEventListener("keydown", (e) => {
      const idx = tabEls.indexOf(tt);
      let nextIdx = null;
      if (e.key === "ArrowRight") nextIdx = (idx + 1) % tabEls.length;
      else if (e.key === "ArrowLeft") nextIdx = (idx - 1 + tabEls.length) % tabEls.length;
      else if (e.key === "Home") nextIdx = 0;
      else if (e.key === "End") nextIdx = tabEls.length - 1;
      if (nextIdx !== null) {
        e.preventDefault();
        const next = tabEls[nextIdx];
        state.resultTab = next.dataset.tab;
        syncTabAttrs();
        renderTabPanel(recs, layers);
        applyLanguage();
        next.focus();
      }
    });
  });

  // Tab-bar fade-edge sync — hide the gradient when scrolled flush against an end
  // so the indicator honestly reflects whether more tabs are off-screen.
  // R31 — first detach any prior listener (each renderResult() rebuilds the
  // tab bar from scratch, so old listeners pointed at detached nodes would
  // leak until GC). __tabsFadeCleanup is module-scoped via window.
  if (window.__tabsFadeCleanup) {
    try { window.__tabsFadeCleanup(); } catch (e) { /* node already gone */ }
    window.__tabsFadeCleanup = null;
  }
  const tabsWrap = app.querySelector("#tabsWrap");
  const tabsScroller = tabsWrap?.querySelector(".tabs");
  if (tabsWrap && tabsScroller) {
    const updateEdges = () => {
      const max = tabsScroller.scrollWidth - tabsScroller.clientWidth;
      const x = tabsScroller.scrollLeft;
      tabsWrap.classList.toggle("at-start", x <= 1);
      tabsWrap.classList.toggle("at-end",   x >= max - 1 || max <= 0);
    };
    tabsScroller.addEventListener("scroll", updateEdges, { passive: true });
    // initial state + after layout settles
    requestAnimationFrame(updateEdges);
    setTimeout(updateEdges, 200);
    // Expose a cleanup so the next render (or a leave-result transition) can
    // detach this listener. Prevents memory leaks across many tab switches.
    window.__tabsFadeCleanup = () => {
      tabsScroller.removeEventListener("scroll", updateEdges, { passive: true });
    };
  }

  // Viewing-shared bar actions (only present when state.viewingShared is true)
  document.getElementById("vsSaveBtn")?.addEventListener("click", () => {
    // Commit the shared design as the user's new local design.
    state.viewingShared = false;
    state.pendingSharedSnapshot = null;
    state.pendingSnapshot = null;
    state.shareConflict = false;
    saveToLocal();
    pushHashFromState();
    render();
    window.scrollTo({ top: 0, behavior: "smooth" });
  });
  document.getElementById("vsBackBtn")?.addEventListener("click", () => {
    // Restore the user's own saved design and return to the result page.
    // pendingSnapshot still holds it because the conflict path never cleared it.
    const mine = state.pendingSnapshot || loadFromLocal();
    if (mine) applySnapshot(mine);
    state.viewingShared = false;
    state.pendingSharedSnapshot = null;
    state.shareConflict = false;
    state.pendingSnapshot = null;
    history.replaceState(null, "", location.pathname);
    initShoppingQty();
    render();
    window.scrollTo({ top: 0, behavior: "smooth" });
  });

  document.getElementById("nativeFilterBtn")?.addEventListener("click", () => {
    state.nativeOnly = !state.nativeOnly;
    // Re-init shopping qty when filter changes — top-8 list shifts
    initShoppingQty();
    renderResult();
    applyLanguage();
  });

  // R30 — zone chip tap opens climate summary popup.
  document.getElementById("zoneChip")?.addEventListener("click", (e) => {
    const z = e.currentTarget.dataset.zone;
    e.currentTarget.setAttribute("aria-expanded", "true");
    openZoneClimatePopup(z);
  });

  renderTabPanel(recs, layers);
}

// R30 — popup with short climate summary for the detected N/C/S/E zone.
// Numbers come from ZONE_CLIMATE (30-yr CWB norms, baked in — no live API).
function openZoneClimatePopup(zone) {
  if (!zone || !ZONE_CLIMATE[zone]) return;
  const existing = document.getElementById("zoneClimatePop");
  if (existing) existing.remove();
  const label = ZONE_LABEL[zone];
  const climate = ZONE_CLIMATE[zone];
  const wrap = document.createElement("div");
  wrap.className = "zone-pop-overlay";
  wrap.id = "zoneClimatePop";
  wrap.innerHTML = `
    <div class="zone-pop" role="dialog" aria-modal="true" aria-labelledby="zonePopTitle" onclick="event.stopPropagation()">
      <button class="zone-pop-close" id="zonePopClose" aria-label="${t('關閉', 'Close')}">✕</button>
      <div class="zone-pop-sub" data-zh="氣候區 · CLIMATE ZONE" data-en="Climate zone">氣候區 · CLIMATE ZONE</div>
      <h3 class="zone-pop-title" id="zonePopTitle"
          data-zh="📍 ${label.zh}" data-en="📍 ${label.en}">📍 ${label.zh}</h3>
      <p class="zone-pop-body"
         data-zh="${climate.zh}" data-en="${climate.en}">${climate.zh}</p>
      <p class="zone-pop-foot"
         data-zh="* 數據為中央氣象署 30 年平均氣候，非即時天氣"
         data-en="* 30-year climate norms (CWB), not a live forecast">* 數據為中央氣象署 30 年平均氣候，非即時天氣</p>
    </div>`;
  // R31 — keep the chip's aria-expanded honest as the popup tears down.
  const resetChipExpanded = () => {
    document.getElementById("zoneChip")?.setAttribute("aria-expanded", "false");
  };
  wrap.addEventListener("click", () => { wrap.remove(); resetChipExpanded(); });
  document.body.appendChild(wrap);
  document.getElementById("zonePopClose")?.addEventListener("click", () => { wrap.remove(); resetChipExpanded(); });
  // Close on Escape
  const onKey = (ev) => {
    if (ev.key === "Escape") { wrap.remove(); resetChipExpanded(); document.removeEventListener("keydown", onKey); }
  };
  document.addEventListener("keydown", onKey);
  applyLanguage();
}

function renderTabPanel(recs, layers) {
  const host = document.getElementById("tabPanel");
  if (!host) return;
  // R32: stash refs so the iso3d year-selector buttons can re-render in place
  // without plumbing recs/layers through every callsite.
  window.__lastRecs = recs;
  window.__lastLayers = layers;
  switch (state.resultTab) {
    case "preview":  host.innerHTML = renderRealisticPreview(recs); wirePreview(recs); break;
    case "plan":     host.innerHTML = renderPlan(layers, recs); wirePlanInteractions(); break;
    case "iso3d":    host.innerHTML = render3D(layers, recs, recs); wire3DInteractions(); break;
    case "layers":   host.innerHTML = renderLayers(layers, recs); wireLayerCards(); break;
    case "calendar": host.innerHTML = renderCalendar(recs); break;
    case "care":     host.innerHTML = renderCareCalendar(recs); wireCarePlantChips(); break;
    case "build":    host.innerHTML = renderBuildPlan(layers, recs); wireBuildPlantChips(); break;
    case "tutorials":host.innerHTML = renderTutorials(recs); wireTutorials(); break;
    case "shopping": host.innerHTML = renderShopping(recs); wireShoppingControls(); break;
    case "dict":     host.innerHTML = renderDictionary(); wireDictionary(); break;
  }
  applyLanguage();
}

// ── TAB: GARDEN PLAN (top-down SVG) ─────────────────────────
function renderPlan(layers, recs) {
  // Derive SVG viewBox from real width × depth. Keep total area constant-ish
  // so the SVG fits on screen, but preserve the aspect ratio so a long balcony
  // actually looks long and a square yard actually looks square.
  const realW = state.widthM || SPACE_DEFAULTS[state.space].w;
  const realD = state.depthM || SPACE_DEFAULTS[state.space].d;
  const area = (realW * realD).toFixed(1);
  // Pick a target size that fits the screen while preserving aspect ratio.
  const aspect = realW / realD;
  const maxW = 600, maxH = 420;
  let svgW, svgH;
  if (aspect >= maxW / maxH) { svgW = maxW; svgH = svgW / aspect; }
  else { svgH = maxH; svgW = svgH * aspect; }
  svgW = Math.max(280, svgW);
  svgH = Math.max(180, svgH);
  const dims = {
    w: svgW, h: svgH,
    label_zh: `${state.space === "balcony" ? "陽台" : state.space === "rooftop" ? "頂樓" : state.space === "yard" ? "庭院" : "室內窗邊"} ${realW}m × ${realD}m ≈ ${area} m²`,
    label_en: `${state.space === "balcony" ? "Balcony" : state.space === "rooftop" ? "Rooftop" : state.space === "yard" ? "Yard" : "Indoor"} ${realW}m × ${realD}m ≈ ${area} m²`,
  };

  // Picked plants for the plan: top 1 of each available tier + 1 accent
  const plantsForPlan = layers.filter(l => l.plant).map(l => l.plant);
  const plan = layoutPlan(plantsForPlan, dims, state.space);

  // Sun marker — placed by orientation. "South-facing" means sun comes from south
  // (top of plan, conventionally). North-facing = sun mostly behind/dim.
  const orient = state.orientation || "S";
  let sunX, sunY, sunLabel = t("陽光", "Sun");
  switch (orient) {
    case "S": sunX = dims.w - 60; sunY = 28; sunLabel = t("南向 · 陽光", "S · Sun"); break;
    case "E": sunX = 32; sunY = dims.h / 2; sunLabel = t("東向 · 晨光", "E · AM Sun"); break;
    case "W": sunX = dims.w - 60; sunY = dims.h / 2; sunLabel = t("西向 · 午後光", "W · PM Sun"); break;
    case "N": sunX = dims.w - 60; sunY = dims.h - 36; sunLabel = t("北向 · 散射光", "N · Diffuse"); break;
  }
  const sunArrow = `
    <g transform="translate(${sunX}, ${sunY})">
      <circle r="14" fill="#F4D67E" stroke="#C9A84C" stroke-width="1.5"/>
      <text x="0" y="4" text-anchor="middle" font-size="13" fill="#8C6F52" font-weight="600">☀</text>
      <text x="0" y="36" text-anchor="middle" font-size="10" fill="#5A5C50" font-family="Noto Serif TC">${sunLabel}</text>
    </g>`;

  const ground = `
    <rect x="20" y="20" width="${dims.w - 40}" height="${dims.h - 40}" rx="14"
          fill="rgba(196,184,144,0.18)" stroke="#C9C3B4" stroke-width="1.2" stroke-dasharray="6 4"/>`;

  const labelBar = `
    <text x="32" y="46" font-size="11" letter-spacing="0.18em" fill="#8C6F52" font-weight="600">
      ${t("俯瞰圖 · TOP VIEW", "TOP VIEW")}
    </text>
    <text x="32" y="${dims.h - 28}" font-size="11" fill="#5A5C50" font-family="Noto Serif TC" font-style="italic">
      ${t(dims.label_zh, dims.label_en)}
    </text>`;

  const plantCircles = plan.map((p, i) => {
    const r = Math.max(18, Math.min(46, (p.spread[1] || 1) * 22));
    const fontSize = r > 30 ? 12.5 : 11.5;
    return `
      <g class="plan-plant" data-id="${p.id}" style="cursor:pointer;">
        <circle cx="${p.x}" cy="${p.y}" r="${r + 4}" fill="${p.color}" opacity="0.18"/>
        <circle cx="${p.x}" cy="${p.y}" r="${r}" fill="${p.color}" opacity="0.5" stroke="${p.color}" stroke-width="2"/>
        <text x="${p.x}" y="${p.y - 2}" text-anchor="middle" font-size="${fontSize}" font-family="Noto Serif TC" font-weight="600" fill="#2C3526">${p.zh}</text>
        <text x="${p.x}" y="${p.y + 12}" text-anchor="middle" font-size="10" fill="#5A5C50" font-style="italic" font-family="Noto Serif TC">${p.lt}</text>
      </g>`;
  }).join("");

  // Legend: tier color key
  const tiersInPlan = [...new Set(plantsForPlan.map(p => p.tier))];
  const tierLabels = { T:t("上層","Upper"), S:t("中層","Mid"), G:t("地被","Ground"), W:t("水景","Water"), C:t("藤本","Vine") };
  const legend = `
    <div class="plan-legend">
      ${tiersInPlan.map(tier => {
        const p = plantsForPlan.find(pp => pp.tier === tier);
        return `<span class="plan-legend-item"><span class="plan-legend-dot" style="background:${p.color}"></span>${tierLabels[tier]} — ${t(p.zh, p.en)}</span>`;
      }).join("")}
    </div>`;

  return `
    <h2 class="subtitle" data-zh="俯瞰平面圖 · Top View" data-en="Top View — Garden Plan">俯瞰平面圖 · Top View</h2>
    <p class="lead-small" data-zh="點擊任一植物查看詳細養護指南。圓圈大小相對於成株時的冠幅。"
       data-en="Tap a plant to see full care guide. Circle size is roughly proportional to mature spread.">
       點擊任一植物查看詳細養護指南。圓圈大小相對於成株時的冠幅。</p>
    <div class="plan-frame">
      <svg class="plan-svg" viewBox="0 0 ${dims.w} ${dims.h}" preserveAspectRatio="xMidYMid meet">
        ${ground}
        ${labelBar}
        ${sunArrow}
        ${plantCircles}
      </svg>
      ${legend}
    </div>`;
}

function layoutPlan(plants, dims, space) {
  // Place plants by tier:
  //   T (canopy) → back row (y near top, away from sun viewer in metaphor)
  //   S (shrub)  → middle row
  //   G (ground) → front row (closer to viewer)
  //   W (water)  → if present, special left-side pond
  //   C (climber) → left/right edge
  const pad = 60;
  const w = dims.w - pad * 2;

  const T = plants.filter(p => p.tier === "T");
  const S = plants.filter(p => p.tier === "S");
  const G = plants.filter(p => p.tier === "G");
  const W = plants.filter(p => p.tier === "W");
  const C = plants.filter(p => p.tier === "C");

  // Rows: define y positions based on space shape
  let yT, yS, yG;
  if (space === "balcony" || space === "indoor") {
    // narrow strip — single rank, but spread across width: T at left if any, S middle, G right
    yT = yS = yG = dims.h / 2;
  } else {
    yT = pad + 20;
    yG = dims.h - pad - 20;
    yS = (yT + yG) / 2;
  }

  const out = [];

  function placeRow(arr, y, leftRatio = 0, rightRatio = 1) {
    const n = arr.length;
    if (!n) return;
    const x0 = pad + w * leftRatio;
    const xw = w * (rightRatio - leftRatio);
    arr.forEach((p, i) => {
      const x = n === 1 ? x0 + xw / 2 : x0 + (xw / (n + 1)) * (i + 1);
      out.push({ ...p, x, y });
    });
  }

  if (space === "balcony" || space === "indoor") {
    // Single row left→right: T, S, G, then accents (W,C) appended
    const seq = [...T, ...S, ...G, ...W, ...C];
    seq.forEach((p, i) => {
      const x = pad + (w / (seq.length + 1)) * (i + 1);
      out.push({ ...p, x, y: dims.h / 2 });
    });
    return out;
  }

  // For rooftop/yard: layered
  // Reserve left edge for water if present
  if (W.length) {
    out.push({ ...W[0], x: pad + 50, y: yS + 15 });
    placeRow(T, yT, 0.15, 1);
  } else {
    placeRow(T, yT, 0, 1);
  }
  placeRow(S, yS, W.length ? 0.18 : 0, 1);
  placeRow(G, yG, 0, 1);

  // Climber on right edge (decorative)
  if (C.length) {
    out.push({ ...C[0], x: dims.w - pad - 30, y: yS - 30 });
  }
  return out;
}

function wirePlanInteractions() {
  document.querySelectorAll(".plan-plant").forEach((g) => {
    g.addEventListener("click", () => openDrawer(g.dataset.id));
  });
}

// ── Sustainability roll-up — aggregates per-plant CO2, water, and ecological
//    support tags into 3 headline chips on the result page.
function renderSustainChips(recs) {
  const top = recs.slice(0, 8);
  if (!top.length) return "";

  // Use shopping-list quantities so the totals match what the user actually plans to plant.
  let totalCO2 = 0;
  let totalWater = 0;
  let nativeQty = 0;
  let introQty = 0;
  const supportTagsSet = new Set();
  top.forEach(p => {
    const qty = state.qty[p.id] ?? 1;
    const e = expert(p);
    totalCO2 += (e.co2_kg_yr || 0) * qty;
    totalWater += (e.water_l_wk || 0) * qty;
    // Native vs introduced — type_zh contains "原生" or "特有" for native/endemic.
    // Everything else (引入/外來/歸化/cultivated) is counted as introduced.
    const tz = p.type_zh || "";
    if (tz.includes("原生") || tz.includes("特有")) nativeQty += qty;
    else introQty += qty;
    (p.supports_zh || []).forEach(s => supportTagsSet.add(s));
  });

  // Tree-equivalent for CO2 — a typical urban tree absorbs ~22 kg CO2/yr.
  const treeEq = (totalCO2 / 22).toFixed(1);
  const ecoCount = supportTagsSet.size;

  // 25-year cumulative CO2 sequestration. Bands not exact numbers — the per-plant
  // co2_kg_yr is itself a rough estimate, so multiplying by 25 compounds uncertainty.
  const totalCO2_25yr = totalCO2 * 25;
  // Driving comparison — 1 km gasoline car ≈ 0.12 kg CO2.
  const drivingKm = totalCO2 / 0.12;
  // Annual water bill — Taipei tap water ~NT$ 12 per m³ (1000 L). Weekly L × 52 ÷ 1000 × 12.
  const annualWaterL = totalWater * 52;
  const annualWaterCost = annualWaterL / 1000 * 12;

  // Native vs introduced shares for the stacked bar.
  const totalQty = nativeQty + introQty;
  const nativePct = totalQty > 0 ? Math.round((nativeQty / totalQty) * 100) : 0;
  const introPct  = totalQty > 0 ? 100 - nativePct : 0;
  // Pretty-format big numbers ("約 X,XXX kg" style) without false precision.
  const fmt = (n) => Math.round(n).toLocaleString();
  // Round costs to nearest NT$10 for the bill estimate — avoids "NT$ 137.4/年" precision.
  const billRounded = Math.round(annualWaterCost / 10) * 10;
  const drivingRounded = Math.round(drivingKm / 10) * 10;

  // Preference note — appears above the sustainability row only when the user
  // has explicitly tapped a 👍/👎. Shows how many prefs were set and how many
  // of the visible top-8 they affected. The "清除偏好" link is the reversible
  // escape hatch so nothing is ever locked in.
  const prefTotal = prefTotalCount();
  const prefImpact = prefImpactCount(top);
  const pinTotal = pinnedCount();
  // Pinned plants get their own micro-note so the user sees explicitly
  // "X plants are guaranteed in this design" — pinning is a stronger commit
  // than a like and deserves the visible reassurance.
  const pinFragment = pinTotal > 0
    ? `<span style="color: #8C6F1E; font-weight:600;"> · 📌 <span data-zh="${pinTotal} 個已釘選保證納入" data-en="${pinTotal} pinned (guaranteed in design)">${pinTotal} 個已釘選保證納入</span></span>`
    : "";
  // Bilingual copy now reports BOTH positive (likes/pins lifted into top-8) AND
  // negative (dislikes that would have been in top-8 if not vetoed). This is
  // honest about hidden impact — a user with 6 dislikes and 0 likes wasn't
  // "affecting 0 recs"; they were silently dropping plants out.
  let impactCopyZh, impactCopyEn;
  if (prefImpact.liked > 0 && prefImpact.disliked > 0) {
    impactCopyZh = `${prefImpact.liked} 喜歡 + ${prefImpact.disliked} 不喜歡 影響你的設計`;
    impactCopyEn = `${prefImpact.liked} liked + ${prefImpact.disliked} disliked shaping your design`;
  } else if (prefImpact.liked > 0) {
    impactCopyZh = `${prefImpact.liked} 個喜歡推上來`;
    impactCopyEn = `${prefImpact.liked} like${prefImpact.liked === 1 ? "" : "s"} lifted into top picks`;
  } else if (prefImpact.disliked > 0) {
    impactCopyZh = `${prefImpact.disliked} 個不喜歡被剔除`;
    impactCopyEn = `${prefImpact.disliked} disliked filtered out`;
  } else {
    impactCopyZh = `尚未影響本次推薦`;
    impactCopyEn = `not yet shaping recs`;
  }
  const prefNote = prefTotal > 0 ? `
    <div class="pref-note">
      <span>🎯 <span data-zh="你已標記 ${prefTotal} 個偏好 · ${impactCopyZh}"
                    data-en="You marked ${prefTotal} preference${prefTotal === 1 ? "" : "s"} · ${impactCopyEn}">你已標記 ${prefTotal} 個偏好 · ${impactCopyZh}</span>${pinFragment}</span>
      <a href="#" class="pref-clear-link" onclick="event.preventDefault(); clearPrefs();"
         data-zh="清除偏好" data-en="Clear preferences">清除偏好</a>
    </div>` : "";

  // Native vs introduced single-line stacked bar — only shown if there's something to compare.
  const nativeBar = totalQty > 0 ? `
    <div class="nat-bar-wrap">
      <div class="nat-bar" role="img"
           aria-label="${nativePct}% native, ${introPct}% introduced"
           title="原生 ${nativeQty} (${nativePct}%) · 引入 ${introQty} (${introPct}%) — Native ${nativeQty} (${nativePct}%) · Introduced ${introQty} (${introPct}%)">
        <div class="seg-native" style="width:${nativePct}%;"></div>
        <div class="seg-intro" style="width:${introPct}%;"></div>
      </div>
      <div class="nat-bar-legend">
        <span class="swatch s-native"></span><span
          data-zh="原生 ${nativeQty} (${nativePct}%)"
          data-en="Native ${nativeQty} (${nativePct}%)">原生 ${nativeQty} (${nativePct}%)</span>
        <span style="margin: 0 6px; opacity:0.5;">·</span>
        <span class="swatch s-intro"></span><span
          data-zh="引入 ${introQty} (${introPct}%)"
          data-en="Introduced ${introQty} (${introPct}%)">引入 ${introQty} (${introPct}%)</span>
      </div>
    </div>` : "";

  // CO2 driving-comparison tooltip on the 🌳 chip — gives the abstract "kg CO2"
  // a tangible analogue without cluttering the chip face.
  const co2Title = `約 ${drivingRounded.toLocaleString()} km 汽油車排放 · roughly ${drivingRounded.toLocaleString()} km of gas car driving (≈ 0.12 kg CO₂/km)`;

  // ── R29: Maintenance band roll-up — how many of the top-8 plants need
  // active weekly care, plus the overall band for the whole design. We avoid
  // exact hour numbers (false precision); the band is what the user can act on.
  const mLevels = top.map(p => maintenanceLevel(p));
  const mHigh = mLevels.filter(l => l === "high").length;
  const mMed  = mLevels.filter(l => l === "med").length;
  const activeCount = mHigh + mMed; // plants that need "active care" weekly
  // Weighted average of band scores: low=0, med=1, high=2 → overall band
  const mScore = mLevels.reduce((s, l) => s + (l === "high" ? 2 : l === "med" ? 1 : 0), 0) / Math.max(mLevels.length, 1);
  const overallLevel = mScore >= 1.34 ? "high" : mScore >= 0.5 ? "med" : "low";
  const overallLabel = maintenanceLabel(overallLevel);
  // High-maintenance advisory — only when the overall band is "high".
  // Actionable hint: switch toward drought-tolerant or slow-growing plants.
  const maintenanceTipHTML = overallLevel === "high" ? `
    <div style="margin: -4px 0 10px; padding: 8px 12px; border-radius: 10px;
                background: rgba(196,160,76,0.10); border: 1px solid rgba(196,160,76,0.32);
                font-size: 12px; color: #8C6F1E; line-height: 1.5;">
      <span data-zh="💡 提示：選擇耐旱/慢生長植物可降低維護時間"
            data-en="💡 Tip: pick drought/slow-growing plants to lower maintenance time">💡 提示：選擇耐旱/慢生長植物可降低維護時間</span>
    </div>` : "";
  const maintenanceChipHTML = `
      <span class="sustain-chip bio" title="${`維護程度由澆水頻率、生長速度、植物層次估算 · Maintenance band estimated from water tier, grow rate, tier`}">
        ⏱ <span data-zh="維護程度：${overallLabel.zh} · ~${activeCount} 種需勤照顧"
                data-en="Maintenance level: ${overallLabel.en} · ~${activeCount} plants need active care">維護程度：${overallLabel.zh} · ~${activeCount} 種需勤照顧</span>
      </span>`;

  return `
    ${prefNote}
    ${maintenanceTipHTML}
    <div class="sustain-row">
      ${maintenanceChipHTML}
      <span class="sustain-chip co2" title="${co2Title}">
        🌳 <span data-zh="約 ${totalCO2.toFixed(0)} kg CO₂ / 年 · 約 ${treeEq} 棵都市樹"
                data-en="≈ ${totalCO2.toFixed(0)} kg CO₂ / yr · ~${treeEq} urban-tree equivalent">約 ${totalCO2.toFixed(0)} kg CO₂ / 年 · 約 ${treeEq} 棵都市樹</span>
        <span class="sub-line"
              data-zh="= 約 ${drivingRounded.toLocaleString()} km 汽油車排放"
              data-en="= roughly ${drivingRounded.toLocaleString()} km of gas car driving">= 約 ${drivingRounded.toLocaleString()} km 汽油車排放</span>
      </span>
      <span class="sustain-chip carbon25">
        🌲 <span data-zh="25 年總固碳 約 ${fmt(totalCO2_25yr)} kg"
                data-en="25-yr cumulative CO₂ ~${fmt(totalCO2_25yr)} kg">25 年總固碳 約 ${fmt(totalCO2_25yr)} kg</span>
      </span>
      <span class="sustain-chip water">
        💧 <span data-zh="約 ${totalWater.toFixed(0)} L / 週 · 估算用水"
                data-en="≈ ${totalWater.toFixed(0)} L / week · estimated water">約 ${totalWater.toFixed(0)} L / 週 · 估算用水</span>
      </span>
      <span class="sustain-chip bill" title="台北自來水 ~NT$ 12 / m³ · Taipei tap ~NT$ 12 per m³">
        💰 <span data-zh="水費估算 ~NT$ ${billRounded.toLocaleString()} / 年"
                data-en="Water bill ~NT$ ${billRounded.toLocaleString()} / yr">水費估算 ~NT$ ${billRounded.toLocaleString()} / 年</span>
      </span>
      <span class="sustain-chip bio">
        🐝 <span data-zh="${ecoCount} 種生態貢獻"
                data-en="${ecoCount} ecological roles">${ecoCount} 種生態貢獻</span>
      </span>
    </div>
    ${nativeBar}`;
}

// ── TAB: REALISTIC PREVIEW (Pollinations.ai) ────────────────
// We build a descriptive prompt from the user's space + top plants + dominant
// bloom season, then embed three <img> tags pointing at pollinations.ai with
// different seeds. The service generates images on first request — initial
// load takes ~10-20s; subsequent loads of the same URL are usually cached.
// No API key, no backend; the URL itself is the API.

function dominantSeason(plants) {
  // Find which month most of the recommended plants are in bloom — gives the
  // generator a coherent visual mood (spring blossom, autumn berry, etc.).
  const months = new Array(12).fill(0);
  plants.forEach(p => (p.bloom || []).forEach(m => months[m - 1]++));
  let topM = 4;
  let topC = 0;
  for (let i = 0; i < 12; i++) {
    if (months[i] > topC) { topC = months[i]; topM = i + 1; }
  }
  if (topM <= 2 || topM === 12) return { zh: "冬", en: "winter, soft cool light" };
  if (topM <= 5) return { zh: "春", en: "spring, fresh blossoms, vibrant green" };
  if (topM <= 8) return { zh: "夏", en: "summer, lush canopy, warm golden light" };
  return { zh: "秋", en: "autumn, warm amber tones" };
}

function buildPreviewPrompt(plants) {
  const space = state.space;
  const spaceText = {
    balcony: "small urban balcony garden with container plants, modern Taiwan apartment, intimate scale",
    rooftop: "open rooftop garden with city skyline behind, sunny day in Taiwan",
    yard:    "lush home courtyard garden with mature plantings, Taiwan residential setting",
    indoor:  "indoor plant arrangement next to a bright window, Taiwan apartment interior, natural daylight",
  }[space] || "garden in Taiwan";

  const det = state.detected;
  const locText = det?.county
    ? `, ${det.coastal ? "near coast" : (det.zone === "S" ? "southern Taiwan" : det.zone === "N" ? "northern Taiwan" : det.zone === "E" ? "eastern Taiwan" : "central Taiwan")}`
    : "";

  const season = dominantSeason(plants);
  const plantList = plants.slice(0, 5).map(p => `${p.en} (${p.lt})`).join(", ");

  return `Photorealistic landscape design photo of a ${spaceText}${locText}, featuring ${plantList}, in ${season.en}, natural daylight with soft golden hour glow, depth of field, professional landscape photography, magazine-quality, peaceful atmosphere, lush vibrant greenery, high resolution`;
}

function previewURL(prompt, seed) {
  const encoded = encodeURIComponent(prompt);
  // model=flux gives more photorealistic output than the default; nologo strips the watermark.
  return `https://image.pollinations.ai/prompt/${encoded}?width=960&height=600&seed=${seed}&model=flux&nologo=true`;
}
