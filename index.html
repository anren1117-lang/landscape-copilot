  .dict-search:focus { outline: none; border-color: var(--sage); box-shadow: 0 0 0 3px rgba(138,154,123,0.18); }
  .dict-count { font-size: 12.5px; color: var(--ink-soft); font-family: var(--serif); font-style: italic; }
  .dict-chiprow { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 16px; }
  .dict-chip {
    background: rgba(255,255,255,0.5); border: 1px solid var(--line); border-radius: 999px;
    padding: 6px 13px; font-family: inherit; font-size: 12px; color: var(--ink-soft); cursor: pointer;
    transition: all .2s; display: inline-flex; align-items: center; gap: 5px;
  }
  .dict-chip:hover { color: var(--forest); border-color: var(--sage); }
  .dict-chip.on { background: var(--forest); color: var(--paper); border-color: var(--forest); }

  /* GEOCODE button row in details step */
  .addr-action-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 4px; }
  .addr-btn {
    padding: 8px 14px;
    background: rgba(255,255,255,0.55);
    border: 1px solid var(--line);
    border-radius: 999px;
    font-family: inherit;
    font-size: 12.5px;
    color: var(--forest);
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    transition: all .2s;
  }
  .addr-btn:hover:not(:disabled) { border-color: var(--sage); background: rgba(255,255,255,0.85); }
  .addr-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .addr-status { font-size: 12px; color: var(--ink-soft); font-family: var(--serif); font-style: italic; padding: 6px 0; min-height: 18px; }
  .addr-status.ok { color: var(--sage-deep); }
  .addr-status.err { color: #B23A30; }
  .addr-privacy { font-size: 11px; color: var(--ink-soft); margin-top: 6px; opacity: 0.75; line-height: 1.5; }

  /* recommendation grid */
  .rec-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 14px; }
  .rec-card { padding: 18px; border-radius: 16px; background: rgba(255,255,255,0.5); border: 1px solid var(--line); cursor: pointer; transition: all .3s; display: flex; flex-direction: column; font-family: inherit; text-align: left; -webkit-tap-highlight-color: transparent; }
  .rec-card:hover { transform: translateY(-3px); border-color: var(--sage); box-shadow: 0 14px 28px -16px rgba(44,53,38,0.35); }
  /* Touch feedback — without an :active state, taps on mobile feel "dead" while
     the user waits for the drawer to open. The subtle inset + sage border gives
     the same affordance as the hover lift, but works on touch where hover doesn't. */
  .rec-card:active { transform: translateY(0); border-color: var(--sage-deep); background: rgba(110,126,96,0.08); transition: all .08s; }
  .dict-chip { -webkit-tap-highlight-color: transparent; }
  .dict-chip:active { background: rgba(110,126,96,0.15); transition: background .08s; }
  .rec-head { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 14px; }
  .rec-swatch { width: 40px; height: 40px; border-radius: 12px; }
  .rec-match { font-family: var(--serif); font-size: 24px; font-weight: 700; color: var(--sage-deep); line-height: 1; }
  .rec-match-pct { font-size: 11px; font-weight: 400; color: var(--ink-soft); margin-left: 3px; }
  .rec-name { font-size: 19px; font-weight: 600; font-family: var(--serif); color: var(--forest); }
  .rec-latin { font-size: 12.5px; font-style: italic; color: var(--ink-soft); font-family: var(--serif); margin-top: 2px; }
  .rec-type { font-size: 12px; color: var(--clay-deep); margin-top: 8px; font-weight: 500; }
  .rec-reasons { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 12px; flex: 1; align-content: flex-start; }
  .rec-tag { font-size: 11px; padding: 3px 9px; border-radius: 20px; background: rgba(168,138,106,0.15); color: var(--clay-deep); }
  .rec-view { font-size: 12.5px; color: var(--forest); margin-top: 14px; font-weight: 600; letter-spacing: 0.02em; }

  /* GARDEN PLAN SVG */
  .plan-frame {
    margin-top: 14px; padding: 18px; background: rgba(255,255,255,0.55);
    border: 1px solid var(--line); border-radius: 18px;
  }
  .plan-svg { width: 100%; height: auto; display: block; border-radius: 12px; -webkit-tap-highlight-color: rgba(138,154,123,0.25); }
  .plan-legend { display: flex; flex-wrap: wrap; gap: 14px; margin-top: 14px; font-size: 12px; color: var(--ink-soft); }
  .plan-legend-item { display: flex; align-items: center; gap: 6px; }
  .plan-legend-dot { width: 12px; height: 12px; border-radius: 50%; border: 1px solid rgba(0,0,0,0.1); }
  /* Plant click affordance — soft sage outline on hover so the user knows it's tappable */
  .plan-svg .plan-plant { transition: transform 120ms ease; }
  .plan-svg .plan-plant:hover { transform: translateY(-1px); }
  .plan-svg .plan-plant:hover .crown-hit { stroke: rgba(138,154,123,0.85); stroke-width: 1.4; stroke-dasharray: 3 3; }
  .plan-svg .plan-plant:focus { outline: none; }

  /* BLOOM CALENDAR */
  .cal-frame { padding: 18px; background: rgba(255,255,255,0.55); border: 1px solid var(--line); border-radius: 18px; overflow-x: auto; }
  .cal-table { width: 100%; min-width: 600px; border-collapse: collapse; font-size: 12.5px; }
  .cal-table th { font-family: var(--serif); font-weight: 600; color: var(--forest); padding: 8px 4px; font-size: 12px; text-align: center; border-bottom: 1px solid var(--line); }
  .cal-table th.plant-col { text-align: left; padding-left: 8px; min-width: 130px; }
  .cal-table td { padding: 4px 2px; vertical-align: middle; }
  .cal-table td.plant-cell { padding: 8px; }
  .cal-table td.plant-cell .nm { font-weight: 600; color: var(--forest); }
  .cal-table td.plant-cell .lt { font-size: 11px; font-style: italic; color: var(--ink-soft); font-family: var(--serif); }
  .cal-cell { height: 22px; border-radius: 3px; background: rgba(0,0,0,0.04); position: relative; margin: 0 1px; }
  .cal-cell.bloom { background: linear-gradient(180deg, #B86B9C, #9B5C8F); }
  .cal-cell.fruit { background: linear-gradient(180deg, #C9764C, #B23A30); }
  .cal-cell.both  { background: linear-gradient(90deg, #B86B9C 50%, #C9764C 50%); }
  .cal-legend { display: flex; gap: 14px; margin-top: 14px; font-size: 12.5px; color: var(--ink-soft); align-items: center; flex-wrap: wrap; }
  .cal-leg-swatch { display: inline-block; width: 16px; height: 12px; border-radius: 3px; vertical-align: middle; margin-right: 6px; }

  /* CARE CALENDAR + BUILD PLAN */
  .month-grid { display: grid; grid-template-columns: 1fr; gap: 12px; }
  .month-row {
    display: grid; grid-template-columns: 70px 1fr; gap: 18px;
    padding: 14px 16px;
    background: rgba(255,255,255,0.5);
    border: 1px solid var(--line);
    border-radius: 14px;
    transition: all .2s;
  }
  .month-row.current {
    background: linear-gradient(135deg, rgba(110,126,96,0.15), rgba(196,160,76,0.10));
    border-color: var(--sage);
    box-shadow: 0 4px 16px -8px rgba(110,126,96,0.4);
  }
  .month-row .m-num {
    font-family: var(--serif); font-size: 30px; font-weight: 700;
    color: var(--forest); line-height: 1;
  }
  .month-row .m-season {
    font-size: 11px; letter-spacing: 0.12em; color: var(--clay-deep);
    text-transform: uppercase; margin-top: 4px;
  }
  .month-row .m-body { min-width: 0; }
  .m-block { margin-bottom: 8px; }
  .m-block:last-child { margin-bottom: 0; }
  .m-block .label {
    font-size: 11px; letter-spacing: 0.12em; color: var(--sage-deep);
    font-weight: 600; text-transform: uppercase; margin-bottom: 6px;
    display: inline-flex; align-items: center; gap: 5px;
  }
  .m-pills { display: flex; flex-wrap: wrap; gap: 5px; }
  .m-pill {
    display: inline-flex; align-items: center; gap: 4px;
    background: rgba(255,255,255,0.65);
    border: 1px solid var(--line);
    border-radius: 999px;
    padding: 4px 11px;
    font-size: 12px; color: var(--forest);
    font-family: inherit; cursor: pointer;
    transition: all .15s;
  }
  .m-pill:hover { background: var(--forest); color: var(--paper); border-color: var(--forest); }
  .m-pill.bloom { background: rgba(184,107,156,0.13); color: #8C3B6A; border-color: rgba(184,107,156,0.3); }
  .m-pill.bloom:hover { background: #8C3B6A; color: white; }
  .m-pill.fruit { background: rgba(201,118,76,0.13); color: #8C4A2A; border-color: rgba(201,118,76,0.3); }
  .m-pill.fruit:hover { background: #8C4A2A; color: white; }
  .m-pill.prune { background: rgba(80,120,160,0.12); color: #3D6086; border-color: rgba(80,120,160,0.3); }
  .m-pill.fert  { background: rgba(80,140,90,0.12); color: var(--sage-deep); border-color: rgba(80,140,90,0.3); }
  .m-pill.warn  { background: rgba(178,58,48,0.10); color: #8C2A22; border-color: rgba(178,58,48,0.28); }
  .m-empty { font-size: 12px; color: var(--ink-soft); font-style: italic; font-family: var(--serif); }

  /* BUILD PLAN */
  .phase-list { display: flex; flex-direction: column; gap: 14px; }
  .phase {
    position: relative;
    padding: 18px 20px 18px 64px;
    background: rgba(255,255,255,0.55);
    border: 1px solid var(--line);
    border-radius: 14px;
  }
  .phase-num {
    position: absolute; top: 18px; left: 18px;
    width: 32px; height: 32px; border-radius: 50%;
    background: var(--forest); color: var(--paper);
    font-family: var(--serif); font-size: 16px; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
  }
  .phase-title { font-family: var(--serif); font-size: 18px; font-weight: 600; color: var(--forest); margin-bottom: 4px; }
  .phase-time { font-size: 11.5px; color: var(--clay-deep); margin-bottom: 10px; letter-spacing: 0.06em; }
  .phase-text { font-size: 14px; line-height: 1.65; color: var(--ink); }
  .phase ul { margin-top: 8px; padding-left: 18px; }
  .phase ul li { font-size: 13.5px; line-height: 1.65; color: var(--ink-soft); margin-bottom: 4px; }
  .phase-plants { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 8px; }

  /* SUSTAINABILITY chips */
  .sustain-row { display: flex; gap: 8px; flex-wrap: wrap; margin: 4px 0 18px; }
  .sustain-chip {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 7px 13px; border-radius: 999px;
    font-size: 12.5px; font-weight: 600;
    border: 1px solid;
  }
  .sustain-chip.co2 { background: rgba(110,126,96,0.12); color: var(--sage-deep); border-color: rgba(110,126,96,0.32); }
  .sustain-chip.water { background: rgba(80,120,160,0.10); color: #3D6086; border-color: rgba(80,120,160,0.28); }
  .sustain-chip.bio { background: rgba(196,160,76,0.13); color: #8C6F1E; border-color: rgba(196,160,76,0.30); }
  .sustain-chip.carbon25 { background: rgba(110,126,96,0.10); color: var(--sage-deep); border-color: rgba(110,126,96,0.28); }
  .sustain-chip.bill { background: rgba(140,111,82,0.12); color: var(--clay-deep); border-color: rgba(140,111,82,0.30); }
  .sustain-chip .sub-line { font-size: 11px; font-weight: 500; opacity: 0.78; margin-left: 4px; }
  /* native vs introduced breakdown — single-line stacked bar under the chips */
  .nat-bar-wrap { margin: -6px 0 18px; }
  .nat-bar {
    display: flex; width: 100%; height: 8px; border-radius: 999px; overflow: hidden;
    border: 1px solid var(--line); background: rgba(255,255,255,0.5);
  }
  .nat-bar .seg-native { background: var(--sage); height: 100%; }
  .nat-bar .seg-intro  { background: var(--clay); height: 100%; }
  .nat-bar-legend {
    font-size: 11.5px; color: var(--ink-soft); margin-top: 6px;
    font-family: var(--serif); letter-spacing: 0.02em;
  }
  .nat-bar-legend .swatch {
    display: inline-block; width: 9px; height: 9px; border-radius: 2px;
    vertical-align: middle; margin-right: 4px;
  }
  .nat-bar-legend .swatch.s-native { background: var(--sage); }
  .nat-bar-legend .swatch.s-intro  { background: var(--clay); }

  /* SHOPPING LIST */
  .shop-frame { padding: 18px; background: rgba(255,255,255,0.55); border: 1px solid var(--line); border-radius: 18px; }
  .shop-table { width: 100%; border-collapse: collapse; font-size: 14px; }
  .shop-table th, .shop-table td { padding: 12px 8px; text-align: left; border-bottom: 1px solid var(--line); }
  .shop-table th { font-family: var(--serif); font-weight: 600; color: var(--forest); font-size: 13px; background: rgba(255,255,255,0.4); }
  .shop-table td.right { text-align: right; }
  .shop-table tr:last-child td { border-bottom: none; }
  .shop-qty { display: inline-flex; align-items: center; gap: 8px; }
  .shop-qty-btn { width: 26px; height: 26px; border-radius: 50%; border: 1px solid var(--line); background: rgba(255,255,255,0.5); color: var(--forest); cursor: pointer; font-size: 14px; font-family: inherit; font-weight: 600; transition: all .2s; }
  .shop-qty-btn:hover:not(:disabled) { background: var(--forest); color: var(--paper); border-color: var(--forest); }
  .shop-qty-btn:disabled { opacity: 0.3; cursor: not-allowed; }
  .shop-qty-val { min-width: 22px; text-align: center; font-weight: 600; color: var(--forest); }
  .shop-total { padding: 18px; margin-top: 14px; background: var(--forest); color: var(--paper); border-radius: 14px; display: flex; justify-content: space-between; align-items: center; font-family: var(--serif); }
  .shop-total .label { font-size: 14px; letter-spacing: 0.05em; }
  .shop-total .amount { font-size: 26px; font-weight: 700; }
  .shop-note { font-size: 12px; color: var(--ink-soft); margin-top: 14px; line-height: 1.6; font-style: italic; font-family: var(--serif); }
  .shop-actions { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 16px; }
  .shop-actions .btn { font-size: 13px; padding: 8px 14px; }

  /* care-calendar export panel — sits below the month grid and offers
     "Add to my phone calendar" so the auto-generated tasks survive the tab close. */
  .care-actions-wrap {
    margin-top: 22px;
    padding: 18px 20px;
    background: rgba(255,255,255,0.55);
    border: 1px solid var(--line);
    border-radius: 14px;
    backdrop-filter: blur(2px);
  }
  .care-actions-title {
    font-family: var(--serif); font-size: 15px; font-weight: 600; color: var(--forest);
    margin-bottom: 4px; display: flex; align-items: center; gap: 8px;
  }
  .care-actions-sub {
    font-size: 12.5px; color: var(--ink-soft); line-height: 1.55;
    font-family: var(--serif); font-style: italic; margin-bottom: 14px;
  }
  .care-actions-row { display: flex; gap: 10px; flex-wrap: wrap; }
  .care-actions-row .btn { font-size: 13px; padding: 8px 14px; }
  .care-actions-foot {
    margin-top: 10px; font-size: 11.5px; color: var(--ink-soft);
    opacity: 0.85; line-height: 1.5;
  }

  /* PLANT DRAWER */
  .drawer-overlay {
    position: fixed; inset: 0; z-index: 20;
    background: rgba(44,53,38,0.35);
    backdrop-filter: blur(4px);
    display: flex; justify-content: flex-end;
  }
  .drawer {
    width: min(440px, 92vw); height: 100%;
    background: var(--paper-warm);
    padding: 30px 30px 40px;
    overflow-y: auto; position: relative;
    box-shadow: -30px 0 60px -20px rgba(0,0,0,0.3);
  }
  .drawer-close { position: absolute; top: 22px; right: 24px; background: none; border: none; font-size: 18px; color: var(--ink-soft); cursor: pointer; }
  .drawer-swatch { width: 70px; height: 70px; border-radius: 18px; margin-bottom: 22px; }
  .drawer-type { font-size: 12px; letter-spacing: 0.1em; color: var(--clay-deep); font-weight: 600; }
  .drawer-name { font-family: var(--serif); font-size: 32px; font-weight: 600; color: var(--forest); margin: 6px 0 2px; }
  .drawer-en { font-size: 13px; color: var(--ink-soft); margin-bottom: 2px; }
  .drawer-latin { font-size: 14px; font-style: italic; color: var(--ink-soft); font-family: var(--serif); }
  .drawer-meta { display: flex; gap: 10px; margin: 24px 0; border-top: 1px solid var(--line); border-bottom: 1px solid var(--line); padding: 18px 0; flex-wrap: wrap; }
  .meta-cell { flex: 1; min-width: 90px; }
  .meta-label { font-size: 11px; color: var(--ink-soft); letter-spacing: 0.05em; }
  .meta-val { font-size: 14.5px; font-weight: 600; color: var(--forest); margin-top: 4px; font-family: var(--serif); }
  .drawer-block { margin-bottom: 24px; }
  .drawer-block-title { font-size: 12.5px; letter-spacing: 0.12em; color: var(--sage-deep); font-weight: 600; margin-bottom: 10px; text-transform: uppercase; }
  .drawer-text { font-size: 15px; line-height: 1.78; color: var(--ink-soft); }
  .drawer-foot { font-size: 11.5px; color: var(--clay); font-family: var(--serif); font-style: italic; margin-top: 30px; padding-top: 20px; border-top: 1px solid var(--line); }
  .drawer-supports { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
  .drawer-supports .chip { font-size: 11.5px; padding: 4px 10px; }

  /* R22 — mini bloom/fruit 12-month indicator strip in drawer.
     Sits next to the meta cells so a user can scan seasonality at a glance
     without opening the bloom calendar tab. Total strip height ~16px. */
  .bloomfruit-strip { display: flex; gap: 4px; align-items: flex-end; margin: 14px 0 4px; flex-wrap: nowrap; }
  .bloomfruit-cell { display: flex; flex-direction: column; align-items: center; gap: 2px; flex: 1; min-width: 0; }
  .bloomfruit-dot { width: 8px; height: 8px; border-radius: 50%; background: rgba(120,120,120,0.18); }
  .bloomfruit-dot.bloom { background: #D88AB0; box-shadow: 0 0 0 1px rgba(216,138,176,0.45); }
  .bloomfruit-dot.fruit { background: #C4A04C; box-shadow: 0 0 0 1px rgba(196,160,76,0.45); }
  .bloomfruit-dot.both  { background: linear-gradient(135deg, #D88AB0 50%, #C4A04C 50%); }
  .bloomfruit-mlabel { font-size: 8.5px; color: var(--ink-soft); letter-spacing: 0.04em; line-height: 1; }
  .bloomfruit-legend { display: flex; gap: 12px; font-size: 10.5px; color: var(--ink-soft); margin-top: 6px; align-items: center; }
  .bloomfruit-legend .sw { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 4px; vertical-align: middle; }

  /* R22 — "similar plants" strip at drawer bottom. Small clickable cards
     (swatch + name + role) so users can hop to a complementary plant
     without leaving the drawer flow. */
  .similar-strip { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 8px; margin-top: 10px; }
  .similar-card { display: flex; flex-direction: column; gap: 4px; padding: 10px 10px 9px; border: 1px solid var(--line); border-radius: 10px; background: var(--bone-soft, #FBF7F0); cursor: pointer; transition: border-color 0.15s, transform 0.1s; text-align: left; }
  .similar-card:hover { border-color: var(--sage-deep); transform: translateY(-1px); }
  .similar-swatch { width: 24px; height: 24px; border-radius: 6px; }
  .similar-name { font-size: 13px; font-weight: 600; color: var(--forest); font-family: var(--serif); line-height: 1.2; }
  .similar-role { font-size: 10.5px; color: var(--ink-soft); letter-spacing: 0.02em; }

  /* responsive — single mobile breakpoint at 700px covering layout reflow,
     plus a 480px refinement for compact phones. R24 mobile audit. */
  @media (max-width: 700px) {
    main.body { padding: 30px 20px 0; }
    header.brand { padding: 22px 20px 0; }
    .grid.cols-2, .grid.cols-3 { grid-template-columns: 1fr; }
    .layer-row { flex-wrap: wrap; gap: 10px; }
    .layer-info { flex: 0 0 100%; }
    h1.title { font-size: 30px; }
    h2.subtitle { font-size: 20px; }
    footer.nav { padding: 14px 20px; }

    /* (3) Shopping table → card stack. Each <tr> becomes a card with the plant
       info on top and qty + price row on the bottom. We hide the <thead> and
       reflow the <tr>/<td> using display: block. */
    .shop-frame:not(.tco-frame) .shop-table thead { display: none; }
    .shop-frame:not(.tco-frame) .shop-table,
    .shop-frame:not(.tco-frame) .shop-table tbody { display: block; width: 100%; }
    .shop-frame:not(.tco-frame) .shop-table tr {
      display: block;
      background: rgba(255,255,255,0.55);
      border: 1px solid var(--line); border-radius: 14px;
      padding: 12px 14px; margin-bottom: 10px;
    }
    .shop-frame:not(.tco-frame) .shop-table tr:last-child { margin-bottom: 0; }
    .shop-frame:not(.tco-frame) .shop-table td { display: block; border: none; padding: 0; }
    .shop-frame:not(.tco-frame) .shop-table td:nth-child(1) { margin-bottom: 10px; }
    .shop-frame:not(.tco-frame) .shop-table td:nth-child(2) {
      display: inline-flex; vertical-align: middle;
    }
    .shop-frame:not(.tco-frame) .shop-table td:nth-child(3),
    .shop-frame:not(.tco-frame) .shop-table td:nth-child(4) {
      display: inline-block; margin-left: 12px; vertical-align: middle;
      font-size: 13px; text-align: left;
    }
    .shop-frame:not(.tco-frame) .shop-table td:nth-child(4) { float: right; font-weight: 600; }

    /* (4) Bloom calendar — horizontal scroll snap on whole months */
    .cal-frame { scroll-snap-type: x mandatory; -webkit-overflow-scrolling: touch; }
    .cal-table th, .cal-table td:not(.plant-cell) { scroll-snap-align: start; }

    /* (6) Comparison panel stacks vertically with snap between A and B */
    .compare-grid {
      grid-template-columns: 100% 100%;
      overflow-x: auto; scroll-snap-type: x mandatory;
      -webkit-overflow-scrolling: touch; scrollbar-width: none;
      gap: 12px; padding-bottom: 4px;
    }
    .compare-grid::-webkit-scrollbar { display: none; }
    .compare-col { scroll-snap-align: start; }

    /* (7) 3D / plan SVG — bump labels so they stay legible when the SVG
       shrinks to viewport width. Inline SVG font-size attrs win unless we
       use !important, so we override only on small screens. */
    .plan-svg text { font-size: 13px !important; }

    /* (8) Sticky footer overlap — extra breathing room under tab panels */
    main.body { padding-bottom: 24px; }
    .tab-panel { padding-bottom: 12px; }
  }

  /* (5) Touch tap states — extend the snappy .rec-card:active pattern to all
     major touchable surfaces. Always-on (not gated by media query) so desktop
     mouse-down also gets the micro-feedback. */
  .my-design-card, .home-path-card, .home-preset-card, .dict-chip {
    -webkit-tap-highlight-color: transparent;
  }
  .my-design-card:active,
  .home-path-card:active,
  .home-preset-card:active {
    transform: scale(0.985);
    transition: transform .08s ease;
  }

  /* Refinement for compact phones (≤ 480px) — tighten paddings and drawer */
  @media (max-width: 480px) {
    /* (2) Plant drawer auto-fit — full-screen on small phones, tighter padding */
    .drawer { width: 100vw; padding: 24px 18px 32px; }
    .drawer-close { top: 16px; right: 16px; }
    .drawer-name { font-size: 26px; }
    .drawer-meta { gap: 8px; margin: 18px 0; padding: 14px 0; }
    .drawer-block { margin-bottom: 18px; }
    /* shopping list cards lose horizontal flex on the very small screen */
    .shop-frame:not(.tco-frame) .shop-table td:nth-child(3),
    .shop-frame:not(.tco-frame) .shop-table td:nth-child(4) { font-size: 12.5px; }
    .shop-total { padding: 14px; }
    .shop-total .amount { font-size: 22px; }
  }

  /* QR MODAL — same overlay pattern as drawer, but centered */
  .qr-overlay {
    position: fixed; inset: 0; z-index: 25;
    background: rgba(44,53,38,0.4);
    backdrop-filter: blur(4px);
    display: flex; align-items: center; justify-content: center;
    padding: 24px;
  }
  .qr-modal {
    background: var(--paper-warm);
    border-radius: 18px;
    padding: 28px 28px 22px;
    width: min(340px, 92vw);
    box-shadow: 0 30px 60px -20px rgba(0,0,0,0.35);
    position: relative;
    text-align: center;
  }
  .qr-close {
    position: absolute; top: 12px; right: 14px;
    background: none; border: none; font-size: 18px;
    color: var(--ink-soft); cursor: pointer; padding: 4px 8px;
  }
  .qr-title { font-family: var(--serif); font-size: 19px; font-weight: 600; color: var(--forest); margin: 0 0 14px; }
  .qr-img-wrap {
    width: 240px; height: 240px; margin: 0 auto 16px;
    background: white; border-radius: 10px; padding: 8px;
    border: 1px solid var(--line);
    display: flex; align-items: center; justify-content: center;
  }
  .qr-img-wrap img { width: 100%; height: 100%; display: block; }
  .qr-url {
    font-size: 11px; color: var(--ink-soft);
    word-break: break-all; line-height: 1.5;
    background: rgba(110,126,96,0.06); padding: 8px 10px; border-radius: 6px;
    margin-bottom: 12px; font-family: ui-monospace, "SF Mono", Menlo, monospace;
    max-height: 60px; overflow-y: auto; text-align: left;
  }
  .qr-foot { font-size: 10.5px; color: var(--clay); font-style: italic; font-family: var(--serif); line-height: 1.5; }

  /* PRINT BUNDLE — hidden on screen, only visible when printResultBundle() injects it */
  .print-bundle { display: none; }
  .print-bundle .pb-section { margin-bottom: 22px; }
  .print-bundle .pb-h2 { font-family: var(--serif); font-size: 18px; color: var(--forest); margin: 0 0 10px; border-bottom: 2px solid #c9c2a8; padding-bottom: 4px; }
  .print-bundle .pb-meta { font-size: 12px; color: var(--ink-soft); margin-bottom: 14px; }

  /* PRINT — clean A4 layout */
  @media print {
    body { background: white; padding-bottom: 0; }
    .grain, .glow-tl, .glow-br, .screen-bar, footer.nav, .tabs, .drawer-overlay, .qr-overlay { display: none !important; }
    main.body { max-width: none; padding: 0 12mm; }
    header.brand { padding: 12mm 12mm 0; }
    .card-opt, .layer-row, .rec-card, .plan-frame, .cal-frame, .shop-frame {
      background: white !important; box-shadow: none !important; border-color: #ccc !important;
    }
    h1.title { font-size: 28px; }
    .chip { background: #f5f3eb !important; }
    .rec-grid { grid-template-columns: 1fr 1fr; }
    .tab-panel { page-break-inside: avoid; }
    .tab-panel + .tab-panel { page-break-before: always; }

    /* When the print bundle is mounted, hide the live result view and show only
       the curated bundle so users get rec cards + 3D + care calendar in one PDF. */
    body.printing-bundle main.body > .fade-up { display: none !important; }
    body.printing-bundle .print-bundle { display: block !important; }
    body.printing-bundle .print-bundle .pb-section { page-break-inside: avoid; }
    body.printing-bundle .print-bundle .pb-section + .pb-section { page-break-before: always; }

    /* DRAWER PRINT — if the plant drawer is open when the user hits Print,
       they're trying to print the plant detail, not the result behind it.
       body.drawer-open is toggled by openDrawer/closeDrawer. We hide the
       result main + nav + brand and let the drawer flow as a clean A4 page. */
    body.drawer-open main.body, body.drawer-open header.brand,
    body.drawer-open footer.nav, body.drawer-open .progress-wrap,
    body.drawer-open .screen-bar { display: none !important; }
    body.drawer-open .drawer-overlay {
      display: block !important; position: static !important;
      background: white !important; backdrop-filter: none !important; inset: auto !important;
    }
    body.drawer-open .drawer {
      width: 100% !important; height: auto !important;
      box-shadow: none !important; padding: 0 12mm !important;
      overflow: visible !important;
    }
    body.drawer-open .drawer-close { display: none !important; }
  }
</style>

// Resolve expert/baseline values for a plant ID with a single helper.
function expert(p) {
  const base = TIER_BASELINES[p.tier] || TIER_BASELINES.G;
  const over = EXPERT_META[p.id] || {};
  return { ...base, ...over };
}

// ─────────────────────────────────────────────────────────────
// maintenanceLevel(plant) — heuristic band ("low" / "med" / "high")
// for how much weekly care a plant needs once planted.
//
// Inputs combine four signals (no exact-hours math — uncertainty
// compounds quickly; a band is honest):
//   - water tier   : high water = more watering / monitoring
//   - grow_rate    : fast = more pruning / trimming
//   - mature_yr    : longer maturity = less immediate fuss
//                    (established trees ride out neglect; short-lived
//                    perennials need replanting & feeding)
//   - tier         : T canopy plants — once established they're hands-off
//                    weekly; S+G+C+W are the active-care layer
// ─────────────────────────────────────────────────────────────
function maintenanceLevel(plant) {
  const e = expert(plant);
  let score = 0;
  // Water tier — biggest weekly driver
  if (plant.water === "high") score += 3;
  else if (plant.water === "med") score += 1;
  // grow_rate fast = pruning / shaping
  if (e.grow_rate === "fast") score += 2;
  else if (e.grow_rate === "slow") score -= 1;
  // mature_yr — long-lived structural plants are easier week-to-week
  const my = e.mature_yr || 3;
  if (my >= 6) score -= 2;
  else if (my <= 2) score += 1;
  // Tier — T canopy = less weekly care once established
  if (plant.tier === "T") score -= 2;
  else if (plant.tier === "S" || plant.tier === "C") score += 1;
  else if (plant.tier === "G" || plant.tier === "W") score += 1;
  // Band the score
  if (score <= 0) return "low";
  if (score <= 3) return "med";
  return "high";
}
function maintenanceLabel(level) {
  return ({
    low:  { zh: "低", en: "low" },
    med:  { zh: "中", en: "medium" },
    high: { zh: "高", en: "high" },
  })[level] || { zh: "中", en: "medium" };
}

function detectLocation(address) {
  if (!address || !address.trim()) return null;
  const s = address.trim();
  let county = null, zone = null;
  for (const key of Object.keys(COUNTY_ZONES)) {
    if (s.includes(key)) { county = key; zone = COUNTY_ZONES[key]; break; }
  }
  // fallback: if address looks English, try a few keywords
  if (!county) {
    const lower = s.toLowerCase();
    if (/taipei|new taipei|keelung|taoyuan|hsinchu|yilan|ilan/.test(lower)) zone = "N";
    else if (/miaoli|taichung|changhua|nantou|yunlin/.test(lower)) zone = "C";
    else if (/chiayi|tainan|kaohsiung|pingtung|penghu/.test(lower)) zone = "S";
    else if (/hualien|taitung/.test(lower)) zone = "E";
  }
  const coastal = COASTAL_KEYWORDS.some(k => s.includes(k));
  if (!zone && !coastal) return null;
  return { county, zone: zone || "C", coastal };
}

// R30 — bilingual badge HTML showing whether a plant's zones list
// matches the user's detected zone. Returns "" when the plant has no
// zones declared (most plants in the DB are zone-agnostic) or when the
// user hasn't picked a location yet. Never filters — only badges.
function plantZoneBadgeHTML(plant) {
  if (!plant || !Array.isArray(plant.zones) || plant.zones.length === 0) return "";
  const userZone = state.detected?.zone;
  if (!userZone || !ZONE_LABEL[userZone]) return "";
  const zh = ZONE_LABEL[userZone].zh.split(" · ")[0];   // "北部" / "中部" / "南部" / "東部"
  const en = ({N:"North", C:"Central", S:"South", E:"East"})[userZone];

}

// Scoring engine — uses space + climate zone + coastal + goals.
// The original .jsx silently ignored space; this version penalizes mismatches
// (e.g. a 5m tree on a balcony) and rewards regional/coastal fit.
function scorePlants(opts) {
  // opts.ignoreDislike — counterfactual scoring used by prefImpactCount to
  // figure out which plants would have been in the top-8 if the user hadn't
  // disliked them. ignoreLike/ignorePin keep the option symmetric.
  const ignoreDislike = !!(opts && opts.ignoreDislike);
  const ignoreLike = !!(opts && opts.ignoreLike);
  const ignorePin = !!(opts && opts.ignorePin);
  const { sun, water, goals, space, detected } = state;
  const zone = detected?.zone || "C";        // default to central if no location
  const coastal = !!detected?.coastal;
  const liked = (state.prefs && state.prefs.liked) || {};
  const disliked = (state.prefs && state.prefs.disliked) || {};
  const pinned = (state.prefs && state.prefs.pinned) || {};
  return PLANTS.map((p) => {
    let score = 0;
    const reasons_zh = [], reasons_en = [];

    // Sun match
    if (p.sun.includes(sun)) { score += 32; reasons_zh.push("光照相符"); reasons_en.push("Sun match"); }
    else if (sun === "part" && (p.sun.includes("full") || p.sun.includes("shade"))) { score += 13; }

    // Water match
    if (p.water === water) { score += 26; reasons_zh.push("水分相符"); reasons_en.push("Water match"); }
    else if (Math.abs(["low","med","high"].indexOf(p.water) - ["low","med","high"].indexOf(water)) === 1) { score += 10; }

    // Space match
    if (p.spaces.includes(space)) { score += 20; }
    else { score -= 25; }
    if (space === "balcony" && p.container_ok) { score += 6; reasons_zh.push("適合容器"); reasons_en.push("Container-friendly"); }
    if (space === "indoor" && p.spaces.includes("indoor")) { score += 10; reasons_zh.push("室內可生長"); reasons_en.push("Indoor-tolerant"); }

    // Climate zone — if a plant is restricted to specific zones, penalize if mismatched
    if (p.zones && !p.zones.includes(zone)) {
      score -= 12;
    } else if (p.zones && p.zones.includes(zone)) {
      score += 5; reasons_zh.push(`${ZONE_LABEL[zone].zh}適合`); reasons_en.push(`${ZONE_LABEL[zone].en}-suited`);
    }

    // Coastal — salt-tolerant bonus / sensitive penalty
    if (coastal) {
      if (p.coastal_ok) { score += 10; reasons_zh.push("耐鹽霧"); reasons_en.push("Salt tolerant"); }
      else { score -= 4; }
    }

    // Goal match
    if (goals.includes("pollinator") && (p.supports_zh.some(s => /蜂|蝶|鳥|蜜|授粉/.test(s)))) {
      score += 18; reasons_zh.push("授粉/誘鳥"); reasons_en.push("Pollinator/bird");
    }
    if (goals.includes("screen") && (p.role_zh.includes("骨架") || p.role_zh.includes("綠籬") || p.tier === "T")) {
      score += 18; reasons_zh.push("遮蔽屏障"); reasons_en.push("Screening");
    }
    if (goals.includes("edible") && (p.supports_zh.some(s => /可食|食/.test(s)) || p.id === "alpinia" || p.id === "mulberry_sm")) {
      score += 16; reasons_zh.push("可食/花藝"); reasons_en.push("Edible/floral");
    }
    if (goals.includes("easy") && p.water === "low") { score += 14; reasons_zh.push("低維護"); reasons_en.push("Low maintenance"); }

    // Small diversity bonus — keeps borderline candidates on the list
    score += 4;

    // ── Explicit user preferences (👍 / 👎) — auditable nudge, not a black-box rerank.
    //    Magnitudes are deliberately modest so native filter / water tier / space match
    //    still dominate. The reason is appended to reasons_zh/en so the user can see
    //    exactly why a card moved up or down — and can reverse it via "清除偏好".
    if (liked[p.id] && !ignoreLike)    { score += 12; reasons_zh.push("你標為喜歡"); reasons_en.push("You liked this"); }
    if (disliked[p.id] && !ignoreDislike) { score -= 15; reasons_zh.push("你標為不喜歡"); reasons_en.push("You disliked this"); }
    // 📌 Pinned — a hard commit. +50 swamps space/water/zone mismatches so the
    // plant rises into the recs even if it's an awkward fit. buildLayers() also
    // force-includes pinned plants into their tier slot below. Reason is shown
    // first so the user understands why the card is at the top.
    if (pinned[p.id] && !ignorePin)   { score += 50; reasons_zh.unshift("📌 你已釘選"); reasons_en.unshift("📌 Pinned by you"); }

    score = Math.max(0, Math.min(99, score + 8));
    return { ...p, score, reasons_zh, reasons_en };
  }).sort((a, b) => b.score - a.score);
}

// ── Preference helpers — toggling 👍/👎 is mutually exclusive.
//    Clicking the same kind again clears it (so a tap is fully reversible).
//    After updating, we save the snapshot (which now includes prefs) and re-render.
function setPref(id, kind) {
  // While previewing a shared design, the user's own saved snapshot must not
  // be touched. Liking a plant on someone else's link should NOT push back
  // into localStorage or the URL hash (that would overwrite their own design
  // and rewrite the shared URL). Toggling locally is harmless but disabled
  // here for simplicity — the result page already nudges them to "Save as
  // my new design" first.
  if (state.viewingShared) return;
  if (!state.prefs) state.prefs = { liked: {}, disliked: {}, pinned: {} };
  if (!state.prefs.liked) state.prefs.liked = {};
  if (!state.prefs.disliked) state.prefs.disliked = {};
  if (!state.prefs.pinned) state.prefs.pinned = {};
  // 📌 Pin is an independent toggle — it doesn't conflict with like/dislike
  // (you might pin a plant you also like; you wouldn't normally pin one you
  // dislike, but the UI doesn't forbid it). Tap the pin again to unpin.
  if (kind === "pin") {
    if (state.prefs.pinned[id]) delete state.prefs.pinned[id];
    else state.prefs.pinned[id] = true;
  } else {
    const currentlyLiked = !!state.prefs.liked[id];
    const currentlyDisliked = !!state.prefs.disliked[id];
    // Always clear both first — like/dislike are mutually exclusive.
    delete state.prefs.liked[id];
    delete state.prefs.disliked[id];
    if (kind === "like" && !currentlyLiked) state.prefs.liked[id] = true;
    if (kind === "dislike" && !currentlyDisliked) state.prefs.disliked[id] = true;
  }
  // Persist + reflect in URL hash so the preference travels with the design.
  saveToLocal();
  try { pushHashFromState(); } catch (e) {}
  // Re-render the result page so the new score order + chip count update everywhere.
  if (state.view === "wizard" && state.step === 5) {
    initShoppingQty();
    renderResult();
    applyLanguage();
  } else {
    // Drawer / dictionary contexts — just re-render the host of the active tab if present.
    try {
      const recs = scorePlants().filter(p => p.score >= 30);
      const host = document.getElementById("tabPanel");
      if (host && state.resultTab === "dict") {
        // Preserve the dictionary search input value + caret + focus across
        // language toggle re-render. The search field is re-rendered from
        // state.dictQuery (so the typed text survives), but the DOM node is
        // replaced — so focus + selection range need to be restored manually.
        const prevSearch = document.getElementById("dictSearch");
        const hadFocus = prevSearch && document.activeElement === prevSearch;
        const selStart = prevSearch ? prevSearch.selectionStart : null;
        const selEnd   = prevSearch ? prevSearch.selectionEnd   : null;
        host.innerHTML = renderDictionary();
        wireDictionary();
        applyLanguage();
        if (hadFocus) {
          const next = document.getElementById("dictSearch");
          if (next) {
            next.focus();
            try { next.setSelectionRange(selStart ?? next.value.length, selEnd ?? next.value.length); } catch (e) {}
          }
        }
      }
    } catch (e) {}
  }
}

function clearPrefs() {
  // Same guard as setPref — never mutate the user's saved design while
  // previewing a shared link.
  if (state.viewingShared) return;
  state.prefs = { liked: {}, disliked: {}, pinned: {} };
  saveToLocal();
  try { pushHashFromState(); } catch (e) {}
  if (state.view === "wizard" && state.step === 5) {
    initShoppingQty();
    renderResult();
    applyLanguage();
  }
}

// Count how many of the top-N recs were actually nudged by user prefs —
// surfaced in the result-page note so the user can see the impact at a glance.
// Returns { liked, disliked } where:
//   liked    — top-8 plants present that the user explicitly liked/pinned (positive nudge in)
//   disliked — plants the user disliked that *would have been in top-8* without the dislike
//              (counterfactual: re-score ignoring dislikes, then check the top-8)
// Old callers that treat the return as a number still get a useful sum via valueOf.
function prefImpactCount(recs) {
  const liked = (state.prefs && state.prefs.liked) || {};
  const disliked = (state.prefs && state.prefs.disliked) || {};
  const pinned = (state.prefs && state.prefs.pinned) || {};
  const likedHit = (recs || []).slice(0, 8).filter(p => liked[p.id] || pinned[p.id]).length;
  let dislikedHit = 0;
  if (Object.keys(disliked).length) {
    // Counterfactual top-8 without the dislike penalty applied
    const counterfactual = scorePlants({ ignoreDislike: true }).filter(p => p.score >= 30).slice(0, 8);
    dislikedHit = counterfactual.filter(p => disliked[p.id]).length;
  }
  const result = { liked: likedHit, disliked: dislikedHit, total: likedHit + dislikedHit };
  // Backwards-compatible numeric coercion so any leftover `>= N` / arithmetic callers still work.
  result.valueOf = function () { return this.total; };
  return result;
}
function prefTotalCount() {
  const liked = (state.prefs && state.prefs.liked) || {};
  const disliked = (state.prefs && state.prefs.disliked) || {};
  const pinned = (state.prefs && state.prefs.pinned) || {};
  return Object.keys(liked).length + Object.keys(disliked).length + Object.keys(pinned).length;
}
function pinnedCount() {
  const pinned = (state.prefs && state.prefs.pinned) || {};
  return Object.keys(pinned).length;
}

// Expose so inline onclick="" handlers in the rec cards can call them.
window.setPref = setPref;
window.clearPrefs = clearPrefs;

// Layer assignment — FIX for original bug: ensure every tier has fallback to *best plant fitting tier*,
// even if the top-5 don't include one. Also, if no plant of a tier fits the space at all, mark it empty.
function buildLayers(scored) {
  const tierMap = {
    T: { tier_zh:"上層 · 喬木/骨架", tier_en:"Upper · Canopy / Frame",     desc_zh:"防風、遮蔭、垂直結構", desc_en:"Windbreak, shade, vertical structure" },
    S: { tier_zh:"中層 · 開花灌木",   tier_en:"Middle · Flowering shrubs",  desc_zh:"生態蜜源、視覺焦點", desc_en:"Pollinator nectar, focal interest" },
    G: { tier_zh:"地被 · 鋪面",       tier_en:"Ground · Cover",             desc_zh:"固土、保濕、底層綠意", desc_en:"Soil retention, moisture, base green" },
    W: { tier_zh:"水景 · 點綴",       tier_en:"Water · Accent",             desc_zh:"水生植物、生物多樣性", desc_en:"Aquatic plants, biodiversity" },
    C: { tier_zh:"藤本 · 立體綠化",   tier_en:"Climber · Vertical green",   desc_zh:"軟化邊界、節省地面", desc_en:"Softens edges, saves ground" },
  };

  // Pick best plant per tier from the scored & space-compatible set.
  // 📌 Pinned plants ALWAYS win their tier slot, even if score < 30 (which
  // can happen for a pinned plant the user knows is awkward but wants anyway —
  // e.g. a balcony user pinning a small tree as a centerpiece). The +50 in
  // scorePlants normally lifts pinned plants above the threshold, but this
  // override is the belt-and-braces guarantee that pin = guaranteed inclusion.
  const pinned = (state.prefs && state.prefs.pinned) || {};
  const compatible = scored.filter((p) => p.score >= 30 || pinned[p.id]);
  const layers = [];
  for (const tier of ["T","S","G","W","C"]) {
    // Prefer a pinned plant for this tier if any exists.
    const pinnedHere = compatible.find((p) => p.tier === tier && pinned[p.id]);
    const best = pinnedHere || compatible.find((p) => p.tier === tier);
    layers.push({
      key: tier,
      ...tierMap[tier],
      plant: best || null,
    });
  }
  // Drop W and C if there's no plant — they're optional tiers; keep T/S/G visible even if empty so user sees what's missing.
  return layers.filter((l) => !(["W","C"].includes(l.key) && !l.plant));
}

// ─────────────────────────────────────────────────────────────
// PERSONAL DASHBOARD — save & restore
//   The user's design IS their dashboard. We save it to:
//     · localStorage (so they see it again on next visit)
//     · URL hash (#d=base64) so bookmarking / sharing the URL works
//   No backend, no account, no tracking.
// ─────────────────────────────────────────────────────────────
const SAVE_KEY = "landscape-copilot-v1";
const HASH_KEY = "d";
// Multi-design dashboard — list of saved designs the user has explicitly kept.
// Each entry: { id, name, snapshot, savedAt }
// SAVE_KEY still holds the *active* (last-touched) design for backward compat
// and is the source of truth for the URL-hash & welcome-back banner.
const LIST_KEY = "landscape-copilot-list-v1";

// The minimal slice of state worth persisting — inputs + view layer toggles.
//
// CRITICAL: photoDataUrl and wizardPhotoDataUrl are NEVER persisted here.
// They're ~1MB base64 data URLs that would (a) blow up the URL-hash share link
// past every browser's max, (b) eat the entire localStorage quota in a single
// save, and (c) leak the user's photo into shareable URLs. Keep them in memory
// only — this whitelist is the authoritative gate. Adding fields here without
// considering size + privacy is a regression.
function snapshotState() {
  const snap = {
    space: state.space, sun: state.sun, water: state.water, goals: state.goals,
    address: state.address, detected: state.detected,
    widthM: state.widthM, depthM: state.depthM, orientation: state.orientation,
    qty: state.qty, nativeOnly: state.nativeOnly,
    // Per-design 👍/👎/📌 — travels with the snapshot so balcony prefs ≠ yard prefs,
    // shared links carry the user's preferences (including pinned must-haves),
    // and "我的設計" entries each remember their own taste.
    prefs: {
      liked:    { ...((state.prefs && state.prefs.liked)    || {}) },
      disliked: { ...((state.prefs && state.prefs.disliked) || {}) },
      pinned:   { ...((state.prefs && state.prefs.pinned)   || {}) },
    },
    // Resume on the user's last-viewed result tab (e.g. "shopping" or "care"),
    // not always "preview". The acted-on suggestion banner state is captured
    // so a re-opened design doesn't re-show a banner the user already dismissed.
    resultTab: state.resultTab || "preview",
    wizardPhotoSuggestActed: { ...(state.wizardPhotoSuggestActed || {}) },
    savedAt: Date.now(),
  };
  // Belt-and-suspenders: if anyone ever assigns photoDataUrl to the literal
  // snapshot object (refactor accident, copy-paste from state), strip it.
  // The whitelist above already prevents it — this delete just guarantees no
  // base64 image ever reaches localStorage or the URL hash.
  delete snap.photoDataUrl;
  delete snap.wizardPhotoDataUrl;
  return snap;
}

function applySnapshot(snap) {
  if (!snap || !snap.space) return false;
  // Defensive: never let a malicious / stale snapshot smuggle a base64 photo
  // back into state. Even though snapshotState() strips these on write, an
  // older payload from localStorage or a hand-crafted #d= URL could carry one.
  // Drop the in-memory photo fields before applying — the user can re-upload
  // if they want a new analysis. Photos belong to the session, not the design.
  state.photoDataUrl = null;
  state.wizardPhotoDataUrl = null;
  state.space = snap.space;
  state.sun = snap.sun || "part";
  state.water = snap.water || "med";
  state.goals = Array.isArray(snap.goals) ? snap.goals : [];
  state.address = snap.address || "";
  state.detected = snap.detected || null;
  state.widthM = snap.widthM ?? SPACE_DEFAULTS[snap.space].w;
  state.depthM = snap.depthM ?? SPACE_DEFAULTS[snap.space].d;
  state.orientation = snap.orientation || "S";
  state.qty = (snap.qty && typeof snap.qty === "object") ? snap.qty : {};
  state.nativeOnly = !!snap.nativeOnly;
  // Restore per-design 👍/👎/📌. Older snapshots without `prefs.pinned` load empty.
  state.prefs = {
    liked:    (snap.prefs && snap.prefs.liked    && typeof snap.prefs.liked    === "object") ? { ...snap.prefs.liked }    : {},
    disliked: (snap.prefs && snap.prefs.disliked && typeof snap.prefs.disliked === "object") ? { ...snap.prefs.disliked } : {},
    pinned:   (snap.prefs && snap.prefs.pinned   && typeof snap.prefs.pinned   === "object") ? { ...snap.prefs.pinned }   : {},
  };
  // Resume on the user's last-viewed result tab; legacy snapshots default to "preview".
  // Whitelist against known tabs so a malformed snapshot can't park us on an undefined tab.
  const KNOWN_TABS = ["preview","plan","iso3d","layers","calendar","care","build","tutorials","shopping","dict"];
  state.resultTab = (snap.resultTab && KNOWN_TABS.includes(snap.resultTab)) ? snap.resultTab : "preview";
  state.wizardPhotoSuggestActed = (snap.wizardPhotoSuggestActed && typeof snap.wizardPhotoSuggestActed === "object")
    ? { ...snap.wizardPhotoSuggestActed }
    : {};
  state.savedAt = snap.savedAt || Date.now();
  return true;
}

// One-shot bilingual quota error — set when localStorage.setItem throws
// QuotaExceededError so the next render can surface it (instead of silently
// failing the save). Read + cleared by surface code; safe to access undefined.
function flagStorageQuotaError() {
  const msg = (state && state.lang === "en")
    ? "Local storage full — couldn't save. Try removing a saved design."
    : "本機儲存空間已滿，無法儲存。試試刪除一個已存設計。";
  try {
    // Skip duplicate alerts within a short window
    const now = Date.now();
    if (!window.__lastQuotaAlertAt || now - window.__lastQuotaAlertAt > 4000) {
      window.__lastQuotaAlertAt = now;
      alert(msg);
    }
  } catch (_) {}
  try { console.warn("[landscape-copilot] localStorage quota exceeded:", msg); } catch (_) {}
}

// Detect the various flavours of "storage full" the browsers throw.
function isQuotaError(e) {
  if (!e) return false;
  // Firefox: NS_ERROR_DOM_QUOTA_REACHED (code 1014). Safari/Chrome: QuotaExceededError (code 22 or 1014).
  return e.name === "QuotaExceededError"
      || e.name === "NS_ERROR_DOM_QUOTA_REACHED"
      || e.code === 22 || e.code === 1014;
}

function saveToLocal() {
  try {
    localStorage.setItem(SAVE_KEY, JSON.stringify(snapshotState()));
  } catch (e) {
    if (isQuotaError(e)) flagStorageQuotaError();
    // Non-quota errors (private mode, disabled storage) stay silent as before.
  }
}

function loadFromLocal() {
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    return raw ? JSON.parse(raw) : null;
  } catch (e) { return null; }
}

function clearLocal() {
  try { localStorage.removeItem(SAVE_KEY); } catch (e) {}
}

// ─────────────────────────────────────────────────────────────
// Multi-design dashboard ("我的設計") — a NAMED list of designs.
// Storage shape: { designs: [{id, name, snapshot, savedAt}], activeId }
// One slot in SAVE_KEY remains the active design (URL-hash truth);
// LIST_KEY holds zero or more explicitly-kept designs the user wants
// to compare or return to later (e.g. balcony vs yard).
// ─────────────────────────────────────────────────────────────
function loadDesignList() {
  try {
    const raw = localStorage.getItem(LIST_KEY);
    if (!raw) return { designs: [], activeId: null };
    const parsed = JSON.parse(raw);
    if (!parsed || !Array.isArray(parsed.designs)) return { designs: [], activeId: null };
    return parsed;
  } catch (e) { return { designs: [], activeId: null }; }
}

function saveDesignList(list) {
  try {
    localStorage.setItem(LIST_KEY, JSON.stringify(list));
  } catch (e) {
    if (isQuotaError(e)) flagStorageQuotaError();
  }
}

// Build a default name from snapshot: "陽台 · 6.2 m² · 2026-06-19"
function defaultDesignName(snap) {
  if (!snap) return "未命名設計";
  const space = spaceZh(snap.space);
  const w = Number(snap.widthM || 0), d = Number(snap.depthM || 0);
  const area = (w * d).toFixed(1);
  const dt = new Date(snap.savedAt || Date.now());
  const y = dt.getFullYear();
  const m = String(dt.getMonth() + 1).padStart(2, "0");
  const day = String(dt.getDate()).padStart(2, "0");
  return `${space} · ${area} m² · ${y}-${m}-${day}`;
}

// Pseudo-unique id for a design entry.
function makeDesignId() {
  return "d_" + Date.now().toString(36) + "_" + Math.random().toString(36).slice(2, 7);
}

// Persist the *current* state as a NEW entry in the named list.
// Returns the new entry id. Does not change the URL hash or SAVE_KEY semantics.
function saveCurrentAsNewDesign(customName) {
  const snap = snapshotState();
  const id = makeDesignId();
  const entry = {
    id,
    name: (customName && customName.trim()) || defaultDesignName(snap),
    snapshot: snap,
    savedAt: snap.savedAt || Date.now(),
  };
  const list = loadDesignList();
  list.designs.unshift(entry);
  list.activeId = id;
  saveDesignList(list);
  return id;
}

// Overwrite an existing entry with the current state (used when user is
// continuing to edit an "active" entry from the dashboard list).
function updateActiveDesignEntry() {
  const list = loadDesignList();
  if (!list.activeId) return;
  const idx = list.designs.findIndex(e => e.id === list.activeId);
  if (idx < 0) return;
  const snap = snapshotState();
  list.designs[idx].snapshot = snap;
  list.designs[idx].savedAt = snap.savedAt || Date.now();
  saveDesignList(list);
}

function setActiveDesignId(id) {
  const list = loadDesignList();
  // Reject ids that aren't in the list — would leave activeId pointing at a
  // ghost entry, making "我的設計" highlight nothing on next load. Falling
  // back to null is the safe default; the homepage already handles a missing
  // active id by showing the empty state.
  const exists = id && list.designs.some(e => e.id === id);
  list.activeId = exists ? id : null;
  saveDesignList(list);
}

function deleteDesignById(id) {
  const list = loadDesignList();
  list.designs = list.designs.filter(e => e.id !== id);
  if (list.activeId === id) list.activeId = null;
  saveDesignList(list);
}

function renameDesign(id, newName) {
  const list = loadDesignList();
  const entry = list.designs.find(e => e.id === id);
  if (!entry) return;
  entry.name = (newName && newName.trim()) || entry.name;
  saveDesignList(list);
}

function loadDesignById(id) {
  const list = loadDesignList();
  return list.designs.find(e => e.id === id) || null;
}

// URL hash encoding — base64-encoded JSON. Used for sharing / bookmarking.
function encodeHashFromState() {
  try {
    const s = JSON.stringify(snapshotState());
    return btoa(encodeURIComponent(s));
  } catch (e) { return ""; }
}

function decodeHash(hash) {
  try {
    if (!hash) return null;
    const m = hash.match(new RegExp(`#?${HASH_KEY}=([^&]+)`));
    if (!m) return null;
    return JSON.parse(decodeURIComponent(atob(m[1])));
  } catch (e) { return null; }
}

function pushHashFromState() {
  const enc = encodeHashFromState();
  if (enc) {
    const url = `${location.pathname}#${HASH_KEY}=${enc}`;
    history.replaceState(null, "", url);
  }
}

// On result page reach, save to localStorage + bump URL hash so a bookmark works.
// Guard: when the user is *viewing* a friend's shared design but hasn't committed to it,
// we must NOT overwrite their saved local design. The conflict banner's "Save as my new
// design" button is the explicit opt-in path that does write.
function persistDashboard() {
  // Perf: skip localStorage writes when we're not on the result page.
  // Tab navigation (home → photo → wizard) doesn't change the persisted snapshot,
  // so writing on every re-render wastes a (synchronous) localStorage roundtrip.
  // Only persist when the user has actually reached step 5 of the wizard.
  if (state.view !== "wizard" || state.step !== 5) {
    pushHashFromState();
    return;
  }
  if (!state.viewingShared) {
    // Perf: tab clicks (preview → plan → care …) trigger renderResult → persistDashboard.
    // Result-tab changes don't alter any field the user would lose, yet writing to
    // localStorage is a synchronous roundtrip + a full JSON.stringify on every render.
    // Skip the write when the meaningful payload matches the last persisted one.
    // (savedAt is intentionally excluded — it bumps every render and would defeat the dedup.)
    const snap = snapshotState();
    const { savedAt: _ignoredAt, ...meaningful } = snap;
    const serialized = JSON.stringify(meaningful);
    if (window.__lastPersistedSnapshot !== serialized) {
      window.__lastPersistedSnapshot = serialized;
      saveToLocal();
      // Keep the active named-list entry in sync as the user edits.
      // (Only updates if there *is* an activeId — initial visits won't auto-create
      // an entry until the user explicitly hits "另存為新設計".)
      updateActiveDesignEntry();
    }
  }
  pushHashFromState();
}

// Compare two snapshots on the fields that constitute a "design".
// Returns true when the meaningful inputs differ — savedAt and qty drift alone don't count.
function snapshotsDiffer(a, b) {
  if (!a || !b) return !!(a || b);
  const norm = (s) => JSON.stringify({
    space: s.space || "",
    sun: s.sun || "",
    water: s.water || "",
    goals: Array.isArray(s.goals) ? [...s.goals].sort() : [],
    address: s.address || "",
    widthM: s.widthM ?? null,
    depthM: s.depthM ?? null,
    orientation: s.orientation || "",
    nativeOnly: !!s.nativeOnly,
  });
  return norm(a) !== norm(b);
}

// On boot: check URL hash first (shared link), then localStorage.
//   • Hash only → apply, jump to result (sharer's first-time link or your own bookmark).
//   • Local only → stay on home, show welcome-back banner.
//   • Hash + identical local → apply hash silently (re-opening your own shared link).
//   • Hash + DIFFERENT local → STOP. Don't clobber. Show a conflict UI so the user
//     can choose: View shared / Keep mine / Save shared as a copy. This prevents
//     silent data loss when a friend's link arrives on top of your existing design.
function tryRestoreDashboard() {
  const fromHash = decodeHash(location.hash);
  const fromLocal = loadFromLocal();

  if (fromHash && fromLocal && snapshotsDiffer(fromHash, fromLocal)) {
    // Conflict — don't touch storage, don't change view. Let the homepage banner ask.
    state.pendingSharedSnapshot = fromHash;
    state.pendingSnapshot = fromLocal;
    state.shareConflict = true;
    state.restoredFrom = "conflict";
    return true;
  }

  if (fromHash) {
    applySnapshot(fromHash);
    state.view = "wizard";
    state.step = 5;
    state.resultTab = "preview";
    state.restoredFrom = "hash";
    initShoppingQty();
    return true;
  }
  if (fromLocal) {
    // Don't auto-jump to result on localStorage restore — show banner on home offering to resume.
    state.pendingSnapshot = fromLocal;
    state.restoredFrom = "local";
    return true;
  }
  return false;
}

// One-line human summary of a snapshot — used in the conflict banner's compare cards.
function summarizeSnapshot(s) {
  if (!s) return "—";
  const space = spaceZh(s.space);
  const area = (Number(s.widthM || 0) * Number(s.depthM || 0)).toFixed(1);
  const sunMap = { full: "全日照", part: "半日照", shade: "遮蔭" };
  const sunMapEn = { full: "Full sun", part: "Part sun", shade: "Shade" };
  const sun = state.lang === "zh" ? (sunMap[s.sun] || "") : (sunMapEn[s.sun] || "");
  return `${space} · ${area} m²${sun ? " · " + sun : ""}`;
}

// First-visit coach mark — small dismissible banner that introduces the 3 paths.
// Shown on the homepage when localStorage has no 'lc-onboarded' flag, and only
// when there's no share-conflict or welcome-back banner already taking that slot
// (to avoid stacking three banners for a returning user landing on a friend's link).
// Sets a separate 'lc-first-seen' timestamp on first call so the design-presets
// "✨ 新功能" badge can auto-expire 5 days later.
const FIRST_VISIT_KEY = "lc-onboarded";
const FIRST_SEEN_KEY = "lc-first-seen";
const NEW_FEAT_DAYS = 5;
function markFirstSeenIfNeeded() {
  try {
    if (!localStorage.getItem(FIRST_SEEN_KEY)) {
      localStorage.setItem(FIRST_SEEN_KEY, String(Date.now()));
    }
  } catch (e) { /* private mode */ }
}
function isFirstVisit() {
  try { return !localStorage.getItem(FIRST_VISIT_KEY); }
  catch (e) { return false; }
}
function shouldShowNewFeatBadge() {
  try {
    const t = Number(localStorage.getItem(FIRST_SEEN_KEY) || 0);
    if (!t) return true; // first ever visit — show badge
    return (Date.now() - t) < NEW_FEAT_DAYS * 86400 * 1000;
  } catch (e) { return false; }
}
function renderFirstVisitBanner() {
  if (!isFirstVisit()) return "";
  // Don't compete with a share-conflict alert or welcome-back resume banner.
  if (state.shareConflict || state.pendingSnapshot) return "";
  return `
    <div class="first-visit" id="firstVisitBanner" role="note">
      <span class="fv-icon" aria-hidden="true">👋</span>
      <div class="fv-text">
        <strong data-zh="第一次來？" data-en="First time?">第一次來？</strong>
        <span data-zh="這是一個免費的 AI 景觀設計工具。3 種開始方式：📸 拍照、✨ 5 個問題、📖 瀏覽植物。"
              data-en="Free AI landscape design tool. 3 ways to start: 📸 photo, ✨ 5-question wizard, or 📖 browse plants.">
          這是一個免費的 AI 景觀設計工具。3 種開始方式：📸 拍照、✨ 5 個問題、📖 瀏覽植物。
        </span>
      </div>
      <button class="fv-dismiss" id="firstVisitDismiss"><span data-zh="✕ 知道了" data-en="✕ Got it">✕ 知道了</span></button>
    </div>`;
}
function renderNewFeatBadge() {
  if (!shouldShowNewFeatBadge()) return "";
  return `<span class="new-feat-badge" data-zh="✨ 新功能" data-en="✨ New">✨ 新功能</span>`;
}

// Welcome-back banner on the homepage when localStorage has a saved design.
// If a shared-link conflict was detected, render that instead — same slot, higher stakes.
//
// Dedup against the named "我的設計" list: if pendingSnapshot is the same design
// as any entry in loadDesignList().designs (via snapshotsDiffer), the design is
// already visible in the portfolio section just below — showing welcome-back
// would be redundant. Only show welcome-back when:
//   • no named designs exist yet (first-touch path), OR
//   • the unsaved pending snapshot differs from every named entry.
function renderWelcomeBackBanner() {
  if (state.shareConflict) return renderShareConflictBanner();
  if (!state.pendingSnapshot) return "";
  const s = state.pendingSnapshot;
  try {
    const list = loadDesignList();
    if (list.designs.length > 0) {
      const duplicate = list.designs.some(e => !snapshotsDiffer(e.snapshot, s));
      if (duplicate) return "";
    }
  } catch (_) { /* fall through to banner — safer to show than to crash on storage errors */ }
  // XSS: spaceZh/area/ago are derived from the persisted snapshot (which can be loaded
  // from a `#d=` URL hash supplied by anyone). spaceZh returns from a map (safe), but
  // area is a Number.toFixed string and ago comes from humanizeTimeAgo — escape both
  // defensively before injecting into the data-zh/data-en HTML attributes.
  const spaceLabel = escapeHtml(spaceZh(s.space));
  const area = escapeHtml((s.widthM * s.depthM).toFixed(1));
  const ago = escapeHtml(humanizeTimeAgo(s.savedAt));
  return `
    <div class="welcome-back" id="welcomeBack">
      <span class="icon">🌿</span>
      <div class="text">
        <strong data-zh="歡迎回來！" data-en="Welcome back!">歡迎回來！</strong>
        <span class="sub" data-zh="${ago} 前你規劃了 ${spaceLabel} · ${area} m² 的景觀，要繼續編輯嗎？"
                          data-en="You saved a ${spaceLabel} · ${area} m² design ${ago} ago. Continue?">
              ${ago} 前你規劃了 ${spaceLabel} · ${area} m² 的景觀，要繼續編輯嗎？
        </span>
      </div>
      <div class="actions">
        <button class="primary" id="resumeBtn"><span data-zh="繼續使用" data-en="Resume">繼續使用</span></button>
        <button id="discardBtn"><span data-zh="重新開始" data-en="Start fresh">重新開始</span></button>
      </div>
    </div>`;
}

// Shared-link conflict banner — appears when a friend's #d= URL arrives over your own saved design.
// Three explicit choices, no silent clobber. Uses textContent-safe interpolation since
// summarizeSnapshot output may include user-typed address.
function renderShareConflictBanner() {
  const shared = state.pendingSharedSnapshot;
  const local = state.pendingSnapshot;
  const sharedSummary = summarizeSnapshot(shared);
  const localSummary = summarizeSnapshot(local);
  const localAgo = humanizeTimeAgo(local && local.savedAt);
  // Escape for safe insertion into HTML — these strings include user-entered fields like address indirectly.
  const esc = (s) => String(s).replace(/[&<>"']/g, (c) => ({
    "&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"
  })[c]);
  return `
    <div class="share-conflict" id="shareConflict" role="alertdialog" aria-labelledby="scTitle" aria-describedby="scBody">
      <div class="sc-head">
        <span class="icon" aria-hidden="true">🔗</span>
        <strong id="scTitle" data-zh="有人分享了一個設計給你" data-en="A shared design has arrived">有人分享了一個設計給你</strong>
      </div>
      <p class="sc-body" id="scBody"
         data-zh="這個分享連結含有與你目前儲存的設計不同的方案。為了不覆蓋你的成果，先請你選擇下一步。"
         data-en="This link carries a design different from the one you have saved. To avoid overwriting your work, pick what to do next.">
         這個分享連結含有與你目前儲存的設計不同的方案。為了不覆蓋你的成果，先請你選擇下一步。
      </p>
      <div class="sc-compare" aria-hidden="false">
        <div class="sc-card">
          <span class="label" data-zh="你目前的設計" data-en="Your saved design">你目前的設計</span>
          <span class="summary">${esc(localSummary)}</span>
          <span class="meta" data-zh="${esc(localAgo)} 前儲存" data-en="saved ${esc(localAgo)} ago">${esc(localAgo)} 前儲存</span>
        </div>
        <div class="sc-card">
          <span class="label" data-zh="分享連結內的設計" data-en="Design in the shared link">分享連結內的設計</span>
          <span class="summary">${esc(sharedSummary)}</span>
          <span class="meta" data-zh="僅在此分頁開啟，尚未儲存" data-en="open in this tab only, not yet saved">僅在此分頁開啟，尚未儲存</span>
        </div>
      </div>
      <div class="sc-actions">
        <button class="primary" id="scViewSharedBtn"><span data-zh="查看分享的設計" data-en="View shared design">查看分享的設計</span></button>
        <button id="scKeepMineBtn"><span data-zh="保留我的，丟掉分享連結" data-en="Keep mine, drop the link">保留我的，丟掉分享連結</span></button>
        <button id="scSaveCopyBtn"><span data-zh="把分享的存成我的新設計" data-en="Save shared as my new design">把分享的存成我的新設計</span></button>
      </div>
    </div>`;
}

function humanizeTimeAgo(ts) {
  if (!ts) return "?";
  const diffMs = Date.now() - ts;
  const min = Math.floor(diffMs / 60000);
  if (min < 60) return state.lang === "zh" ? `${min} 分鐘` : `${min} min`;
  const hr = Math.floor(min / 60);
  if (hr < 24) return state.lang === "zh" ? `${hr} 小時` : `${hr} hr`;
  const d = Math.floor(hr / 24);
  return state.lang === "zh" ? `${d} 天` : `${d} d`;
}

// "我的設計" — list of named saved designs on the homepage.
// Distinct from the implicit single-slot SAVE_KEY (which is the welcome-back
// resume target). The list lets users keep balcony + yard + office designs
// side-by-side and resume any of them.
// ── R17 compare-two-designs helpers ────────────────────────────
// designSummary(snapshot) — pulls the comparable fields out of a stored
// snapshot WITHOUT re-running scorePlants. snap.qty already holds the
// top-8 plant ids the user committed to (initShoppingQty filled it when
// the design was first rendered), so we just look those ids up in PLANTS.
function designSummary(snap) {
  if (!snap) return null;
  const w = Number(snap.widthM || 0), d = Number(snap.depthM || 0);
  const area = (w * d) || 0;
  // Plant ids the design committed to. Stored as a qty map; treat any
  // entry with qty > 0 as "in the design". Sort by qty desc so the top-5
  // surface the highest-impact plants first.
  const qtyMap = (snap.qty && typeof snap.qty === "object") ? snap.qty : {};
  const ids = Object.keys(qtyMap).filter(id => Number(qtyMap[id]) > 0);
  const plantsById = Object.fromEntries(PLANTS.map(p => [p.id, p]));
  const entries = ids
    .map(id => ({ id, qty: Number(qtyMap[id]) || 0, plant: plantsById[id] }))
    .filter(e => e.plant)
    .sort((a, b) => b.qty - a.qty);
  // Aggregate sustainability metrics — single pass over committed plants.
  let totalCO2 = 0, totalWater = 0, totalCost = 0;
  entries.forEach(({ plant, qty }) => {
    const e = expert(plant);
    totalCO2   += (e.co2_kg_yr  || 0) * qty;
    totalWater += (e.water_l_wk || 0) * qty;
    totalCost  += (Number(plant.cost) || 0) * qty;
  });
  return {
    space: snap.space || null,
    sun: snap.sun || null,
    water: snap.water || null,
    goals: Array.isArray(snap.goals) ? snap.goals.slice() : [],
    widthM: w, depthM: d, area,
    plantIds: entries.map(e => e.id),
    topPlants: entries.slice(0, 5).map(e => ({
      id: e.id, qty: e.qty,
      zh: e.plant.zh, en: e.plant.en,
    })),
    co2: Math.round(totalCO2),
    water_l_wk: Math.round(totalWater),
    cost: Math.round(totalCost),
  };
}

// compareDesigns(a, b) — diff two designSummary results.
// Returns shared / aOnly / bOnly plant ids and a list of field-level diffs
// (space, sun, water, goals). Goals are treated as a set: each goal whose
// presence differs becomes its own diff row, since users care which goal
// flipped on/off, not "your goals are different".
function compareDesigns(a, b) {
  const setA = new Set(a.plantIds || []);
  const setB = new Set(b.plantIds || []);
  const shared = [], aOnly = [], bOnly = [];
  setA.forEach(id => { (setB.has(id) ? shared : aOnly).push(id); });
  setB.forEach(id => { if (!setA.has(id)) bOnly.push(id); });
  const diffs = [];
  ["space","sun","water"].forEach(field => {
    if ((a[field] || null) !== (b[field] || null)) {
      diffs.push({ field, valueA: a[field], valueB: b[field] });
    }
  });
  const goalsA = new Set(a.goals || []), goalsB = new Set(b.goals || []);
  GOAL_OPTIONS.forEach(g => {
    if (goalsA.has(g.key) !== goalsB.has(g.key)) {
      diffs.push({ field: "goal:" + g.key, valueA: goalsA.has(g.key), valueB: goalsB.has(g.key) });
    }
  });
  return { shared, aOnly, bOnly, diffs };
}

// renderCompareView(designA, designB) — single-render 2-column compare panel.
// `designA` and `designB` are loaded list entries (have id, name, snapshot).
// No async, no fetch — pure HTML from designSummary + compareDesigns output.
function renderCompareView(designA, designB) {
  const sumA = designSummary(designA.snapshot);
  const sumB = designSummary(designB.snapshot);
  if (!sumA || !sumB) return "";
  const diff = compareDesigns(sumA, sumB);
  const goalLabel = (key) => {
    const g = GOAL_OPTIONS.find(x => x.key === key);
    return g ? { zh: g.zh, en: g.en } : { zh: key, en: key };
  };
  const waterLabelZh = { low:"低", med:"中", high:"高" };
  const waterLabelEn = { low:"Low", med:"Med", high:"High" };
  const goalsDiffKeys = new Set(
    diff.diffs.filter(d => d.field.startsWith("goal:")).map(d => d.field.slice(5))
  );
  const fieldDiffs = new Set(
    diff.diffs.filter(d => !d.field.startsWith("goal:")).map(d => d.field)
  );

  function colHtml(design, sum, side) {
    const onlyIds = side === "A" ? diff.aOnly : diff.bOnly;
    const onlySet = new Set(onlyIds);
    const chips = (sum.goals || []).map(k => {
      const lbl = goalLabel(k);
      const cls = goalsDiffKeys.has(k) ? "chip diff" : "chip";
      return `<span class="${cls}" data-zh="${escapeHtml(lbl.zh)}" data-en="${escapeHtml(lbl.en)}">${escapeHtml(lbl.zh)}</span>`;
    }).join("");
    const topPlants = sum.topPlants.map(p => {
      const cls = onlySet.has(p.id) ? "only" : "";
      const marker = onlySet.has(p.id) ? " ◆" : "";
      return `<li class="${cls}" data-zh="${escapeHtml(p.zh)} × ${p.qty}${marker}" data-en="${escapeHtml(p.en)} × ${p.qty}${marker}">${escapeHtml(p.zh)} × ${p.qty}${marker}</li>`;
    }).join("");
    const dimStr = `${(sum.widthM||0).toFixed(1)} × ${(sum.depthM||0).toFixed(1)} m`;
    const rowCls = (key) => fieldDiffs.has(key) ? "col-row diff" : "col-row";
    return `
      <div class="compare-col">
        <div class="col-name">${escapeHtml(design.name)}</div>
        <div class="${rowCls('space')}">
          <span class="k" data-zh="空間" data-en="Space">空間</span>
          <span class="v" data-zh="${escapeHtml(spaceZh(sum.space))}" data-en="${escapeHtml(spaceEn(sum.space))}">${escapeHtml(spaceZh(sum.space))}</span>
        </div>
        <div class="col-row">
          <span class="k" data-zh="尺寸" data-en="Size">尺寸</span>
          <span class="v">${dimStr}</span>
        </div>
        <div class="${rowCls('sun')}">
          <span class="k" data-zh="日照" data-en="Sun">日照</span>
          <span class="v" data-zh="${escapeHtml(sunZh(sum.sun))}" data-en="${escapeHtml(sunEn(sum.sun))}">${escapeHtml(sunZh(sum.sun))}</span>
        </div>
        <div class="${rowCls('water')}">
          <span class="k" data-zh="澆水" data-en="Water">澆水</span>
          <span class="v" data-zh="${escapeHtml(waterLabelZh[sum.water]||sum.water||'—')}" data-en="${escapeHtml(waterLabelEn[sum.water]||sum.water||'—')}">${escapeHtml(waterLabelZh[sum.water]||sum.water||'—')}</span>
        </div>
        <div class="col-label" data-zh="目標 · Goals" data-en="Goals">目標 · Goals</div>
        <div class="chips-row">${chips || `<span class="chip" data-zh="（無）" data-en="(none)">（無）</span>`}</div>
        <div class="col-label" data-zh="主要植物（前 5） · Top 5 plants" data-en="Top 5 plants">主要植物（前 5）</div>
        <ul class="plant-list">${topPlants || `<li data-zh="（尚未選定）" data-en="(none yet)">（尚未選定）</li>`}</ul>
        <div class="metrics">
          <div class="metric">
            <div class="lbl" data-zh="CO₂/年" data-en="CO₂/yr">CO₂/年</div>
            <div class="val">${sum.co2} <span style="font-size:9px;opacity:0.7;">kg</span></div>
          </div>
          <div class="metric">
            <div class="lbl" data-zh="水量/週" data-en="Water/wk">水量/週</div>
            <div class="val">${sum.water_l_wk} <span style="font-size:9px;opacity:0.7;">L</span></div>
          </div>
          <div class="metric">
            <div class="lbl" data-zh="總價" data-en="Total cost">總價</div>
            <div class="val">NT$ ${sum.cost.toLocaleString()}</div>
          </div>
        </div>
        <button class="continue-btn" data-compare-continue="${escapeHtml(design.id)}"
                data-zh="✓ 用這個設計繼續" data-en="✓ Continue with this design">✓ 用這個設計繼續</button>
      </div>`;
  }

  const sharedCount = diff.shared.length;
  const onlyACount = diff.aOnly.length;
  const onlyBCount = diff.bOnly.length;
  const summaryLine = `
    <div style="font-size:11.5px; color:var(--ink-soft); font-family:var(--serif); margin-bottom:10px;">
      <span data-zh="共同植物：${sharedCount} 種 · 僅 A：${onlyACount} 種 · 僅 B：${onlyBCount} 種"
            data-en="Shared plants: ${sharedCount} · Only A: ${onlyACount} · Only B: ${onlyBCount}">
        共同植物：${sharedCount} 種 · 僅 A：${onlyACount} 種 · 僅 B：${onlyBCount} 種
      </span>
    </div>`;

  return `
    <div class="compare-panel">
      <div class="compare-head">
        <h3 data-zh="↔ 設計比較 · Compare designs" data-en="↔ Compare designs">↔ 設計比較 · Compare designs</h3>
        <button class="compare-exit" id="compareExitBtn"
                data-zh="✕ 退出比較 · Exit compare" data-en="✕ Exit compare">✕ 退出比較</button>
      </div>
      ${summaryLine}
      <div class="compare-grid">
        ${colHtml(designA, sumA, "A")}
        ${colHtml(designB, sumB, "B")}
      </div>
    </div>`;
}

// Aggregate stats line above the grid — only meaningful with 2+ designs.
function renderMyDesignsAggregate(list) {
  if (!list.designs || list.designs.length < 2) return "";
  const plantSet = new Set();
  let totalCO2 = 0;
  list.designs.forEach(entry => {
    const sum = designSummary(entry.snapshot);
    if (!sum) return;
    (sum.plantIds || []).forEach(id => plantSet.add(id));
    totalCO2 += sum.co2 || 0;
  });
  const n = list.designs.length;
  const speciesCount = plantSet.size;
  const co2Round = Math.round(totalCO2);
  return `
    <div class="my-designs-aggregate"
         data-zh="你有 <strong>${n}</strong> 個設計 · 共計 <strong>${speciesCount}</strong> 種植物 · 總 CO₂ <strong>${co2Round}</strong> kg/年"
         data-en="You have <strong>${n}</strong> designs · <strong>${speciesCount}</strong> plant species total · CO₂ <strong>${co2Round}</strong> kg/yr">
      你有 <strong>${n}</strong> 個設計 · 共計 <strong>${speciesCount}</strong> 種植物 · 總 CO₂ <strong>${co2Round}</strong> kg/年
    </div>`;
}

function renderMyDesignsSection() {

  // If one of the picked designs has been deleted in between, fall through

            // The overlay text is bilingual; we use the current lang and let

            const pickLabel = t("選擇此設計比較 · Pick this design to compare", "Pick this design to compare");
            return `
