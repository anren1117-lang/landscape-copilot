// Scoring engine — uses space + climate zone + coastal + goals.
// The original .jsx silently ignored space; this version penalizes mismatches
// (e.g. a 5m tree on a balcony) and rewards regional/coastal fit.
function scorePlants() {
  const { sun, water, goals, space, detected } = state;
  const zone = detected?.zone || "C";        // default to central if no location
  const coastal = !!detected?.coastal;
  const liked = (state.prefs && state.prefs.liked) || {};
  const disliked = (state.prefs && state.prefs.disliked) || {};
  const pinned = (state.prefs && state.prefs.pinned) || {};
  return PLANTS.map((p) => {
    let score = 0;
    const reasons_zh = [], reasons_en = [];

    // Sun match
    if (p.sun.includes(sun)) { score += 32; reasons_zh.push("光照相符"); reasons_en.push("Sun match"); }
    else if (sun === "part" && (p.sun.includes("full") || p.sun.includes("shade"))) { score += 13; }

    // Water match
    if (p.water === water) { score += 26; reasons_zh.push("水分相符"); reasons_en.push("Water match"); }
    else if (Math.abs(["low","med","high"].indexOf(p.water) - ["low","med","high"].indexOf(water)) === 1) { score += 10; }

    // Space match
    if (p.spaces.includes(space)) { score += 20; }
    else { score -= 25; }
    if (space === "balcony" && p.container_ok) { score += 6; reasons_zh.push("適合容器"); reasons_en.push("Container-friendly"); }
    if (space === "indoor" && p.spaces.includes("indoor")) { score += 10; reasons_zh.push("室內可生長"); reasons_en.push("Indoor-tolerant"); }

    // Climate zone — if a plant is restricted to specific zones, penalize if mismatched
    if (p.zones && !p.zones.includes(zone)) {
      score -= 12;
    } else if (p.zones && p.zones.includes(zone)) {
      score += 5; reasons_zh.push(`${ZONE_LABEL[zone].zh}適合`); reasons_en.push(`${ZONE_LABEL[zone].en}-suited`);
    }

    // Coastal — salt-tolerant bonus / sensitive penalty
    if (coastal) {
      if (p.coastal_ok) { score += 10; reasons_zh.push("耐鹽霧"); reasons_en.push("Salt tolerant"); }
      else { score -= 4; }
    }

    // Goal match
    if (goals.includes("pollinator") && (p.supports_zh.some(s => /蜂|蝶|鳥|蜜|授粉/.test(s)))) {
      score += 18; reasons_zh.push("授粉/誘鳥"); reasons_en.push("Pollinator/bird");
    }
    if (goals.includes("screen") && (p.role_zh.includes("骨架") || p.role_zh.includes("綠籬") || p.tier === "T")) {
      score += 18; reasons_zh.push("遮蔽屏障"); reasons_en.push("Screening");
    }
    if (goals.includes("edible") && (p.supports_zh.some(s => /可食|食/.test(s)) || p.id === "alpinia" || p.id === "mulberry_sm")) {
      score += 16; reasons_zh.push("可食/花藝"); reasons_en.push("Edible/floral");
    }
    if (goals.includes("easy") && p.water === "low") { score += 14; reasons_zh.push("低維護"); reasons_en.push("Low maintenance"); }

    // Small diversity bonus — keeps borderline candidates on the list
    score += 4;

    // ── Explicit user preferences (👍 / 👎) — auditable nudge, not a black-box rerank.
    //    Magnitudes are deliberately modest so native filter / water tier / space match
    //    still dominate. The reason is appended to reasons_zh/en so the user can see
    //    exactly why a card moved up or down — and can reverse it via "清除偏好".
    if (liked[p.id])    { score += 12; reasons_zh.push("你標為喜歡"); reasons_en.push("You liked this"); }
    if (disliked[p.id]) { score -= 15; reasons_zh.push("你標為不喜歡"); reasons_en.push("You disliked this"); }
    // 📌 Pinned — a hard commit. +50 swamps space/water/zone mismatches so the
    // plant rises into the recs even if it's an awkward fit. buildLayers() also
    // force-includes pinned plants into their tier slot below. Reason is shown
    // first so the user understands why the card is at the top.
    if (pinned[p.id])   { score += 50; reasons_zh.unshift("📌 你已釘選"); reasons_en.unshift("📌 Pinned by you"); }

    score = Math.max(0, Math.min(99, score + 8));
    return { ...p, score, reasons_zh, reasons_en };
  }).sort((a, b) => b.score - a.score);
}

// ── Preference helpers — toggling 👍/👎 is mutually exclusive.
//    Clicking the same kind again clears it (so a tap is fully reversible).
//    After updating, we save the snapshot (which now includes prefs) and re-render.
function setPref(id, kind) {
  if (!state.prefs) state.prefs = { liked: {}, disliked: {}, pinned: {} };
  if (!state.prefs.liked) state.prefs.liked = {};
  if (!state.prefs.disliked) state.prefs.disliked = {};
  if (!state.prefs.pinned) state.prefs.pinned = {};
  // 📌 Pin is an independent toggle — it doesn't conflict with like/dislike
  // (you might pin a plant you also like; you wouldn't normally pin one you
  // dislike, but the UI doesn't forbid it). Tap the pin again to unpin.
  if (kind === "pin") {
    if (state.prefs.pinned[id]) delete state.prefs.pinned[id];
    else state.prefs.pinned[id] = true;
  } else {
    const currentlyLiked = !!state.prefs.liked[id];
    const currentlyDisliked = !!state.prefs.disliked[id];
    // Always clear both first — like/dislike are mutually exclusive.
    delete state.prefs.liked[id];
    delete state.prefs.disliked[id];
    if (kind === "like" && !currentlyLiked) state.prefs.liked[id] = true;
    if (kind === "dislike" && !currentlyDisliked) state.prefs.disliked[id] = true;
  }
  // Persist + reflect in URL hash so the preference travels with the design.
  saveToLocal();
  try { pushHashFromState(); } catch (e) {}
  // Re-render the result page so the new score order + chip count update everywhere.
  if (state.view === "wizard" && state.step === 5) {
    initShoppingQty();
    renderResult();
    applyLanguage();
  } else {
    // Drawer / dictionary contexts — just re-render the host of the active tab if present.
    try {
      const recs = scorePlants().filter(p => p.score >= 30);
      const host = document.getElementById("tabPanel");
      if (host && state.resultTab === "dict") { host.innerHTML = renderDictionary(); wireDictionary(); applyLanguage(); }
    } catch (e) {}
  }
}

function clearPrefs() {
  state.prefs = { liked: {}, disliked: {}, pinned: {} };
  saveToLocal();
  try { pushHashFromState(); } catch (e) {}
  if (state.view === "wizard" && state.step === 5) {
    initShoppingQty();
    renderResult();
    applyLanguage();
  }
}

// Count how many of the top-N recs were actually nudged by user prefs —
// surfaced in the result-page note so the user can see the impact at a glance.
function prefImpactCount(recs) {
  const liked = (state.prefs && state.prefs.liked) || {};
  const disliked = (state.prefs && state.prefs.disliked) || {};
  const pinned = (state.prefs && state.prefs.pinned) || {};
  return (recs || []).slice(0, 8).filter(p => liked[p.id] || disliked[p.id] || pinned[p.id]).length;
}
function prefTotalCount() {
  const liked = (state.prefs && state.prefs.liked) || {};
  const disliked = (state.prefs && state.prefs.disliked) || {};
  const pinned = (state.prefs && state.prefs.pinned) || {};
  return Object.keys(liked).length + Object.keys(disliked).length + Object.keys(pinned).length;
}
function pinnedCount() {
  const pinned = (state.prefs && state.prefs.pinned) || {};
  return Object.keys(pinned).length;
}

// Expose so inline onclick="" handlers in the rec cards can call them.
window.setPref = setPref;
window.clearPrefs = clearPrefs;

// Layer assignment — FIX for original bug: ensure every tier has fallback to *best plant fitting tier*,
// even if the top-5 don't include one. Also, if no plant of a tier fits the space at all, mark it empty.
function buildLayers(scored) {
  const tierMap = {
    T: { tier_zh:"上層 · 喬木/骨架", tier_en:"Upper · Canopy / Frame",     desc_zh:"防風、遮蔭、垂直結構", desc_en:"Windbreak, shade, vertical structure" },
    S: { tier_zh:"中層 · 開花灌木",   tier_en:"Middle · Flowering shrubs",  desc_zh:"生態蜜源、視覺焦點", desc_en:"Pollinator nectar, focal interest" },
    G: { tier_zh:"地被 · 鋪面",       tier_en:"Ground · Cover",             desc_zh:"固土、保濕、底層綠意", desc_en:"Soil retention, moisture, base green" },
    W: { tier_zh:"水景 · 點綴",       tier_en:"Water · Accent",             desc_zh:"水生植物、生物多樣性", desc_en:"Aquatic plants, biodiversity" },
    C: { tier_zh:"藤本 · 立體綠化",   tier_en:"Climber · Vertical green",   desc_zh:"軟化邊界、節省地面", desc_en:"Softens edges, saves ground" },
  };

  // Pick best plant per tier from the scored & space-compatible set.
  // 📌 Pinned plants ALWAYS win their tier slot, even if score < 30 (which
  // can happen for a pinned plant the user knows is awkward but wants anyway —
  // e.g. a balcony user pinning a small tree as a centerpiece). The +50 in
  // scorePlants normally lifts pinned plants above the threshold, but this
  // override is the belt-and-braces guarantee that pin = guaranteed inclusion.
  const pinned = (state.prefs && state.prefs.pinned) || {};
  const compatible = scored.filter((p) => p.score >= 30 || pinned[p.id]);
  const layers = [];
  for (const tier of ["T","S","G","W","C"]) {
    // Prefer a pinned plant for this tier if any exists.
    const pinnedHere = compatible.find((p) => p.tier === tier && pinned[p.id]);
    const best = pinnedHere || compatible.find((p) => p.tier === tier);
    layers.push({
      key: tier,
      ...tierMap[tier],
      plant: best || null,
    });
  }
  // Drop W and C if there's no plant — they're optional tiers; keep T/S/G visible even if empty so user sees what's missing.
  return layers.filter((l) => !(["W","C"].includes(l.key) && !l.plant));
}

// ─────────────────────────────────────────────────────────────
// PERSONAL DASHBOARD — save & restore
//   The user's design IS their dashboard. We save it to:
//     · localStorage (so they see it again on next visit)
//     · URL hash (#d=base64) so bookmarking / sharing the URL works
//   No backend, no account, no tracking.
// ─────────────────────────────────────────────────────────────
const SAVE_KEY = "landscape-copilot-v1";
const HASH_KEY = "d";
// Multi-design dashboard — list of saved designs the user has explicitly kept.
// Each entry: { id, name, snapshot, savedAt }
// SAVE_KEY still holds the *active* (last-touched) design for backward compat
// and is the source of truth for the URL-hash & welcome-back banner.
const LIST_KEY = "landscape-copilot-list-v1";

// The minimal slice of state worth persisting — inputs + view layer toggles.
function snapshotState() {
  return {
    space: state.space, sun: state.sun, water: state.water, goals: state.goals,
    address: state.address, detected: state.detected,
    widthM: state.widthM, depthM: state.depthM, orientation: state.orientation,
    qty: state.qty, nativeOnly: state.nativeOnly,
    // Per-design 👍/👎/📌 — travels with the snapshot so balcony prefs ≠ yard prefs,
    // shared links carry the user's preferences (including pinned must-haves),
    // and "我的設計" entries each remember their own taste.
    prefs: {
      liked:    { ...((state.prefs && state.prefs.liked)    || {}) },
      disliked: { ...((state.prefs && state.prefs.disliked) || {}) },
      pinned:   { ...((state.prefs && state.prefs.pinned)   || {}) },
    },
    savedAt: Date.now(),
  };
}

function applySnapshot(snap) {
  if (!snap || !snap.space) return false;
  state.space = snap.space;
  state.sun = snap.sun || "part";
  state.water = snap.water || "med";
  state.goals = Array.isArray(snap.goals) ? snap.goals : [];
  state.address = snap.address || "";
  state.detected = snap.detected || null;
  state.widthM = snap.widthM ?? SPACE_DEFAULTS[snap.space].w;
  state.depthM = snap.depthM ?? SPACE_DEFAULTS[snap.space].d;
  state.orientation = snap.orientation || "S";
  state.qty = (snap.qty && typeof snap.qty === "object") ? snap.qty : {};
  state.nativeOnly = !!snap.nativeOnly;
  // Restore per-design 👍/👎/📌. Older snapshots without `prefs.pinned` load empty.
  state.prefs = {
    liked:    (snap.prefs && snap.prefs.liked    && typeof snap.prefs.liked    === "object") ? { ...snap.prefs.liked }    : {},
    disliked: (snap.prefs && snap.prefs.disliked && typeof snap.prefs.disliked === "object") ? { ...snap.prefs.disliked } : {},
    pinned:   (snap.prefs && snap.prefs.pinned   && typeof snap.prefs.pinned   === "object") ? { ...snap.prefs.pinned }   : {},
  };
  state.savedAt = snap.savedAt || Date.now();
  return true;
}

function saveToLocal() {
  try { localStorage.setItem(SAVE_KEY, JSON.stringify(snapshotState())); } catch (e) {}
}

function loadFromLocal() {
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    return raw ? JSON.parse(raw) : null;
  } catch (e) { return null; }
}

function clearLocal() {
  try { localStorage.removeItem(SAVE_KEY); } catch (e) {}
}

// ─────────────────────────────────────────────────────────────
// Multi-design dashboard ("我的設計") — a NAMED list of designs.
// Storage shape: { designs: [{id, name, snapshot, savedAt}], activeId }
// One slot in SAVE_KEY remains the active design (URL-hash truth);
// LIST_KEY holds zero or more explicitly-kept designs the user wants
// to compare or return to later (e.g. balcony vs yard).
// ─────────────────────────────────────────────────────────────
function loadDesignList() {
  try {
    const raw = localStorage.getItem(LIST_KEY);
    if (!raw) return { designs: [], activeId: null };
    const parsed = JSON.parse(raw);
    if (!parsed || !Array.isArray(parsed.designs)) return { designs: [], activeId: null };
    return parsed;
  } catch (e) { return { designs: [], activeId: null }; }
}

function saveDesignList(list) {
  try { localStorage.setItem(LIST_KEY, JSON.stringify(list)); } catch (e) {}
}

// Build a default name from snapshot: "陽台 · 6.2 m² · 2026-06-19"
function defaultDesignName(snap) {
  if (!snap) return "未命名設計";
  const space = spaceZh(snap.space);
  const w = Number(snap.widthM || 0), d = Number(snap.depthM || 0);
  const area = (w * d).toFixed(1);
  const dt = new Date(snap.savedAt || Date.now());
  const y = dt.getFullYear();
  const m = String(dt.getMonth() + 1).padStart(2, "0");
  const day = String(dt.getDate()).padStart(2, "0");
  return `${space} · ${area} m² · ${y}-${m}-${day}`;
}

// Pseudo-unique id for a design entry.
function makeDesignId() {
  return "d_" + Date.now().toString(36) + "_" + Math.random().toString(36).slice(2, 7);
}

// Persist the *current* state as a NEW entry in the named list.
// Returns the new entry id. Does not change the URL hash or SAVE_KEY semantics.
function saveCurrentAsNewDesign(customName) {
  const snap = snapshotState();
  const id = makeDesignId();
  const entry = {
    id,
    name: (customName && customName.trim()) || defaultDesignName(snap),
    snapshot: snap,
    savedAt: snap.savedAt || Date.now(),
  };
  const list = loadDesignList();
  list.designs.unshift(entry);
  list.activeId = id;
  saveDesignList(list);
  return id;
}

// Overwrite an existing entry with the current state (used when user is
// continuing to edit an "active" entry from the dashboard list).
function updateActiveDesignEntry() {
  const list = loadDesignList();
  if (!list.activeId) return;
  const idx = list.designs.findIndex(e => e.id === list.activeId);
  if (idx < 0) return;
  const snap = snapshotState();
  list.designs[idx].snapshot = snap;
  list.designs[idx].savedAt = snap.savedAt || Date.now();
  saveDesignList(list);
}

function setActiveDesignId(id) {
  const list = loadDesignList();
  list.activeId = id;
  saveDesignList(list);
}

function deleteDesignById(id) {
  const list = loadDesignList();
  list.designs = list.designs.filter(e => e.id !== id);
  if (list.activeId === id) list.activeId = null;
  saveDesignList(list);
}

function renameDesign(id, newName) {
  const list = loadDesignList();
  const entry = list.designs.find(e => e.id === id);
  if (!entry) return;
  entry.name = (newName && newName.trim()) || entry.name;
  saveDesignList(list);
}

function loadDesignById(id) {
  const list = loadDesignList();
  return list.designs.find(e => e.id === id) || null;
}

// URL hash encoding — base64-encoded JSON. Used for sharing / bookmarking.
function encodeHashFromState() {
  try {
    const s = JSON.stringify(snapshotState());
    return btoa(encodeURIComponent(s));
  } catch (e) { return ""; }
}

function decodeHash(hash) {
  try {
    if (!hash) return null;
    const m = hash.match(new RegExp(`#?${HASH_KEY}=([^&]+)`));
    if (!m) return null;
    return JSON.parse(decodeURIComponent(atob(m[1])));
  } catch (e) { return null; }
}

function pushHashFromState() {
  const enc = encodeHashFromState();
  if (enc) {
    const url = `${location.pathname}#${HASH_KEY}=${enc}`;
    history.replaceState(null, "", url);
  }
}

// On result page reach, save to localStorage + bump URL hash so a bookmark works.
// Guard: when the user is *viewing* a friend's shared design but hasn't committed to it,
// we must NOT overwrite their saved local design. The conflict banner's "Save as my new
// design" button is the explicit opt-in path that does write.
function persistDashboard() {
  if (!state.viewingShared) {
    saveToLocal();
    // Keep the active named-list entry in sync as the user edits.
    // (Only updates if there *is* an activeId — initial visits won't auto-create
    // an entry until the user explicitly hits "另存為新設計".)
    updateActiveDesignEntry();
  }
  pushHashFromState();
}

// Compare two snapshots on the fields that constitute a "design".
// Returns true when the meaningful inputs differ — savedAt and qty drift alone don't count.
function snapshotsDiffer(a, b) {
  if (!a || !b) return !!(a || b);
  const norm = (s) => JSON.stringify({
    space: s.space || "",
    sun: s.sun || "",
    water: s.water || "",
    goals: Array.isArray(s.goals) ? [...s.goals].sort() : [],
    address: s.address || "",
    widthM: s.widthM ?? null,
    depthM: s.depthM ?? null,
    orientation: s.orientation || "",
    nativeOnly: !!s.nativeOnly,
  });
  return norm(a) !== norm(b);
}

// On boot: check URL hash first (shared link), then localStorage.
//   • Hash only → apply, jump to result (sharer's first-time link or your own bookmark).
//   • Local only → stay on home, show welcome-back banner.
//   • Hash + identical local → apply hash silently (re-opening your own shared link).
//   • Hash + DIFFERENT local → STOP. Don't clobber. Show a conflict UI so the user
//     can choose: View shared / Keep mine / Save shared as a copy. This prevents
//     silent data loss when a friend's link arrives on top of your existing design.
function tryRestoreDashboard() {
  const fromHash = decodeHash(location.hash);
  const fromLocal = loadFromLocal();

  if (fromHash && fromLocal && snapshotsDiffer(fromHash, fromLocal)) {
    // Conflict — don't touch storage, don't change view. Let the homepage banner ask.
    state.pendingSharedSnapshot = fromHash;
    state.pendingSnapshot = fromLocal;
    state.shareConflict = true;
    state.restoredFrom = "conflict";
    return true;
  }

  if (fromHash) {
    applySnapshot(fromHash);
    state.view = "wizard";
    state.step = 5;
    state.resultTab = "preview";
    state.restoredFrom = "hash";
    initShoppingQty();
    return true;
  }
  if (fromLocal) {
    // Don't auto-jump to result on localStorage restore — show banner on home offering to resume.
    state.pendingSnapshot = fromLocal;
    state.restoredFrom = "local";
    return true;
  }
  return false;
}

// One-line human summary of a snapshot — used in the conflict banner's compare cards.
function summarizeSnapshot(s) {
  if (!s) return "—";
  const space = spaceZh(s.space);
  const area = (Number(s.widthM || 0) * Number(s.depthM || 0)).toFixed(1);
  const sunMap = { full: "全日照", part: "半日照", shade: "遮蔭" };
  const sunMapEn = { full: "Full sun", part: "Part sun", shade: "Shade" };
  const sun = state.lang === "zh" ? (sunMap[s.sun] || "") : (sunMapEn[s.sun] || "");
  return `${space} · ${area} m²${sun ? " · " + sun : ""}`;
}

// Welcome-back banner on the homepage when localStorage has a saved design.
// If a shared-link conflict was detected, render that instead — same slot, higher stakes.
function renderWelcomeBackBanner() {
  if (state.shareConflict) return renderShareConflictBanner();
  if (!state.pendingSnapshot) return "";
  const s = state.pendingSnapshot;
  const spaceLabel = spaceZh(s.space);
  const area = (s.widthM * s.depthM).toFixed(1);
  const ago = humanizeTimeAgo(s.savedAt);
  return `
    <div class="welcome-back" id="welcomeBack">
      <span class="icon">🌿</span>
      <div class="text">
        <strong data-zh="歡迎回來！" data-en="Welcome back!">歡迎回來！</strong>
        <span class="sub" data-zh="${ago} 前你規劃了 ${spaceLabel} · ${area} m² 的景觀，要繼續編輯嗎？"
                          data-en="You saved a ${spaceLabel} · ${area} m² design ${ago} ago. Continue?">
              ${ago} 前你規劃了 ${spaceLabel} · ${area} m² 的景觀，要繼續編輯嗎？
        </span>
      </div>
      <div class="actions">
        <button class="primary" id="resumeBtn"><span data-zh="繼續使用" data-en="Resume">繼續使用</span></button>
        <button id="discardBtn"><span data-zh="重新開始" data-en="Start fresh">重新開始</span></button>
      </div>
    </div>`;
}

// Shared-link conflict banner — appears when a friend's #d= URL arrives over your own saved design.
// Three explicit choices, no silent clobber. Uses textContent-safe interpolation since
// summarizeSnapshot output may include user-typed address.
function renderShareConflictBanner() {
  const shared = state.pendingSharedSnapshot;
  const local = state.pendingSnapshot;
  const sharedSummary = summarizeSnapshot(shared);
  const localSummary = summarizeSnapshot(local);
  const localAgo = humanizeTimeAgo(local && local.savedAt);
  // Escape for safe insertion into HTML — these strings include user-entered fields like address indirectly.
  const esc = (s) => String(s).replace(/[&<>"']/g, (c) => ({
    "&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"
  })[c]);
  return `
    <div class="share-conflict" id="shareConflict" role="alertdialog" aria-labelledby="scTitle" aria-describedby="scBody">
      <div class="sc-head">
        <span class="icon" aria-hidden="true">🔗</span>
        <strong id="scTitle" data-zh="有人分享了一個設計給你" data-en="A shared design has arrived">有人分享了一個設計給你</strong>
      </div>
      <p class="sc-body" id="scBody"
         data-zh="這個分享連結含有與你目前儲存的設計不同的方案。為了不覆蓋你的成果，先請你選擇下一步。"
         data-en="This link carries a design different from the one you have saved. To avoid overwriting your work, pick what to do next.">
         這個分享連結含有與你目前儲存的設計不同的方案。為了不覆蓋你的成果，先請你選擇下一步。
      </p>
      <div class="sc-compare" aria-hidden="false">
        <div class="sc-card">
          <span class="label" data-zh="你目前的設計" data-en="Your saved design">你目前的設計</span>
          <span class="summary">${esc(localSummary)}</span>
          <span class="meta" data-zh="${esc(localAgo)} 前儲存" data-en="saved ${esc(localAgo)} ago">${esc(localAgo)} 前儲存</span>
        </div>
        <div class="sc-card">
          <span class="label" data-zh="分享連結內的設計" data-en="Design in the shared link">分享連結內的設計</span>
          <span class="summary">${esc(sharedSummary)}</span>
          <span class="meta" data-zh="僅在此分頁開啟，尚未儲存" data-en="open in this tab only, not yet saved">僅在此分頁開啟，尚未儲存</span>
        </div>
      </div>
      <div class="sc-actions">
        <button class="primary" id="scViewSharedBtn"><span data-zh="查看分享的設計" data-en="View shared design">查看分享的設計</span></button>
        <button id="scKeepMineBtn"><span data-zh="保留我的，丟掉分享連結" data-en="Keep mine, drop the link">保留我的，丟掉分享連結</span></button>
        <button id="scSaveCopyBtn"><span data-zh="把分享的存成我的新設計" data-en="Save shared as my new design">把分享的存成我的新設計</span></button>
      </div>
    </div>`;
}

function humanizeTimeAgo(ts) {
  if (!ts) return "?";
  const diffMs = Date.now() - ts;
  const min = Math.floor(diffMs / 60000);
  if (min < 60) return state.lang === "zh" ? `${min} 分鐘` : `${min} min`;
  const hr = Math.floor(min / 60);
  if (hr < 24) return state.lang === "zh" ? `${hr} 小時` : `${hr} hr`;
  const d = Math.floor(hr / 24);
  return state.lang === "zh" ? `${d} 天` : `${d} d`;
}

// "我的設計" — list of named saved designs on the homepage.
// Distinct from the implicit single-slot SAVE_KEY (which is the welcome-back
// resume target). The list lets users keep balcony + yard + office designs
// side-by-side and resume any of them.
function renderMyDesignsSection() {
  const list = loadDesignList();
  if (!list.designs.length) {
    // Only show the empty-state hint if user has at least the single SAVE_KEY snapshot
    // (otherwise it's noise on first visit). The pendingSnapshot path means user has
    // ONE saved design but hasn't yet promoted it to a named entry.
    if (!state.pendingSnapshot) return "";
    return `
      <div class="my-designs-section">
        <div class="my-designs-head">
          <h2 data-zh="我的設計 · My Designs" data-en="My Designs">我的設計 · My Designs</h2>
        </div>
        <div class="my-design-empty"
             data-zh="還沒儲存任何具名設計。在生成的結果頁面點「💾 另存為新設計」即可開始累積。例如：陽台 + 庭院 + 辦公室 三組設計可以同時保存。"
             data-en="No named designs yet. On any result page, tap '💾 Save as a new design' to start your portfolio — e.g. one for the balcony, one for the yard, one for the office.">
             還沒儲存任何具名設計。在生成的結果頁面點「💾 另存為新設計」即可開始累積。
        </div>
      </div>`;
  }
  return `
    <div class="my-designs-section">
      <div class="my-designs-head">
        <h2 data-zh="我的設計 · My Designs" data-en="My Designs">我的設計 · My Designs</h2>
        <span class="count"
              data-zh="共 ${list.designs.length} 個"
              data-en="${list.designs.length} saved">共 ${list.designs.length} 個</span>
      </div>
      <div class="my-designs-grid">
        ${list.designs.map((entry) => {
          const isActive = entry.id === list.activeId;
          const ago = humanizeTimeAgo(entry.savedAt);
          return `
            <div class="my-design-card ${isActive ? "active" : ""}" data-design-id="${escapeHtml(entry.id)}">
              <div class="my-design-swatch">🌿</div>
              <div class="my-design-body">
                <div class="my-design-name">${escapeHtml(entry.name)}</div>
                <div class="my-design-meta"
                     data-zh="${ago} 前儲存"
                     data-en="Saved ${ago} ago">${ago} 前儲存</div>
              </div>
              <div class="my-design-actions">
                <button data-design-rename="${escapeHtml(entry.id)}" title="${t('重新命名','Rename')}">✎</button>
                <button class="del" data-design-delete="${escapeHtml(entry.id)}" title="${t('刪除','Delete')}">🗑</button>
              </div>
            </div>`;
        }).join("")}
      </div>
    </div>`;
}

function wireMyDesignsSection() {
  document.querySelectorAll(".my-design-card").forEach((card) => {
    card.addEventListener("click", (e) => {
      // Ignore clicks on the action buttons
      if (e.target.closest("button")) return;
      const id = card.dataset.designId;
      resumeDesignById(id);
    });
  });
  document.querySelectorAll("[data-design-rename]").forEach((btn) => {
    btn.addEventListener("click", (e) => {
      e.stopPropagation();
      const id = btn.dataset.designRename;
      const entry = loadDesignById(id);
      if (!entry) return;
      const newName = prompt(t("重新命名這個設計：", "Rename this design:"), entry.name);
      if (newName !== null) {
        renameDesign(id, newName);
        renderHome();
        applyLanguage();
      }
    });
  });
  document.querySelectorAll("[data-design-delete]").forEach((btn) => {
    btn.addEventListener("click", (e) => {
      e.stopPropagation();
      const id = btn.dataset.designDelete;
      const entry = loadDesignById(id);
      if (!entry) return;
      if (confirm(t(`確定刪除「${entry.name}」？此操作無法復原。`, `Delete "${entry.name}"? This can't be undone.`))) {
        deleteDesignById(id);
        renderHome();
        applyLanguage();
      }
    });
  });
}

// Resume a saved design — copy its snapshot into state and jump to the result page.
function resumeDesignById(id) {
  const entry = loadDesignById(id);
  if (!entry) return;
  applySnapshot(entry.snapshot);
  setActiveDesignId(id);
  state.pendingSnapshot = null;
  // Critic round-5 catch: don't let the previous design's photo + AI suggestions
  // leak into the resumed one (balcony photo following user into a yard design).
  state.wizardPhotoDataUrl = null;
  state.wizardPhotoSuggest = {};
  state.wizardPhotoSuggestActed = {};
  state.wizardPhotoOpen = {};
  state.wizardPhotoBusy = {};
  state.wizardPhotoError = {};
  state.viewingShared = false;
  state.view = "wizard";
  state.step = 5;
  state.resultTab = "preview";
  initShoppingQty();
  // Reapply any qty the snapshot saved
  if (entry.snapshot.qty && typeof entry.snapshot.qty === "object") {
    state.qty = { ...state.qty, ...entry.snapshot.qty };
  }
  render();
  window.scrollTo({ top: 0, behavior: "smooth" });
}

// Small ephemeral toast — used when the user saves a design.
function showSaveToast(msgZh, msgEn) {
  const el = document.createElement("div");
  el.className = "save-toast";
  el.dataset.zh = msgZh;
  el.dataset.en = msgEn;
  el.textContent = state.lang === "zh" ? msgZh : msgEn;
  document.body.appendChild(el);
  setTimeout(() => { el.style.transition = "opacity .4s"; el.style.opacity = "0"; }, 2400);
  setTimeout(() => { el.remove(); }, 2900);
}

function render() {
  // Top-bar left content switches based on view: brand on home, "← back to home" link elsewhere.
  const tbLeft = document.getElementById("topBarLeft");
  if (state.view === "home") {
    tbLeft.innerHTML = `<span style="font-weight:600; color:var(--sage-deep); letter-spacing:0.02em;" data-zh="🌿 AI Landscape Copilot" data-en="🌿 AI Landscape Copilot">🌿 AI Landscape Copilot</span>`;
  } else {
    tbLeft.innerHTML = `<a href="#" id="backHomeLink" style="color: var(--sage-deep); text-decoration: none; font-weight: 600; font-size: 13px;" data-zh="← 回首頁" data-en="← Home">← 回首頁</a>`;
    document.getElementById("backHomeLink").addEventListener("click", (e) => {
      e.preventDefault();
      state.view = "home";
      render();
      window.scrollTo({ top: 0, behavior: "smooth" });
    });
  }

  // Photo view — its own dedicated flow before optionally jumping to results
  if (state.view === "photo") {
    progressWrap.innerHTML = "";
    document.querySelector("header.brand").style.display = "";
    renderPhotoFlow();
    navFooter.innerHTML = "";
    applyLanguage();
    return;
  }

  // Hide the progress dots and brand header on the homepage so the landing feels clean.
  if (state.view === "home") {
    progressWrap.innerHTML = "";
    document.querySelector("header.brand").style.display = "none";
    renderHome();
    navFooter.innerHTML = "";
    applyLanguage();
    return;
  }

  // Otherwise we're in the wizard / result flow — show progress + brand header again.
  document.querySelector("header.brand").style.display = "";
  progressWrap.innerHTML = state.step < 5 ? STEPS.slice(0,5).map((_, i) =>
    `<div class="progress-dot ${i <= state.step ? "on" : ""}"></div>`).join("") : "";

  switch (state.step) {
    case 0: renderSpace(); break;
    case 1: renderDetails(); break;
    case 2: renderSun(); break;
    case 3: renderWater(); break;
    case 4: renderGoals(); break;
    case 5: renderResult(); break;
  }

  renderNav();
  applyLanguage();
}

  if (viewSharedBtn) {

      // View the shared design without touching localStorage.
      // Keeps the user's saved design safe — they can return to it later via "Resume" (we still have it).
      // To avoid the result page calling persistDashboard() and overwriting local with the shared one,
      // we leave state.shareConflict on; persistDashboard() honors it as a guard.
      const shared = state.pendingSharedSnapshot;
      applySnapshot(shared);
      // Important: don't clear pendingSnapshot; the user might still want to keep theirs after viewing.
      state.view = "wizard";
      state.step = 5;
      state.resultTab = "preview";
      state.viewingShared = true;            // Banner on result page will say "viewing shared, not saved".
      initShoppingQty();
      render();
      window.scrollTo({ top: 0, behavior: "smooth" });
    });
  }
  const keepMineBtn = document.getElementById("scKeepMineBtn");
  if (keepMineBtn) {
    keepMineBtn.addEventListener("click", () => {
      // Drop the shared link, restore the welcome-back banner offering to resume the local design.
      state.pendingSharedSnapshot = null;
      state.shareConflict = false;
      state.viewingShared = false;
      // Strip the #d= from the URL so a refresh won't re-trigger the conflict.
      history.replaceState(null, "", location.pathname);
      render();
    });
  }
  const saveCopyBtn = document.getElementById("scSaveCopyBtn");
  if (saveCopyBtn) {
    saveCopyBtn.addEventListener("click", () => {
      // Replace the local design with the shared one and open the result page.
      // This is a destructive choice — the user explicitly opted in.
      const shared = state.pendingSharedSnapshot;
      applySnapshot(shared);
      state.pendingSharedSnapshot = null;
      state.pendingSnapshot = null;

      state.step = 5;
      state.resultTab = "preview";
      initShoppingQty();
      render();
      window.scrollTo({ top: 0, behavior: "smooth" });
    });
  }

function spaceZh(k) { return ({ balcony:"陽台", rooftop:"頂樓", yard:"庭院 / 中庭", indoor:"室內窗邊" })[k] || "陽台"; }
function spaceEn(k) { return ({ balcony:"Balcony", rooftop:"Rooftop", yard:"Yard / Courtyard", indoor:"Indoor / Window" })[k] || "Balcony"; }
function sunZh(k)   { return ({ full:"全日照（6h+）", part:"半日照（3-5h）", shade:"遮陰（散射光）" })[k] || "半日照"; }

function wirePhotoFlow() {
  // File picker
  const fileInput = document.getElementById("photoInput");
  if (fileInput) {
    fileInput.addEventListener("change", (e) => {
      const f = e.target.files[0];
      if (f) handlePhotoFile(f);
    });
  }
  // Drag-and-drop on the dropzone
  const dz = document.getElementById("dropzone");
  if (dz) {
    ["dragenter","dragover"].forEach(ev => dz.addEventListener(ev, (e) => { e.preventDefault(); dz.classList.add("drag"); }));
    ["dragleave","dragend","drop"].forEach(ev => dz.addEventListener(ev, (e) => { e.preventDefault(); dz.classList.remove("drag"); }));
    dz.addEventListener("drop", (e) => { e.preventDefault(); const f = e.dataTransfer.files[0]; if (f) handlePhotoFile(f); });
  }

  // Re-upload
  const reupload = document.getElementById("reuploadBtn");
  if (reupload) {
    reupload.addEventListener("click", () => {
      state.photoDataUrl = null;
      state.photoAnalysis = null;
      state.photoStatus = "";
      renderPhotoFlow();
      applyLanguage();
    });
  }

  // Analyze
  const analyze = document.getElementById("analyzeBtn");
  if (analyze) analyze.addEventListener("click", analyzePhoto);

  // Generate with analysis
  const gen = document.getElementById("photoGenerateBtn");
  if (gen) gen.addEventListener("click", () => applyPhotoAnalysisAndGenerate());

  // Tune details first — apply detected and jump to wizard step 1 (details)
  const tune = document.getElementById("photoTuneBtn");
  if (tune) tune.addEventListener("click", () => applyPhotoAnalysisAndTune());
}

// Read the file, downscale to max 1024px wide via canvas, store as data URL.
function handlePhotoFile(file) {
  if (!file.type.startsWith("image/")) {
    state.photoStatus = t("不支援的檔案格式 — 請選擇圖片", "Unsupported file — pick an image");
    state.photoStatusKind = "err";
    renderPhotoFlow(); applyLanguage();
    return;
  }
  const reader = new FileReader();
  reader.onload = (e) => {
    const img = new Image();
    img.onload = () => {
      const maxW = 1024;
      const scale = img.width > maxW ? maxW / img.width : 1;
      const w = Math.round(img.width * scale);
      const h = Math.round(img.height * scale);
      const canvas = document.createElement("canvas");
      canvas.width = w; canvas.height = h;
      const ctx = canvas.getContext("2d");
      ctx.drawImage(img, 0, 0, w, h);
      state.photoDataUrl = canvas.toDataURL("image/jpeg", 0.85);
      state.photoStatus = "";
      state.photoStatusKind = "";
      renderPhotoFlow();
      applyLanguage();
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

// Vision-call lifecycle helpers — single in-flight AbortController + 30s timeout
// so the wizard / photo flow can never get stuck on a slow or stalled
// Pollinations response. User-facing Cancel buttons call `cancelVisionRequest`.
const VISION_TIMEOUT_MS = 30_000;
let visionAbort = null;
function startVisionRequest() {
  // If something is already running (shouldn't be, but defensively), abort it.
  if (visionAbort) { try { visionAbort.abort("superseded"); } catch (_) {} }
  const controller = new AbortController();
  const timer = setTimeout(() => { try { controller.abort("timeout"); } catch (_) {} }, VISION_TIMEOUT_MS);
  visionAbort = controller;
  visionAbort._timer = timer;
  return controller;
}
function endVisionRequest(controller) {
  if (controller && controller._timer) clearTimeout(controller._timer);
  if (visionAbort === controller) visionAbort = null;
}
window.cancelVisionRequest = function () {
  if (visionAbort) { try { visionAbort.abort("user_cancel"); } catch (_) {} }
};

// Call Pollinations.ai vision endpoint to analyze the photo and return JSON.
async function analyzePhoto() {
  const btn = document.getElementById("analyzeBtn");
  if (btn) btn.disabled = true;
  state.photoStatus = t("分析中… 約 15-30 秒", "Analyzing… 15-30s");
  state.photoStatusKind = "";
  state.photoBusy = true;
  renderPhotoFlow();
  applyLanguage();

  const systemPrompt = `You are a landscape design assistant in Taiwan analyzing a photo of someone's planting space. Output ONLY valid JSON, no markdown, no commentary. Use this exact schema:
{
  "space": "balcony" | "rooftop" | "yard" | "indoor",
  "sun": "full" | "part" | "shade",
  "estimated_width_m": number,
  "estimated_depth_m": number,
  "orientation_guess": "N" | "E" | "S" | "W" | "unknown",
  "coastal": true | false,
  "observations": "1-2 short sentences in Traditional Chinese describing what you see — current condition, existing plants if any, any concerns."
}`;
  const userPrompt = `Analyze this photo of a planting space in Taiwan and respond with ONLY the JSON object.`;

  const controller = startVisionRequest();
  try {
    const resp = await fetch("https://text.pollinations.ai/openai", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      signal: controller.signal,
      body: JSON.stringify({
        model: "openai",
        messages: [
          { role: "system", content: systemPrompt },
          { role: "user", content: [
            { type: "text", text: userPrompt },
            { type: "image_url", image_url: { url: state.photoDataUrl } },
          ]},
        ],
        response_format: { type: "json_object" },
      }),
    });
    if (!resp.ok) throw new Error("API " + resp.status);
    const data = await resp.json();
    const text = data?.choices?.[0]?.message?.content || "";
    // Try to extract JSON even if wrapped in code fences
    const jsonText = (text.match(/\{[\s\S]*\}/) || [text])[0];
    const parsed = JSON.parse(jsonText);
    state.photoAnalysis = parsed;
    state.photoStatus = t("✓ 分析完成", "✓ Analysis complete");
    state.photoStatusKind = "ok";
    state.photoBusy = false;
    renderPhotoFlow();
    applyLanguage();
  } catch (err) {
    state.photoBusy = false;
    const reason = controller.signal.reason;
    if (reason === "user_cancel") {
      state.photoStatus = t("已取消分析", "Analysis cancelled");
      state.photoStatusKind = "err";
    } else if (reason === "timeout") {
      state.photoStatus = t("AI 回應太久 — 可重試或改用「回答問題」流程", "AI took too long — retry or use the questions wizard");
      state.photoStatusKind = "err";
    } else {
      state.photoStatus = t("分析失敗 — 可改用「回答問題」流程", "Analysis failed — try the questions wizard");
      state.photoStatusKind = "err";
    }
    renderPhotoFlow();
    applyLanguage();
  } finally {
    endVisionRequest(controller);
  }
}

function renderDetectedChips(det) {
  if (!det) return `<span class="detected-chip muted">${t("未指定區域 → 將使用 中部 · 溫和 預設","No region → defaults to Central · moderate")}</span>`;
  const zoneLabel = state.lang === "zh" ? ZONE_LABEL[det.zone].zh : ZONE_LABEL[det.zone].en;
  const pieces = [];
  if (det.display) {
    pieces.push(`<span class="detected-chip">📍 ${escapeHtml(det.display)}</span>`);
  } else if (det.county) {
    pieces.push(`<span class="detected-chip">📍 ${det.county}（${zoneLabel}）</span>`);
  } else {
    pieces.push(`<span class="detected-chip">🌏 ${zoneLabel}</span>`);
  }
  if (det.lat != null && det.lng != null) {
    pieces.push(`<span class="detected-chip muted">${det.lat.toFixed(3)}, ${det.lng.toFixed(3)}</span>`);
  }
  if (det.coastal) {
    pieces.push(`<span class="detected-chip coastal">🌊 ${t("近海岸 · 偏好耐鹽植物","Coastal · prefer salt-tolerant")}</span>`);
  }
  return pieces.join("");
}

function setAddrStatus(text, kind = "") {

  el.textContent = text || "";
}

// Pull a usable Taiwan county name from Nominatim address details.
// Nominatim sometimes returns city / county / state — try each.
function pickCountyFromAddress(addr) {
  if (!addr) return null;
  // Try common Nominatim address fields, in order of specificity for Taiwan ROC areas.
  const candidates = [addr.county, addr.city, addr.state, addr.region, addr.province];
  for (const c of candidates) {
    if (!c) continue;
    for (const key of Object.keys(COUNTY_ZONES)) {
      if (c.includes(key)) return { county: key, zone: COUNTY_ZONES[key] };
    }
  }
  return null;
}

async function geocodeAddress(query) {
  const url = `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(query)}&countrycodes=tw&format=jsonv2&addressdetails=1&limit=1&accept-language=zh-TW,en`;
  const resp = await fetch(url, { headers: { "Accept": "application/json" } });
  if (!resp.ok) throw new Error("Nominatim " + resp.status);
  const arr = await resp.json();
  if (!arr.length) return null;
  return arr[0];
}

async function reverseGeocode(lat, lng) {
  const url = `https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=jsonv2&addressdetails=1&accept-language=zh-TW,en`;
  const resp = await fetch(url, { headers: { "Accept": "application/json" } });
  if (!resp.ok) throw new Error("Nominatim " + resp.status);
  return await resp.json();
}

function buildDetectedFromNominatim(result) {
  if (!result) return null;
  const lat = parseFloat(result.lat);
  const lng = parseFloat(result.lon);
  const cz = pickCountyFromAddress(result.address) || { county: null, zone: "C" };
  // Coastal heuristic: any coastal keyword in display_name or in any address part
  const allText = (result.display_name || "") + " " +
                  Object.values(result.address || {}).join(" ");
  const coastal = COASTAL_KEYWORDS.some(k => allText.includes(k));
  const display = (result.address?.suburb || result.address?.town || result.address?.village || result.address?.city_district || "") +
                  (cz.county ? (result.address?.suburb || result.address?.town ? "·" : "") + cz.county : "");
  return {
    county: cz.county,
    zone: cz.zone,
    coastal,
    lat: isFinite(lat) ? lat : null,
    lng: isFinite(lng) ? lng : null,
    display: display.trim() || result.display_name?.split(",").slice(0, 2).join(",").trim() || null,
  };
}

// ── COMPASS — live orientation detection via DeviceOrientation API ──
// Lets the user point their phone at their garden and read off the
// cardinal direction directly, instead of guessing N/E/S/W.
function compassCardinalFromHeading(h) {
  if (h == null) return { dir: "?", zh: "—", en: "—" };
  // 8-way snapping for display, 4-way snapping for state.orientation
  if (h < 22.5 || h >= 337.5) return { dir: "N", zh: "正北", en: "North" };
  if (h < 67.5)  return { dir: "N", zh: "東北", en: "Northeast" };
  if (h < 112.5) return { dir: "E", zh: "正東", en: "East" };
  if (h < 157.5) return { dir: "E", zh: "東南", en: "Southeast" };
  if (h < 202.5) return { dir: "S", zh: "正南", en: "South" };
  if (h < 247.5) return { dir: "S", zh: "西南", en: "Southwest" };
  if (h < 292.5) return { dir: "W", zh: "正西", en: "West" };
  return { dir: "W", zh: "西北", en: "Northwest" };
}

// 4-way cardinal for the orientation buttons (we only have N/E/S/W slots).
function compassFourWay(h) {
  if (h == null) return "S";
  if (h < 45 || h >= 315) return "N";
  if (h < 135) return "E";
  if (h < 225) return "S";
  return "W";
}

function wireCompass() {
  // Apply button — snap to N/E/S/W and write to state.orientation
  document.getElementById("compassApplyBtn")?.addEventListener("click", () => {
    if (state.compassHeading == null) return;
    state.orientation = compassFourWay(state.compassHeading);
    stopCompass();
    state.compassOpen = false;
    renderDetails(); wireDetails(); applyLanguage();
  });
  // Close
  document.getElementById("compassCloseBtn")?.addEventListener("click", () => {
    stopCompass();
    state.compassOpen = false;

}

// Permission flow (iOS 13+ requires explicit request)
async function openCompass() {
  state.compassOpen = true;
  state.compassError = null;
  state.compassHeading = null;
  renderDetails(); wireDetails(); applyLanguage();

  if (typeof DeviceOrientationEvent === "undefined") {
    state.compassError = "not_supported";
    renderDetails(); wireDetails(); applyLanguage();
    return;
  }
  // iOS Safari permission gate
  if (typeof DeviceOrientationEvent.requestPermission === "function") {
    try {
      const permission = await DeviceOrientationEvent.requestPermission();
      if (permission !== "granted") {
        state.compassError = "permission_denied";
        renderDetails(); wireDetails(); applyLanguage();
        return;
      }
    } catch (e) {
      state.compassError = "permission_denied";
      renderDetails(); wireDetails(); applyLanguage();
      return;
    }
  }
  startCompassListener();
}

function startCompassListener() {
  if (state.compassListening) return;
  state.compassListening = true;
  // Prefer the absolute (true compass) event when available, fall back to relative
  window.addEventListener("deviceorientationabsolute", handleOrientation, true);
  window.addEventListener("deviceorientation", handleOrientation, true);
  // Watchdog: if no data after 2.5s, surface a sensor warning
  setTimeout(() => {
    if (state.compassOpen && state.compassHeading == null && !state.compassError) {
      state.compassError = "no_data";
      renderDetails(); wireDetails(); applyLanguage();
    }
  }, 2500);
}

function stopCompass() {
  window.removeEventListener("deviceorientationabsolute", handleOrientation, true);
  window.removeEventListener("deviceorientation", handleOrientation, true);
  state.compassListening = false;
}

function handleOrientation(event) {
  // iOS Safari uses webkitCompassHeading (0=N, clockwise)
  // Android uses event.alpha (0=device's top points to magnetic N, but increases counter-clockwise on most devices)
  let heading = null;
  if (event.webkitCompassHeading != null) {
    heading = event.webkitCompassHeading;
  } else if (event.alpha != null) {
    // For deviceorientationabsolute, alpha is clockwise from north (Chrome convention)
    // For deviceorientation, it varies — but most devices use the same convention as absolute
    heading = (360 - event.alpha) % 360;
  }
  if (heading == null) return;

  // Smooth via a tiny rolling average to reduce jitter
  const prev = state.compassHeading;
  if (prev != null) {
    // Handle 359 → 1 wraparound
    let delta = heading - prev;
    if (delta > 180) delta -= 360;
    if (delta < -180) delta += 360;
    heading = (prev + delta * 0.3 + 360) % 360;
  }
  state.compassHeading = heading;
  state.compassError = null;

  // Live-update the rose rotation + readout without a full re-render
  const rose = document.getElementById("compassRose");
  if (rose) rose.style.transform = `rotate(${-heading}deg)`;
  const readout = document.getElementById("compassReadout");
  if (readout) {
    const card = compassCardinalFromHeading(heading);
    readout.innerHTML = `<span data-zh="${card.zh}" data-en="${card.en}">${state.lang === "zh" ? card.zh : card.en}</span><span class="deg">${Math.round(heading)}°</span>`;
  }
  // If we hadn't yet shown the apply button, re-render to add it
  if (!document.getElementById("compassApplyBtn")) {
    renderDetails(); wireDetails(); applyLanguage();
  }
}

function wireEstimator() {
  // Tab switches
  document.querySelectorAll(".est-tab").forEach((el) => {
    el.addEventListener("click", () => {
      state.estimatorTab = el.dataset.estTab;
      const host = document.querySelector(".est-box");
      if (host) host.outerHTML = renderEstimator();
      wireEstimator();
      applyLanguage();
    });
  });

  // References list (refs mode)
  document.querySelectorAll(".est-ref").forEach((el) => {
    el.addEventListener("click", () => {
      state.estRefId = el.dataset.ref;
      document.querySelectorAll(".est-ref").forEach(r => r.classList.toggle("on", r.dataset.ref === state.estRefId));
      refreshEstResult();
    });
  });

  // Input listeners — re-compute the displayed estimate live without re-rendering everything
  const fieldMap = {
    estRefCountW: "estRefCountW", estRefCountD: "estRefCountD",
    estPaceLen: "estPaceLen", estPacesW: "estPacesW", estPacesD: "estPacesD",
    estTileSize: "estTileSize", estTilesW: "estTilesW", estTilesD: "estTilesD",
  };
  for (const [id, key] of Object.entries(fieldMap)) {
    const el = document.getElementById(id);
    if (!el) continue;
    el.addEventListener("input", () => {
      const v = parseFloat(el.value);
      if (!isNaN(v)) state[key] = v;
      refreshEstResult();
    });
  }

  // Apply button — push into widthM/depthM and update the dimension inputs
  document.getElementById("estApplyBtn")?.addEventListener("click", () => {
    const { w, d } = computeEstimate();
    state.widthM = w;
    state.depthM = d;
    const wEl = document.getElementById("widthInput");
    const dEl = document.getElementById("depthInput");
    const aEl = document.getElementById("areaDisplay");
    if (wEl) wEl.value = w;
    if (dEl) dEl.value = d;
    const a = (w * d).toFixed(1);
    if (aEl) { aEl.dataset.zh = `≈ ${a} m² 可用面積`; aEl.dataset.en = `≈ ${a} m² usable area`; aEl.textContent = aEl.dataset[state.lang]; }
    // Close after applying
    state.estimatorOpen = false;
    renderDetails(); wireDetails(); applyLanguage();
  });
}

function computeEstimate() {
  let w = 0, d = 0;
  if (state.estimatorTab === "refs") {
    const r = AREA_REFS.find(x => x.id === state.estRefId) || AREA_REFS[0];
    w = +(r.w * state.estRefCountW).toFixed(2);
    d = +(r.d * state.estRefCountD).toFixed(2);
  } else if (state.estimatorTab === "paces") {
    w = +(state.estPaceLen * state.estPacesW).toFixed(2);
    d = +(state.estPaceLen * state.estPacesD).toFixed(2);
  } else if (state.estimatorTab === "tiles") {
    w = +(state.estTileSize * state.estTilesW).toFixed(2);
    d = +(state.estTileSize * state.estTilesD).toFixed(2);
  }
  return { w, d };
}

function refreshEstResult() {
  const { w, d } = computeEstimate();
  const a = (w * d).toFixed(1);
  const v = document.querySelector(".est-result .val");
  if (v) v.innerHTML = `${w} × ${d} m  <span style="font-weight:400;font-size:13px;opacity:0.7;">· ${a} m²</span>`;
}

function wireDetails() {
  const addrEl = document.getElementById("addressInput");
  const wEl = document.getElementById("widthInput");
  const dEl = document.getElementById("depthInput");
  const areaEl = document.getElementById("areaDisplay");
  const geocodeBtn = document.getElementById("geocodeBtn");
  const geolocateBtn = document.getElementById("geolocateBtn");

  // Address: still do cheap keyword detection on input as the user types — covers offline use.
  let to;
  addrEl.addEventListener("input", (e) => {
    state.address = e.target.value;
    clearTimeout(to);
    to = setTimeout(() => {
      // Only update if we don't already have a real geocoded result (don't overwrite real coordinates with keyword guess)
      if (!state.detected || !state.detected.lat) {
        state.detected = detectLocation(state.address);
        refreshDetectedChips();
      }
    }, 250);
  });

  // 🔍 Look up — forward geocode via Nominatim
  geocodeBtn?.addEventListener("click", async () => {
    const q = (state.address || "").trim();
    if (!q) { setAddrStatus(t("先輸入地址再查詢","Type an address first"), "err"); return; }
    geocodeBtn.disabled = true;
    setAddrStatus(t("查詢中…","Searching…"));
    try {
      const r = await geocodeAddress(q);
      if (!r) {
        state.detected = detectLocation(q);  // fallback to keyword
        refreshDetectedChips();
        setAddrStatus(t("找不到地址 · 已用關鍵字推測","Not found · using keyword guess"), "err");
      } else {
        state.detected = buildDetectedFromNominatim(r);
        refreshDetectedChips();
        setAddrStatus(t("✓ 已定位","✓ Located"), "ok");
      }
    } catch (err) {
      state.detected = detectLocation(q);
      refreshDetectedChips();
      setAddrStatus(t("網路問題 · 已用關鍵字推測","Network issue · using keyword guess"), "err");
    } finally {
      geocodeBtn.disabled = false;
    }
  });

  // 📍 Use my location — browser geolocation + reverse geocode
  geolocateBtn?.addEventListener("click", () => {
    if (!navigator.geolocation) {
      setAddrStatus(t("瀏覽器不支援定位","Browser doesn't support geolocation"), "err");
      return;
    }
    geolocateBtn.disabled = true;
    setAddrStatus(t("取得位置中… 請允許瀏覽器存取","Getting location… please allow access"));
    navigator.geolocation.getCurrentPosition(async (pos) => {
      try {
        const { latitude, longitude } = pos.coords;
        const r = await reverseGeocode(latitude, longitude);
        // reverseGeocode result has the same shape; lat/lon are top-level strings
        r.lat = latitude; r.lon = longitude;
        state.detected = buildDetectedFromNominatim(r);
        state.address = state.detected.display || state.address;
        document.getElementById("addressInput").value = state.address;
        refreshDetectedChips();
        setAddrStatus(t("✓ 已定位","✓ Located"), "ok");
      } catch (err) {
        setAddrStatus(t("反查失敗，請改用「查詢地址」","Reverse-geocode failed — try 'Look up address'"), "err");
      } finally {
        geolocateBtn.disabled = false;
      }
    }, (err) => {
      geolocateBtn.disabled = false;
      const msg = err.code === 1
        ? t("已拒絕定位權限","Location permission denied")
        : t("無法取得位置","Couldn't get location");
      setAddrStatus(msg, "err");
    }, { timeout: 12000, maximumAge: 60_000 });
  });

  // Dimensions: live area update
  function updateArea() {
    const w = parseFloat(wEl.value) || 0;
    const d = parseFloat(dEl.value) || 0;
    state.widthM = w;
    state.depthM = d;
    const a = (w * d).toFixed(1);
    areaEl.dataset.zh = `≈ ${a} m² 可用面積`;
    areaEl.dataset.en = `≈ ${a} m² usable area`;
    areaEl.textContent = areaEl.dataset[state.lang];
  }
  wEl.addEventListener("input", updateArea);
  dEl.addEventListener("input", updateArea);

  // Orientation: 4 buttons
  document.querySelectorAll(".orient-btn").forEach((el) => {
    el.addEventListener("click", () => {
      state.orientation = el.dataset.orient;
      document.querySelectorAll(".orient-btn").forEach((b) => b.classList.toggle("active", b.dataset.orient === state.orientation));
    });
  });

  // Estimator toggle — re-render this step to show/hide the inline tool
  document.getElementById("estToggleBtn")?.addEventListener("click", () => {
    state.estimatorOpen = !state.estimatorOpen;
    renderDetails(); wireDetails(); applyLanguage();
  });

  // If the estimator is currently open, wire its inner controls now
  if (state.estimatorOpen) wireEstimator();

  // Compass toggle — opens the live DeviceOrientation compass UI
  document.getElementById("openCompassBtn")?.addEventListener("click", () => {
    if (state.compassOpen) {
      stopCompass();
      state.compassOpen = false;
      renderDetails(); wireDetails(); applyLanguage();
    } else {
      openCompass();
    }
  });

  // If the compass is currently open, wire its inner controls now
  if (state.compassOpen) wireCompass();

  // Wire the inline photo helper (same one used on Space + Sun)
  wireQPhoto("details");

  // AI photo-suggestion: Apply pushes the AI's estimated width/depth/orientation/coastal
  // into the live form state, then re-renders this step so the inputs visibly update.
  document.getElementById("applyDetailsSuggestBtn")?.addEventListener("click", () => {
    const s = state.wizardPhotoSuggest?.details;
    if (!s) return;
    if (typeof s.widthM === "number" && isFinite(s.widthM) && s.widthM > 0) {
      state.widthM = Math.round(s.widthM * 10) / 10;
    }
    if (typeof s.depthM === "number" && isFinite(s.depthM) && s.depthM > 0) {
      state.depthM = Math.round(s.depthM * 10) / 10;
    }
    if (s.orientation && ["N","E","S","W"].includes(s.orientation)) {
      state.orientation = s.orientation;
    }
    if (s.coastal) {
      // Merge coastal into state.detected without nuking an existing geocoded location.
      state.detected = state.detected
        ? { ...state.detected, coastal: true }
        : { county: null, zone: "C", coastal: true };
    }
    state.wizardPhotoSuggestActed = { ...(state.wizardPhotoSuggestActed || {}), details: "applied" };
    renderDetails(); applyLanguage();
  });

  document.getElementById("dismissDetailsSuggestBtn")?.addEventListener("click", () => {
    state.wizardPhotoSuggestActed = { ...(state.wizardPhotoSuggestActed || {}), details: "dismissed" };
    renderDetails(); applyLanguage();
  });
}

// Human-friendly cardinal label for the AI suggestion banner.
function aiSuggestLabel(stepKey, val) {
  if (val == null) return "";
  if (stepKey === "space") return spaceZh(val);
  if (stepKey === "sun")   return ({ full:"全日照", part:"半日照", shade:"遮陰" })[val] || val;
  return String(val);
}
function aiSuggestLabelEn(stepKey, val) {
  if (val == null) return "";
  if (stepKey === "space") return spaceEn(val);
  if (stepKey === "sun")   return ({ full:"Full sun", part:"Part sun", shade:"Shade" })[val] || val;
  return String(val);
}

// Inline AI suggestion banner above option cards.

  if (!suggested) return "";

    <div class="ai-suggest-row">

// Details step has a structured suggestion (width/depth/orientation/coastal)
// rather than a single key, so it gets its own card with a single Apply button.
// We render this above the form fields so the AI's work from the Space step
// finally surfaces somewhere the user can see and use.
function detailsSuggestBanner() {
  const s = state.wizardPhotoSuggest?.details;
  if (!s) return "";
  const acted = state.wizardPhotoSuggestActed?.details;
  if (acted === "dismissed") return "";

  const ORIENT_ZH = { N:"北 · 日照最少", E:"東 · 晨光柔和", S:"南 · 日照最好", W:"西 · 午後強光" };
  const ORIENT_EN = { N:"N · least sun",  E:"E · soft morning", S:"S · best sun", W:"W · hot afternoon" };

  const w = (typeof s.widthM === "number" && isFinite(s.widthM) && s.widthM > 0) ? s.widthM.toFixed(1) : null;
  const d = (typeof s.depthM === "number" && isFinite(s.depthM) && s.depthM > 0) ? s.depthM.toFixed(1) : null;
  const orient = (s.orientation && ORIENT_ZH[s.orientation]) ? s.orientation : null;
  const coastal = !!s.coastal;

  if (!w && !d && !orient && !coastal) return "";

  if (acted === "applied") {
    return `

             data-en="Edit any field below to override.">
             若要修改任何欄位，直接編輯即可。

      </div>`;

    items.push(`<span class="item"><span class="k" data-zh="尺寸" data-en="Size">尺寸</span><span class="v">${w} × ${d} m</span></span>`);
  } else if (w) {
    items.push(`<span class="item"><span class="k" data-zh="寬" data-en="Width">寬</span><span class="v">${w} m</span></span>`);
  } else if (d) {
    items.push(`<span class="item"><span class="k" data-zh="深" data-en="Depth">深</span><span class="v">${d} m</span></span>`);
  }
  if (orient) {
    items.push(`<span class="item"><span class="k" data-zh="朝向" data-en="Faces">朝向</span><span class="v" data-zh="${ORIENT_ZH[orient]}" data-en="${ORIENT_EN[orient]}">${ORIENT_ZH[orient]}</span></span>`);
  }
  if (coastal) {
    items.push(`<span class="item"><span class="v" data-zh="🌊 近海岸（偏好耐鹽植物）" data-en="🌊 Coastal (prefer salt-tolerant)">🌊 近海岸（偏好耐鹽植物）</span></span>`);
  }

  return `
    <div class="ai-details-suggest" data-details-suggest>
      <div class="hd"><span class="dot"></span>
        <span data-zh="AI 從你的照片估算" data-en="AI estimated from your photo">AI 從你的照片估算</span>
      </div>
      <div class="items">${items.join("")}</div>

        <button type="button" class="apply-btn" id="applyDetailsSuggestBtn">
          <span data-zh="✓ 套用這些建議" data-en="✓ Apply these">✓ 套用這些建議</span>

function wireQPhoto(stepKey) {
  // Toggle
  document.querySelectorAll(`[data-qphoto-toggle="${stepKey}"]`).forEach(el => {
    el.addEventListener("click", () => {
      state.wizardPhotoOpen[stepKey] = !state.wizardPhotoOpen[stepKey];
      rerenderCurrentStep();
    });
  });
  // File input
  const fi = document.querySelector(`[data-qphoto-input="${stepKey}"]`);
  if (fi) fi.addEventListener("change", (e) => {
    const f = e.target.files[0];
    if (f) handleWizardPhotoFile(f, stepKey);
  });
  // Swap → clear existing photo, re-open upload
  document.querySelectorAll(`[data-qphoto-swap]`).forEach(el => {
    el.addEventListener("click", () => {
      state.wizardPhotoDataUrl = null;
      state.wizardPhotoSuggest = {};
      state.wizardPhotoSuggestActed = {};  // a new photo deserves a fresh banner
      rerenderCurrentStep();
    });
  });
  // Close panel
  document.querySelectorAll(`[data-qphoto-close]`).forEach(el => {
    el.addEventListener("click", () => {
      state.wizardPhotoOpen[stepKey] = false;
      rerenderCurrentStep();
    });
  });
  // Analyze
  document.querySelectorAll(`[data-qphoto-analyze]`).forEach(el => {
    el.addEventListener("click", () => analyzeWizardPhoto(stepKey));
  });
  // Cancel in-flight analysis
  document.querySelectorAll(`[data-qphoto-cancel]`).forEach(el => {
    el.addEventListener("click", () => { if (typeof cancelVisionRequest === "function") cancelVisionRequest(); });
  });
}

function rerenderCurrentStep() {
  if (state.step === 0) renderSpace();
  else if (state.step === 1) renderDetails();
  else if (state.step === 2) renderSun();
  applyLanguage();
}

function handleWizardPhotoFile(file, stepKey) {
  if (!file.type.startsWith("image/")) {
    state.wizardPhotoError[stepKey] = t("不支援的檔案格式 — 請選擇圖片", "Unsupported file — pick an image");
    rerenderCurrentStep();
    return;
  }
  const reader = new FileReader();
  reader.onload = (e) => {
    const img = new Image();
    img.onload = () => {
      const maxW = 1024;
      const scale = img.width > maxW ? maxW / img.width : 1;
      const w = Math.round(img.width * scale);
      const h = Math.round(img.height * scale);
      const canvas = document.createElement("canvas");
      canvas.width = w; canvas.height = h;
      canvas.getContext("2d").drawImage(img, 0, 0, w, h);
      state.wizardPhotoDataUrl = canvas.toDataURL("image/jpeg", 0.85);
      state.wizardPhotoError[stepKey] = "";
      rerenderCurrentStep();
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

// One Pollinations call → JSON with every field every wizard step might want.
// Step-specific consumers read just their field from state.wizardPhotoSuggest.
async function analyzeWizardPhoto(stepKey) {
  if (!state.wizardPhotoDataUrl) return;
  state.wizardPhotoBusy[stepKey] = true;
  state.wizardPhotoError[stepKey] = "";
  rerenderCurrentStep();

  const systemPrompt = `You are a landscape design assistant analyzing a photo of a planting space in Taiwan. Output ONLY valid JSON, no markdown:
{
  "space": "balcony" | "rooftop" | "yard" | "indoor",
  "sun": "full" | "part" | "shade",
  "estimated_width_m": number,
  "estimated_depth_m": number,
  "orientation_guess": "N" | "E" | "S" | "W" | "unknown",
  "coastal": true | false
}`;

  const controller = startVisionRequest();
  try {
    const resp = await fetch("https://text.pollinations.ai/openai", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      signal: controller.signal,
      body: JSON.stringify({
        model: "openai",
        messages: [
          { role: "system", content: systemPrompt },
          { role: "user", content: [
            { type: "text", text: "Analyze this photo and respond with ONLY the JSON object." },
            { type: "image_url", image_url: { url: state.wizardPhotoDataUrl } },
          ]},
        ],
        response_format: { type: "json_object" },
      }),
    });
    if (!resp.ok) throw new Error("API " + resp.status);
    const data = await resp.json();
    const text = data?.choices?.[0]?.message?.content || "";
    const jsonText = (text.match(/\{[\s\S]*\}/) || [text])[0];
    const parsed = JSON.parse(jsonText);
    state.wizardPhotoSuggest = {
      space: parsed.space,
      sun: parsed.sun,
      details: {
        widthM: parsed.estimated_width_m,
        depthM: parsed.estimated_depth_m,
        orientation: parsed.orientation_guess !== "unknown" ? parsed.orientation_guess : null,
        coastal: !!parsed.coastal,
      },
    };
    // Fresh analysis → re-show the Details Apply banner even if the user dismissed last time.
    state.wizardPhotoSuggestActed = {};
    state.wizardPhotoBusy[stepKey] = false;
    state.wizardPhotoOpen[stepKey] = false;   // collapse the panel — suggestion is now visible above the cards
    rerenderCurrentStep();
  } catch (err) {
    state.wizardPhotoBusy[stepKey] = false;
    const reason = controller.signal.reason;
    if (reason === "user_cancel") {
      state.wizardPhotoError[stepKey] = t("已取消，可手動選擇", "Cancelled — pick manually");
    } else if (reason === "timeout") {
      state.wizardPhotoError[stepKey] = t("AI 回應太久，可重試或手動選擇", "AI took too long — retry or pick manually");
    } else {
      state.wizardPhotoError[stepKey] = t("AI 暫時無法判斷，請手動選擇", "AI couldn't analyze — pick manually");
    }
    rerenderCurrentStep();
  } finally {
    endVisionRequest(controller);
  }
}

function initShoppingQty() {
  const scored = scorePlants();
  let compatible = scored.filter(p => p.score >= 30);
  if (state.nativeOnly) compatible = compatible.filter(p => p.native);
  compatible = compatible.slice(0, 8);
  state.qty = {};

  // Scale default quantities to the actual area when known. Rough nursery-density rules:
  //   canopy ~1 per 8 m², shrub ~1 per 2 m², ground ~2 per m², water ~2, climber ~1.
  const area = (state.widthM || SPACE_DEFAULTS[state.space].w) *
               (state.depthM || SPACE_DEFAULTS[state.space].d);
  const tierQty = (tier) => {
    switch (tier) {
      case "T": return Math.max(1, Math.round(area / 8));
      case "S": return Math.max(1, Math.round(area / 2));
      case "G": return Math.max(2, Math.round(area * 2));
      case "W": return 2;
      case "C": return Math.max(1, Math.round(area / 6));
      default:  return 1;
    }
  };
  compatible.forEach((p) => { state.qty[p.id] = tierQty(p.tier); });
}

// ── TAB: GARDEN PLAN (top-down SVG) ─────────────────────────
function renderPlan(layers, recs) {
  // Derive SVG viewBox from real width × depth. Keep total area constant-ish
  // so the SVG fits on screen, but preserve the aspect ratio so a long balcony
  // actually looks long and a square yard actually looks square.
  const realW = state.widthM || SPACE_DEFAULTS[state.space].w;
  const realD = state.depthM || SPACE_DEFAULTS[state.space].d;
  const area = (realW * realD).toFixed(1);
  // Pick a target size that fits the screen while preserving aspect ratio.
  const aspect = realW / realD;
  const maxW = 600, maxH = 420;
  let svgW, svgH;
  if (aspect >= maxW / maxH) { svgW = maxW; svgH = svgW / aspect; }
  else { svgH = maxH; svgW = svgH * aspect; }
  svgW = Math.max(280, svgW);
  svgH = Math.max(180, svgH);
  const dims = {
    w: svgW, h: svgH,
    label_zh: `${state.space === "balcony" ? "陽台" : state.space === "rooftop" ? "頂樓" : state.space === "yard" ? "庭院" : "室內窗邊"} ${realW}m × ${realD}m ≈ ${area} m²`,
    label_en: `${state.space === "balcony" ? "Balcony" : state.space === "rooftop" ? "Rooftop" : state.space === "yard" ? "Yard" : "Indoor"} ${realW}m × ${realD}m ≈ ${area} m²`,
  };

  // Picked plants for the plan: top 1 of each available tier + 1 accent
  const plantsForPlan = layers.filter(l => l.plant).map(l => l.plant);
  const plan = layoutPlan(plantsForPlan, dims, state.space);

  // Sun marker — placed by orientation. "South-facing" means sun comes from south
  // (top of plan, conventionally). North-facing = sun mostly behind/dim.
  const orient = state.orientation || "S";
  let sunX, sunY, sunLabel = t("陽光", "Sun");
  switch (orient) {
    case "S": sunX = dims.w - 60; sunY = 28; sunLabel = t("南向 · 陽光", "S · Sun"); break;
    case "E": sunX = 32; sunY = dims.h / 2; sunLabel = t("東向 · 晨光", "E · AM Sun"); break;
    case "W": sunX = dims.w - 60; sunY = dims.h / 2; sunLabel = t("西向 · 午後光", "W · PM Sun"); break;
    case "N": sunX = dims.w - 60; sunY = dims.h - 36; sunLabel = t("北向 · 散射光", "N · Diffuse"); break;
  }
  const sunArrow = `
    <g transform="translate(${sunX}, ${sunY})">
      <circle r="14" fill="#F4D67E" stroke="#C9A84C" stroke-width="1.5"/>
      <text x="0" y="4" text-anchor="middle" font-size="13" fill="#8C6F52" font-weight="600">☀</text>
      <text x="0" y="36" text-anchor="middle" font-size="10" fill="#5A5C50" font-family="Noto Serif TC">${sunLabel}</text>
    </g>`;

  const ground = `
    <rect x="20" y="20" width="${dims.w - 40}" height="${dims.h - 40}" rx="14"
          fill="rgba(196,184,144,0.18)" stroke="#C9C3B4" stroke-width="1.2" stroke-dasharray="6 4"/>`;

  const labelBar = `
    <text x="32" y="46" font-size="11" letter-spacing="0.18em" fill="#8C6F52" font-weight="600">
      ${t("俯瞰圖 · TOP VIEW", "TOP VIEW")}
    </text>
    <text x="32" y="${dims.h - 28}" font-size="11" fill="#5A5C50" font-family="Noto Serif TC" font-style="italic">
      ${t(dims.label_zh, dims.label_en)}
    </text>`;

  const plantCircles = plan.map((p, i) => {
    const r = Math.max(18, Math.min(46, (p.spread[1] || 1) * 22));
    const fontSize = r > 30 ? 12.5 : 11.5;
    return `
      <g class="plan-plant" data-id="${p.id}" style="cursor:pointer;">
        <circle cx="${p.x}" cy="${p.y}" r="${r + 4}" fill="${p.color}" opacity="0.18"/>
        <circle cx="${p.x}" cy="${p.y}" r="${r}" fill="${p.color}" opacity="0.5" stroke="${p.color}" stroke-width="2"/>
        <text x="${p.x}" y="${p.y - 2}" text-anchor="middle" font-size="${fontSize}" font-family="Noto Serif TC" font-weight="600" fill="#2C3526">${p.zh}</text>
        <text x="${p.x}" y="${p.y + 12}" text-anchor="middle" font-size="10" fill="#5A5C50" font-style="italic" font-family="Noto Serif TC">${p.lt}</text>
      </g>`;
  }).join("");

  // Legend: tier color key
  const tiersInPlan = [...new Set(plantsForPlan.map(p => p.tier))];
  const tierLabels = { T:t("上層","Upper"), S:t("中層","Mid"), G:t("地被","Ground"), W:t("水景","Water"), C:t("藤本","Vine") };
  const legend = `
    <div class="plan-legend">
      ${tiersInPlan.map(tier => {
        const p = plantsForPlan.find(pp => pp.tier === tier);
        return `<span class="plan-legend-item"><span class="plan-legend-dot" style="background:${p.color}"></span>${tierLabels[tier]} — ${t(p.zh, p.en)}</span>`;
      }).join("")}
    </div>`;

  return `
    <h2 class="subtitle" data-zh="俯瞰平面圖 · Top View" data-en="Top View — Garden Plan">俯瞰平面圖 · Top View</h2>
    <p class="lead-small" data-zh="點擊任一植物查看詳細養護指南。圓圈大小相對於成株時的冠幅。"
       data-en="Tap a plant to see full care guide. Circle size is roughly proportional to mature spread.">
       點擊任一植物查看詳細養護指南。圓圈大小相對於成株時的冠幅。</p>
    <div class="plan-frame">
      <svg class="plan-svg" viewBox="0 0 ${dims.w} ${dims.h}" preserveAspectRatio="xMidYMid meet">
        ${ground}
        ${labelBar}
        ${sunArrow}
        ${plantCircles}
      </svg>
      ${legend}
    </div>`;
}

function layoutPlan(plants, dims, space) {
  // Place plants by tier:
  //   T (canopy) → back row (y near top, away from sun viewer in metaphor)
  //   S (shrub)  → middle row
  //   G (ground) → front row (closer to viewer)
  //   W (water)  → if present, special left-side pond
  //   C (climber) → left/right edge
  const pad = 60;
  const w = dims.w - pad * 2;

  const T = plants.filter(p => p.tier === "T");
  const S = plants.filter(p => p.tier === "S");
  const G = plants.filter(p => p.tier === "G");
  const W = plants.filter(p => p.tier === "W");
  const C = plants.filter(p => p.tier === "C");

  // Rows: define y positions based on space shape
  let yT, yS, yG;
  if (space === "balcony" || space === "indoor") {
    // narrow strip — single rank, but spread across width: T at left if any, S middle, G right
    yT = yS = yG = dims.h / 2;
  } else {
    yT = pad + 20;
    yG = dims.h - pad - 20;
    yS = (yT + yG) / 2;
  }

  const out = [];

  function placeRow(arr, y, leftRatio = 0, rightRatio = 1) {
    const n = arr.length;
    if (!n) return;
    const x0 = pad + w * leftRatio;
    const xw = w * (rightRatio - leftRatio);
    arr.forEach((p, i) => {
      const x = n === 1 ? x0 + xw / 2 : x0 + (xw / (n + 1)) * (i + 1);
      out.push({ ...p, x, y });
    });
  }

  if (space === "balcony" || space === "indoor") {
    // Single row left→right: T, S, G, then accents (W,C) appended
    const seq = [...T, ...S, ...G, ...W, ...C];
    seq.forEach((p, i) => {
      const x = pad + (w / (seq.length + 1)) * (i + 1);
      out.push({ ...p, x, y: dims.h / 2 });
    });
    return out;
  }

  // For rooftop/yard: layered
  // Reserve left edge for water if present
  if (W.length) {
    out.push({ ...W[0], x: pad + 50, y: yS + 15 });
    placeRow(T, yT, 0.15, 1);
  } else {
    placeRow(T, yT, 0, 1);
  }
  placeRow(S, yS, W.length ? 0.18 : 0, 1);
  placeRow(G, yG, 0, 1);

  // Climber on right edge (decorative)
  if (C.length) {
    out.push({ ...C[0], x: dims.w - pad - 30, y: yS - 30 });
  }
  return out;
}

// ── Sustainability roll-up — aggregates per-plant CO2, water, and ecological
//    support tags into 3 headline chips on the result page.
function renderSustainChips(recs) {
  const top = recs.slice(0, 8);
  if (!top.length) return "";

  // Use shopping-list quantities so the totals match what the user actually plans to plant.
  let totalCO2 = 0;
  let totalWater = 0;
  const supportTagsSet = new Set();
  top.forEach(p => {
    const qty = state.qty[p.id] ?? 1;
    const e = expert(p);
    totalCO2 += (e.co2_kg_yr || 0) * qty;
    totalWater += (e.water_l_wk || 0) * qty;
    (p.supports_zh || []).forEach(s => supportTagsSet.add(s));
  });

  // Tree-equivalent for CO2 — a typical urban tree absorbs ~22 kg CO2/yr.
  const treeEq = (totalCO2 / 22).toFixed(1);
  const ecoCount = supportTagsSet.size;

  // Preference note — appears above the sustainability row only when the user
  // has explicitly tapped a 👍/👎. Shows how many prefs were set and how many
  // of the visible top-8 they affected. The "清除偏好" link is the reversible
  // escape hatch so nothing is ever locked in.
  const prefTotal = prefTotalCount();
  const prefImpact = prefImpactCount(top);
  const pinTotal = pinnedCount();
  // Pinned plants get their own micro-note so the user sees explicitly
  // "X plants are guaranteed in this design" — pinning is a stronger commit
  // than a like and deserves the visible reassurance.
  const pinFragment = pinTotal > 0
    ? `<span style="color: #8C6F1E; font-weight:600;"> · 📌 <span data-zh="${pinTotal} 個已釘選保證納入" data-en="${pinTotal} pinned (guaranteed in design)">${pinTotal} 個已釘選保證納入</span></span>`
    : "";
  const prefNote = prefTotal > 0 ? `
    <div class="pref-note">
      <span>🎯 <span data-zh="你已標記 ${prefTotal} 個偏好 · 影響 ${prefImpact} 個推薦"
                    data-en="You marked ${prefTotal} preference${prefTotal === 1 ? "" : "s"} · affecting ${prefImpact} rec${prefImpact === 1 ? "" : "s"}">你已標記 ${prefTotal} 個偏好 · 影響 ${prefImpact} 個推薦</span>${pinFragment}</span>
      <a href="#" class="pref-clear-link" onclick="event.preventDefault(); clearPrefs();"
         data-zh="清除偏好" data-en="Clear preferences">清除偏好</a>
    </div>` : "";

  return `
    ${prefNote}
    <div class="sustain-row">
      <span class="sustain-chip co2">
        🌳 <span data-zh="約 ${totalCO2.toFixed(0)} kg CO₂ / 年 · 約 ${treeEq} 棵都市樹"
                data-en="≈ ${totalCO2.toFixed(0)} kg CO₂ / yr · ~${treeEq} urban-tree equivalent">約 ${totalCO2.toFixed(0)} kg CO₂ / 年 · 約 ${treeEq} 棵都市樹</span>
      </span>
      <span class="sustain-chip water">
        💧 <span data-zh="約 ${totalWater.toFixed(0)} L / 週 · 估算用水"
                data-en="≈ ${totalWater.toFixed(0)} L / week · estimated water">約 ${totalWater.toFixed(0)} L / 週 · 估算用水</span>
      </span>
      <span class="sustain-chip bio">
        🐝 <span data-zh="${ecoCount} 種生態貢獻"
                data-en="${ecoCount} ecological roles">${ecoCount} 種生態貢獻</span>
      </span>
    </div>`;
}

// ── TAB: REALISTIC PREVIEW (Pollinations.ai) ────────────────
// We build a descriptive prompt from the user's space + top plants + dominant
// bloom season, then embed three <img> tags pointing at pollinations.ai with
// different seeds. The service generates images on first request — initial
// load takes ~10-20s; subsequent loads of the same URL are usually cached.
// No API key, no backend; the URL itself is the API.

function dominantSeason(plants) {
  // Find which month most of the recommended plants are in bloom — gives the
  // generator a coherent visual mood (spring blossom, autumn berry, etc.).
  const months = new Array(12).fill(0);
  plants.forEach(p => (p.bloom || []).forEach(m => months[m - 1]++));
  let topM = 4;
  let topC = 0;
  for (let i = 0; i < 12; i++) {
    if (months[i] > topC) { topC = months[i]; topM = i + 1; }
  }
  if (topM <= 2 || topM === 12) return { zh: "冬", en: "winter, soft cool light" };
  if (topM <= 5) return { zh: "春", en: "spring, fresh blossoms, vibrant green" };
  if (topM <= 8) return { zh: "夏", en: "summer, lush canopy, warm golden light" };
  return { zh: "秋", en: "autumn, warm amber tones" };
}

function buildPreviewPrompt(plants) {
  const space = state.space;
  const spaceText = {
    balcony: "small urban balcony garden with container plants, modern Taiwan apartment, intimate scale",
    rooftop: "open rooftop garden with city skyline behind, sunny day in Taiwan",
    yard:    "lush home courtyard garden with mature plantings, Taiwan residential setting",
    indoor:  "indoor plant arrangement next to a bright window, Taiwan apartment interior, natural daylight",
  }[space] || "garden in Taiwan";

  const det = state.detected;
  const locText = det?.county
    ? `, ${det.coastal ? "near coast" : (det.zone === "S" ? "southern Taiwan" : det.zone === "N" ? "northern Taiwan" : det.zone === "E" ? "eastern Taiwan" : "central Taiwan")}`
    : "";

  const season = dominantSeason(plants);
  const plantList = plants.slice(0, 5).map(p => `${p.en} (${p.lt})`).join(", ");

  return `Photorealistic landscape design photo of a ${spaceText}${locText}, featuring ${plantList}, in ${season.en}, natural daylight with soft golden hour glow, depth of field, professional landscape photography, magazine-quality, peaceful atmosphere, lush vibrant greenery, high resolution`;
}

function previewURL(prompt, seed) {
  const encoded = encodeURIComponent(prompt);

  return `https://image.pollinations.ai/prompt/${encoded}?width=960&height=600&seed=${seed}&model=flux&nologo=true`;
}
